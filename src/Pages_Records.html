<!-- ══ TRANSFERS ══ -->
<div class="page" id="page-transfers">
  <div class="page-header">
    <h2>Transfer Records</h2>
    <button class="btn btn-primary btn-sm" onclick="openTransferModal('')">+ New Transfer</button>
  </div>
  <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th>Barcode</th><th>Type</th><th>From</th><th>To</th>
        <th>Transfer Type</th><th>Eff. Date</th><th>Status</th><th>Timestamp</th>
      </tr></thead>
      <tbody id="tblTransfers"></tbody>
    </table>
    <div class="pager" id="pagerTransfers"></div>
  </div>
</div>

<!-- ══ ACTIVITY LOG ══ -->
<div class="page" id="page-activity">
  <div class="page-header">
    <h2>Activity Log</h2>
  </div>
  <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th>Timestamp</th><th>Action</th><th>Barcode</th><th>Details</th><th>Performed By</th>
      </tr></thead>
      <tbody id="tblActivity"></tbody>
    </table>
  </div>
  <div class="pager" id="pagerActivity"></div>
</div>
