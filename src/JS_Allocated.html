<script>
// ═══════════════════════════════════════
//  JS_Allocated.html — Allocated Assets
// ═══════════════════════════════════════

function sortAlloc(col) {
  if (allocSort.col === col) allocSort.dir *= -1;
  else { allocSort.col = col; allocSort.dir = 1; }
  renderAllocated();
}

function populateDistrictFilter() {
  const sel = document.getElementById('allocFilterDistrict');
  if (!sel) return;

  if (isSenior()) {
    const scope = SESSION.seniorDistrictScope || [];
    sel.innerHTML = '<option value="">All My Division</option>' +
      scope.map(d => `<option value="${esc(d)}">${esc(d)}</option>`).join('');
    sel.disabled = scope.length <= 1;
    return;
  }

  const feDistricts = SESSION.userDistricts || (SESSION.district ? [SESSION.district] : []);
  if (feDistricts.length === 1) {
    sel.innerHTML = `<option value="${esc(feDistricts[0])}">${esc(feDistricts[0])}</option>`;
    sel.value    = feDistricts[0];
    sel.disabled = true;
  } else {
    sel.innerHTML = '<option value="">All My Districts</option>' +
      feDistricts.map(d => `<option value="${esc(d)}">${esc(d)}</option>`).join('');
    sel.disabled = false;
  }
}

function onAllocDivisionChange() {
  const selDiv  = (document.getElementById('alDiv')?.value || '').trim();
  const distSel = document.getElementById('alDist');
  if (!distSel) return;

  const map         = ENG_LOCATION_DATA.divDistrictMap || {};
  const userDists   = ENG_LOCATION_DATA.userDistricts  || [];

  if (!selDiv) {
    distSel.innerHTML = '<option value="">Select…</option>' +
      userDists.map(d => `<option>${esc(d)}</option>`).join('');
    return;
  }

  const divDists = map[selDiv] || [];
  const matched  = divDists.filter(d => userDists.some(ud => ud.toLowerCase() === d.toLowerCase()));
  const allowed  = matched.length > 0 ? matched : (divDists.length > 0 ? divDists : userDists);

  distSel.innerHTML = '<option value="">Select…</option>' +
    allowed.map(d => `<option>${esc(d)}</option>`).join('');
}

function onAllocDistrictChange() {
  const div     = (document.getElementById('alDiv')?.value || '').trim();
  const dist    = (document.getElementById('alDist')?.value || '').trim();
  const areaSel = document.getElementById('alArea');
  if (!areaSel) return;

  const areas = new Set();
  ASSETS.forEach(function(a) {
    if ((a.Division || '') === div && (a.District || '') === dist && (a.Area || '').trim()) {
      areas.add(a.Area.trim());
    }
  });

  const sorted = [...areas].sort();
  areaSel.innerHTML = '<option value="">Select…</option>' +
    sorted.map(function(a) { return '<option value="' + esc(a) + '">' + esc(a) + '</option>'; }).join('') +
    '<option value="__custom__">+ Enter custom area…</option>';

  areaSel.onchange = function() {
    if (areaSel.value === '__custom__') {
      const custom = prompt('Enter area (e.g. 1, 2, 3):');
      if (custom && custom.trim()) {
        const trimmed = custom.trim();
        const opt = document.createElement('option');
        opt.value = trimmed;
        opt.textContent = trimmed;
        opt.selected = true;
        areaSel.insertBefore(opt, areaSel.lastElementChild);
        areaSel.value = trimmed;
      } else {
        areaSel.value = '';
      }
    }
  };
}

function renderAllocated() {
  // Skip if page is not currently visible
  if (document.getElementById('page-allocated').style.display === 'none' 
    && currentPage !== 'allocated') return;
  _resetTblSel('allocated');
  let data = _filterByScope(ASSETS.filter(a => ['allocated', 'transfer'].includes(a.status)));

  var q = (document.getElementById('allocSearch')?.value || '').toLowerCase();
  if (q) searchQuery = '';
  if (!q) q = searchQuery;
  const fType    = document.getElementById('allocFilterType')?.value   || '';
  const dropVal  = (document.getElementById('allocFilterDistrict')?.value || '').toLowerCase();

  if (q)       data = data.filter(a => [a.Barcode, a.Staff, a.Brand, a.EmpID, a.Branch, a.Type].some(v => (v || '').toLowerCase().includes(q)));
  if (fType)   data = data.filter(a => (a.Type     || '').toUpperCase() === fType.toUpperCase());
  if (dropVal) data = data.filter(a => (a.District || '').toLowerCase() === dropVal);

  data = [...data].sort((a, b) =>
    String(a[allocSort.col] || '').localeCompare(String(b[allocSort.col] || '')) * allocSort.dir
  );

  // Summary pills
  const distCounts = {};
  data.forEach(a => { if (a.District) distCounts[a.District] = (distCounts[a.District] || 0) + 1; });
  const summEl = document.getElementById('allocSummary');
  if (summEl) summEl.innerHTML =
    `<div class="pool-pill pool-pill-blue">${data.length} Allocated</div>` +
    Object.entries(distCounts).sort((a, b) => b[1] - a[1]).slice(0, 6)
      .map(([d, c]) => `<div class="pool-pill">${esc(d)}: <strong>${c}</strong></div>`).join('');

  if (!pages.allocated) pages.allocated = 1;
  const totalPages = Math.ceil(data.length / PAGE_SIZE) || 1;
  if (pages.allocated > totalPages) pages.allocated = totalPages;
  const slice = data.slice((pages.allocated - 1) * PAGE_SIZE, pages.allocated * PAGE_SIZE);

  const tbody = document.getElementById('tblAllocated');
  if (!tbody) return;
  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="11" class="tbl-empty">No allocated assets</td></tr>';
    document.getElementById('pagerAllocated').innerHTML = '';
    return;
  }

  tbody.innerHTML = slice.map(a => {
    const isXfer = (a.Lifecycle || '').toLowerCase() === 'transfer';
    return `<tr>
      <td><input type="checkbox" class="cb cb-allocated" value="${esc(a.Barcode)}" onclick="checkSelTable('allocated')"/></td>
      <td><span class="mono-bc">${esc(a.Barcode)}</span></td>
      <td><span class="type-tag">${esc(a.Type)}</span></td>
      <td>${esc(a.Brand) || '—'}</td>
      <td>
        <div style="font-weight:600">${esc(a.Staff) || '—'}</div>
        ${isXfer ? '<span class="badge badge-transfer" style="font-size:.65rem;padding:1px 6px">Transfer</span>' : ''}
      </td>
      <td class="mono-sm">${esc(a.EmpID) || '—'}</td>
      <td style="font-size:.78rem;color:var(--text2)">${esc(a.Designation) || '—'}</td>
      <td style="max-width:240px">${renderLocPills(a.Division, a.District, a.Area, a.Branch)}</td>
      <td class="nowrap-sm">${fmtDate(a.EffDate) || '—'}</td>
      <td><span class="cond-${(a.Condition || 'good').toLowerCase()}">${esc(a.Condition)}</span></td>
      <td>
        <div style="display:flex;gap:4px">
          <button class="btn btn-icon btn-transfer"  data-tip="Transfer"  onclick="openTransferModal('${esc(a.Barcode)}')">${_ICO.transfer}</button>
          <button class="btn btn-icon btn-borrow"    data-tip="Borrow"    onclick="openBorrowModal('${esc(a.Barcode)}')">${_ICO.borrow}</button>
          <button class="btn btn-icon btn-spare"     data-tip="↩ Spare"   onclick="openDeallocModal('${esc(a.Barcode)}','${esc(a.Staff)}')">${_ICO.spare}</button>
          <button class="btn btn-icon btn-danger"    data-tip="Dispose"   onclick="openDisposalModal('${esc(a.Barcode)}')">${_ICO.dispose}</button>
          <button class="btn btn-icon btn-secondary" data-tip="View"      onclick="viewAsset('${esc(a.Barcode)}')">${_ICO.view}</button>
        </div>
      </td>
    </tr>`;
  }).join('');

  renderPager('pagerAllocated', 'allocated', totalPages, pages.allocated);
}
</script>
