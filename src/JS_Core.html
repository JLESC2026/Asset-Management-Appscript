function _resolveAssetLocation(asset) {
  var div    = (asset.Division || '').trim();
  var dist   = (asset.District || '').trim();
  var area   = (asset.Area     || '').trim();
  var branch = (asset.Branch   || '').trim();

  if (div) {
    return { div: div, dist: dist, area: area, branch: branch };
  }

  var resolved = _resolveByOrgLookup(asset);
  if (resolved && (resolved.division || resolved.district)) {
    return {
      div:    resolved.division || div,
      dist:   resolved.district || dist,
      area:   resolved.area     || area,
      branch: resolved.branch   || branch || asset.Branch || ''
    };
  }

  var fallback = (asset.BaseOffice || asset.Branch || asset.Location || '').trim();
  if (fallback) {
    return { div: fallback, dist: '', area: '', branch: '' };
  }

  return null;
}

// ── Floating tooltip init ─────────────────────────────────────────────────────
(function(){
  function _initTip(){
    if(!document.body) return;
    var tip=document.createElement('div');
    tip.id='floating-tip';
    document.body.appendChild(tip);
    document.addEventListener('mouseover',function(e){
      var el=e.target.closest('[data-tip]');
      if(!el){tip.style.display='none';return;}
      var r=el.getBoundingClientRect();
      tip.textContent=el.dataset.tip;
      tip.style.left=(r.left+r.width/2)+'px';
      tip.style.top=(r.top-6)+'px';
      tip.style.transform='translate(-50%,-100%)';
      tip.style.display='block';
    });
    document.addEventListener('mouseout',function(e){
      if(e.target.closest('[data-tip]')) tip.style.display='none';
    });
  }
  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',_initTip);
  } else {
    _initTip();
  }
})();

var _escCache = {};
function esc(s) {
  var str = String(s || '');
  if (_escCache[str] !== undefined) return _escCache[str];
  var result = str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
  if (str.length < 100) _escCache[str] = result;
  return result;
}

function fmtDate(raw){
  if(!raw) return '';
  if(/^\d{2}\/\d{2}\/\d{4}$/.test(raw)) return raw;
  if(/^\d{4}-\d{2}-\d{2}$/.test(raw)){
    var parts=raw.split('-');return parts[1]+'/'+parts[2]+'/'+parts[0];
  }
  var d=new Date(raw);
  if(!isNaN(d.getTime()))
    return String(d.getUTCMonth()+1).padStart(2,'0')+'/'+String(d.getUTCDate()).padStart(2,'0')+'/'+d.getUTCFullYear();
  return raw;
}

function renderLocPills(div,dist,area,branch){
  var p=[];
  if(div)    p.push('<span class="loc-pill lp-div">'+esc(div)+'</span>');
  if(dist)   p.push('<span class="loc-pill lp-dist">'+esc(dist)+'</span>');
  if(area)   p.push('<span class="loc-pill lp-area">'+esc(area)+'</span>');
  if(branch) p.push('<span class="loc-pill lp-branch">'+esc(branch)+'</span>');
  return p.length?'<div class="loc-pills">'+p.join('')+'</div>':'<span style="color:var(--text3)">—</span>';
}

function toast(msg,type){
  type = type || 'ok';
  var wrap = document.getElementById('toast-wrap');
  if (!wrap) return;

  var t = document.createElement('div');
  t.className = 'toast ' + type;
  var icons = { ok:'✓', err:'✕', warn:'⚠' };
  t.innerHTML =
    '<span style="font-size:1rem;flex-shrink:0">' + (icons[type] || '•') + '</span>' +
    '<span style="flex:1">' + esc(msg) + '</span>' +
    '<button onclick="this.parentNode.remove()" style="background:none;border:none;color:inherit;cursor:pointer;opacity:.6;font-size:1rem;padding:0 0 0 8px;flex-shrink:0;font-family:inherit">×</button>';

  wrap.appendChild(t);

  setTimeout(function(){
    t.style.transition = 'opacity .3s, transform .3s';
    t.style.opacity = '0';
    t.style.transform = 'translateX(20px)';
    setTimeout(function(){ if(t.parentNode) t.parentNode.removeChild(t); }, 300);
  }, 3500);

  var toasts = wrap.querySelectorAll('.toast');
  if (toasts.length > 4) {
    toasts[0].remove();
  }
}

function daysUntil(dateStr){
  if(!dateStr) return null;

  var parts = String(dateStr).split(/[-\/]/);
  var d;
  if(parts.length===3){
    if(parts[0].length===4){
      d = new Date(parseInt(parts[0],10), parseInt(parts[1],10)-1, parseInt(parts[2],10));
    } else {
      d = new Date(parseInt(parts[2],10), parseInt(parts[0],10)-1, parseInt(parts[1],10));
    }
  } else {
    d = new Date(dateStr);
  }
  if(isNaN(d.getTime())) return null;

  d.setHours(0,0,0,0);
  var today = new Date();
  today.setHours(0,0,0,0);
  return Math.round((d - today)/(1000*60*60*24));
}

// ─────────────────────────────────────────────────────────────────────────────
//  _getScopeDistricts
// ─────────────────────────────────────────────────────────────────────────────
function _getScopeDistricts(){
  if(!SESSION) return [];

  if(isHO()){
    return (SESSION.seniorDistrictScope || []).map(function(d){
      return (d||'').toLowerCase();
    });
  }

  if(isSenior()){
    var scope = SESSION.seniorDistrictScope || [];
    if(scope.length > 0){
      return scope.map(function(d){ return (d||'').toLowerCase(); });
    }
    var divMap  = SESSION.divDistrictMap  || {};
    var divList = SESSION.userDivisions   || [];
    var derived = [];
    divList.forEach(function(div){
      (divMap[div] || []).forEach(function(d){
        var dl = (d||'').toLowerCase();
        if(dl && derived.indexOf(dl) < 0) derived.push(dl);
      });
    });
    if(derived.length > 0) return derived;
    return (SESSION.userDistricts || []).map(function(d){
      return (d||'').toLowerCase();
    });
  }

  var arr = (SESSION.userDistricts && SESSION.userDistricts.length > 0)
    ? SESSION.userDistricts
    : (SESSION.district ? [SESSION.district] : []);
  return arr.map(function(d){ return (d||'').toLowerCase(); });
}

// ─────────────────────────────────────────────────────────────────────────────
//  _resolveByOrgLookup
// ─────────────────────────────────────────────────────────────────────────────
function _resolveByOrgLookup(asset) {
  if (!ORG_LOOKUP || typeof ORG_LOOKUP !== 'object') return null;

  var rawLoc = (asset.AssetLocation || '').trim();
  if (rawLoc) {
    var entry = ORG_LOOKUP[rawLoc.toLowerCase()];
    if (entry && (entry.division || entry.district)) return entry;
  }

  var rawBranch = (asset.Branch || '').trim();
  if (rawBranch) {
    var bEntry = ORG_LOOKUP[rawBranch.toLowerCase()];
    if (bEntry && (bEntry.division || bEntry.district)) return bEntry;
  }

  return null;
}

// ─────────────────────────────────────────────────────────────────────────────
//  _filterByScope
// ─────────────────────────────────────────────────────────────────────────────
function _filterByScope(assets) {
  if (assets === ASSETS && _scopeCache) return _scopeCache;

  var userDivs  = (SESSION.userDivisions || []).map(function(d){ return (d||'').toLowerCase(); });
  var userDists = _getScopeDistricts();

  function _matchesField(a) {
    var ea = (a.EffectiveAssignment || '').trim().toLowerCase();
    if (ea !== 'field office' && ea !== '' && ea !== 'unknown') return false;
    if (ea === '' || ea === 'unknown') return false;

    var assetDiv  = (a.Division  || '').toLowerCase().trim();
    var assetDist = (a.District  || '').toLowerCase().trim();

    if (isHO()) {
      if (userDivs.length === 0 && userDists.length === 0) return true;
      if (assetDiv  && userDivs.length  > 0 && userDivs.indexOf(assetDiv)   >= 0) return true;
      if (assetDist && userDists.length > 0 && userDists.indexOf(assetDist) >= 0) return true;
      return assetDiv === '' && assetDist === '';
    }

    if (isSenior()) {
      if (assetDiv  && userDivs.length  > 0 && userDivs.indexOf(assetDiv)   >= 0) return true;
      if (assetDist && userDists.length > 0 && userDists.indexOf(assetDist) >= 0) return true;
      return false;
    }

    if (assetDist && userDists.length > 0) return userDists.indexOf(assetDist) >= 0;
    return false;
  }

  function _matchesHO(a) {
    var ea = (a.EffectiveAssignment || '').trim().toLowerCase();
    return ea === 'central office';
  }

  var result;
  var scope = SESSION.scopeType || (isHO() ? 'ho' : 'field');

  if (scope === 'ho') {
    result = assets.filter(_matchesHO);
  } else if (scope === 'field') {
    if (userDivs.length === 0 && userDists.length === 0) {
      result = [];
    } else {
      result = assets.filter(_matchesField);
    }
  } else { // 'both'
    result = assets.filter(function(a) {
      return _matchesHO(a) || (userDivs.length > 0 || userDists.length > 0 ? _matchesField(a) : true);
    });
  }

  if (assets === ASSETS) _scopeCache = result;
  return result;
}

function _getFEDistricts(){ return _getScopeDistricts(); }
function _filterByFEDistricts(assets){ return _filterByScope(assets); }

function _getScopeLabel() {
  var scope = SESSION.scopeType || (isAdmin() ? 'ho' : 'field');
  if (scope === 'both') return 'HO & FE';
  if (scope === 'ho')   return 'Head Office';

  if (!isSenior() && !isAdmin()) {
    var dists = (SESSION.userDistricts || []).filter(function(d){ return d && d.trim(); });
    if (!dists.length) return 'Field';
    var dn = dists.map(function(d){
      return parseInt(d.replace(/\D+/g,''), 10);
    }).filter(function(n){ return !isNaN(n); }).sort(function(a,b){ return a-b; });
    if (!dn.length) return dists.slice(0,2).join(' & ');
    if (dn.length === 1) return 'District ' + dn[0];
    if (dn.length === 2) return 'District ' + dn[0] + ' & ' + dn[1];
    return 'Districts ' + dn[0] + '–' + dn[dn.length-1];
  }

  var divs = (SESSION.userDivisions || []).filter(function(d){ return d && d.trim(); });
  if (!divs.length) {
    var dists2 = (SESSION.userDistricts || []).filter(function(d){ return d && d.trim(); });
    if (!dists2.length) return 'Field';
    var dn2 = dists2.map(function(d){
      return parseInt(d.replace(/\D+/g,''), 10);
    }).filter(function(n){ return !isNaN(n); }).sort(function(a,b){ return a-b; });
    if (!dn2.length) return dists2.slice(0,2).join(' & ');
    if (dn2.length === 1) return 'District ' + dn2[0];
    if (dn2.length === 2) return 'District ' + dn2[0] + ' & ' + dn2[1];
    return 'Districts ' + dn2[0] + '–' + dn2[dn2.length-1];
  }
  var allDivs = Object.keys(SESSION.divDistrictMap || {}).filter(function(d){ return d && d.trim(); });
  if (allDivs.length > 0 && divs.length >= allDivs.length) return 'All Divisions';
  var nums = divs.map(function(d){
    return parseInt(d.replace(/\D+/g,''), 10);
  }).filter(function(n){ return !isNaN(n); }).sort(function(a,b){ return a-b; });
  if (!nums.length) return divs.slice(0,2).join(' & ');
  if (nums.length === 1) return 'Division ' + nums[0];
  if (nums.length === 2) return 'Division ' + nums[0] + ' & ' + nums[1];
  if (nums.length === 3) return 'Division ' + nums[0] + ', ' + nums[1] + ' & ' + nums[2];
  return 'Divisions ' + nums[0] + '–' + nums[nums.length-1];
}

function openModal(id){
  document.getElementById(id).classList.add('open');

  setTimeout(function() {
    var modal  = document.getElementById(id);
    if (!modal) return;
    var body   = modal.querySelector('.modal-body');
    var header = modal.querySelector('.modal-hdr');
    if (body && header) {
      body.addEventListener('scroll', function() {
        header.classList.toggle('scrolled', body.scrollTop > 4);
      }, { passive: true });
    }
    var first = modal.querySelector(
      'input:not([readonly]):not([disabled]),' +
      'select:not([disabled]),' +
      'textarea:not([readonly]):not([disabled])'
    );
    if (first) first.focus();
  }, 100);
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    var openModals = document.querySelectorAll('.modal-backdrop.open');
    if (openModals.length > 0) {
      var topModal = openModals[openModals.length - 1];
      topModal.classList.remove('open');
    }
  }

  if (e.key === 'Tab') {
    var openModal = document.querySelector('.modal-backdrop.open .modal');
    if (!openModal) return;

    var focusable = openModal.querySelectorAll(
      'button:not([disabled]),input:not([disabled]),select:not([disabled]),' +
      'textarea:not([disabled]),[tabindex]:not([tabindex="-1"])'
    );
    if (focusable.length === 0) return;

    var first = focusable[0];
    var last = focusable[focusable.length - 1];

    if (e.shiftKey && document.activeElement === first) {
      e.preventDefault();
      last.focus();
    } else if (!e.shiftKey && document.activeElement === last) {
      e.preventDefault();
      first.focus();
    }
  }

  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    var openModals = document.querySelectorAll('.modal-backdrop.open');
    if (openModals.length > 0) {
      var topModal = openModals[openModals.length - 1];
      var submitBtn = topModal.querySelector('.btn-primary:not([disabled])');
      if (submitBtn) submitBtn.click();
    }
  }
});

// ═══════════════════════════════════════
//  PRINT GATE (NEW)
//  Checks whether all assets for a staff/branch have confirmed
//  accountability forms before allowing PDF print.
//  Grandfathered assets (pre-existing) always pass.
// ═══════════════════════════════════════
function _checkPrintGate(assets) {
  if (!assets || !assets.length) return true;

  var blocked = assets.filter(function(a) {
    // Grandfathered OR Confirmed → pass
    var isGrandfathered = String(a.Grandfathered || '').toLowerCase() === 'true';
    var isConfirmed     = (a.jsApprovalStatus || 'Confirmed') === 'Confirmed';
    return !isConfirmed && !isGrandfathered;
  });

  if (blocked.length === 0) return true;

  toast(
    blocked.length + ' asset' + (blocked.length !== 1 ? 's' : '') +
    ' still pending supervisor approval. ' +
    'The form can be printed once all assets are confirmed in the For Approval page.',
    'warn'
  );
  return false;
}

function doLogin(){
  if(document.getElementById('loginBtn').disabled) return;

  var u=document.getElementById('authUser').value.trim();
  var p=document.getElementById('authPass').value;
  var e=document.getElementById('authError');
  var btn=document.getElementById('loginBtn');
  var sts=document.getElementById('loginStatus');

  if(!u||!p){
    e.textContent='Enter Employee ID and password.';
    e.style.display='block';
    return;
  }
  e.style.display='none';
  _lockBtn(btn);

  var msgTimer;
  if(sts){
    sts.style.opacity='1';
    sts.textContent='Connecting…';
    var msgs=['Verifying credentials…','Loading your scope…','Almost there…'];
    var mi=0;
    msgTimer=setInterval(function(){
      if(mi<msgs.length&&sts){
        sts.textContent=msgs[mi++];
      }
    },1800);
  }

  var timedOut=false;
  var timeoutId=setTimeout(function(){
    timedOut=true;
    _unlockBtn(btn);
    if(sts){sts.style.opacity='0';}
    e.textContent='Connection timed out. Check your network and try again.';
    e.style.display='block';
    clearInterval(msgTimer);
  },30000);

  google.script.run
    .withSuccessHandler(function(r){
      clearTimeout(timeoutId);
      clearInterval(msgTimer);
      if(timedOut) return;
      _unlockBtn(btn);
      if(sts) sts.style.opacity='0';
      if(!r.ok){
        e.textContent=r.error;
        e.style.display='block';
        return;
      }
      SESSION={
        username:            r.username,
        role:                r.role,
        roleTier:            r.roleTier || 'fe',
        name:                r.name||r.username,
        perms:               r.perms || {},
        scopeType:           r.scopeType || (r.roleTier === 'ho' ? 'ho' : 'field'),
        division:            r.division||'',
        district:            r.district||'',
        userDivisions:       r.userDivisions||[],
        userDistricts:       r.userDistricts||(r.district?[r.district]:[]),
        seniorDistrictScope: r.seniorDistrictScope||[],
        divDistrictMap:      r.divDistrictMap||{},
        area:                r.area||'',
        branch:              r.branch||''
      };
      if(r.firstLogin){
        document.getElementById('authScreen').style.display='none';
        document.getElementById('changePwdScreen').style.display='flex';
        return;
      }
      startApp();
    })
    .withFailureHandler(function(err){
      clearTimeout(timeoutId);
      clearInterval(msgTimer);
      if(timedOut) return;
      _unlockBtn(btn);
      if(sts) sts.style.opacity='0';
      e.textContent='Connection error: '+err.message;
      e.style.display='block';
    })
    .loginUser(u,p);
}

function doChangePwd(){
  var p1=document.getElementById('newPwd1').value;
  var p2=document.getElementById('newPwd2').value;
  var e=document.getElementById('pwdError');
  var btn=document.getElementById('changePwdBtn');
  if(p1!==p2){e.textContent='Passwords do not match.';e.style.display='block';return;}
  if(p1.length<4){e.textContent='Minimum 4 characters.';e.style.display='block';return;}
  e.style.display='none';
  _lockBtn(btn);
  google.script.run
    .withSuccessHandler(function(r){
      _unlockBtn(btn);
      if(!r.ok){e.textContent=r.error;e.style.display='block';return;}
      document.getElementById('changePwdScreen').style.display='none';
      startApp();
    })
    .withFailureHandler(function(err){
      _unlockBtn(btn);
      e.textContent=err.message;
      e.style.display='block';
    })
    .changePassword(SESSION.username,p1);
}

function startApp(){
  document.getElementById('authScreen').style.display='none';
  document.getElementById('changePwdScreen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('topUser').textContent=SESSION.name||SESSION.username;
  document.getElementById('dashDate').textContent=new Date().toLocaleDateString('en-PH',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

  loadData();
  loadDropdownData();
  loadLocationData();
  _applyPermissions();
}

function logout(){
  SESSION=null; ASSETS=[]; BORROWS=[]; XFERS=[]; DISPOSALS=[]; LOGS=[];
  document.getElementById('app').style.display='none';
  document.getElementById('authScreen').style.display='flex';
  document.getElementById('authPass').value='';
}

function _applyPermissions() {
  if (!SESSION) return;

  if (!canAdd()) {
    document.querySelectorAll('button').forEach(function(btn) {
      var oc = btn.getAttribute('onclick') || '';
      if (oc.includes('openAddAssetModal')) btn.style.display = 'none';
    });
  }

  if (!canBorrow()) {
    document.querySelectorAll('button').forEach(function(btn) {
      var oc = btn.getAttribute('onclick') || '';
      if (oc.includes('openBorrowModal') && (btn.textContent.trim().includes('New Borrow') || btn.textContent.trim().includes('+ New')))
        btn.style.display = 'none';
    });
  }

  if (!canTransfer()) {
    document.querySelectorAll('button').forEach(function(btn) {
      var oc = btn.getAttribute('onclick') || '';
      if (oc.includes('openTransferModal') && btn.textContent.trim().includes('New Transfer'))
        btn.style.display = 'none';
    });
  }

  if (!canDelete()) {
    ['btnBulkDelete','btnBulkDelSpare','btnBulkDelAllocated',
     'btnBulkDelActiveBorrow','btnBulkDelDisposal'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.style.display = 'none';
    });
    var cbAll = document.getElementById('cbAll');
    if (cbAll) cbAll.closest('th').style.visibility = 'hidden';
  }

  if (isViewOnly()) {
    var banner = document.createElement('div');
    banner.style.cssText = 'position:fixed;top:56px;left:0;right:0;z-index:500;background:rgba(217,119,6,.12);border-bottom:1px solid rgba(217,119,6,.3);padding:6px 20px;font-size:.78rem;color:var(--yellow);font-weight:600;text-align:center;pointer-events:none';
    banner.textContent = '👁 View-Only Mode — you can browse but cannot make changes';
    document.body.insertBefore(banner, document.getElementById('app'));
  }

  var badge = document.getElementById('districtBadge');
  if (!badge) return;
  var desig = (SESSION.designation || '').trim();
  if (desig) {
    badge.textContent       = desig;
    badge.style.background  = 'rgba(124,106,247,.12)';
    badge.style.borderColor = 'rgba(124,106,247,.3)';
    badge.style.color       = 'var(--accent2)';
    badge.style.display     = 'block';
  } else {
    badge.style.display = 'none';
  }
  var topRoleEl = document.getElementById('topRole');
  if (topRoleEl) topRoleEl.textContent = _getScopeLabel();
}

function loadData(){

    .withSuccessHandler(function(r) {
      ASSETS    = r.assets;
      BORROWS   = r.borrows;
      XFERS     = r.transfers;
      DISPOSALS = r.disposals;
      LOGS      = r.logs;
      if (r.orgLookup && typeof r.orgLookup === 'object') {
        ORG_LOOKUP = r.orgLookup;
      }
      renderAll();
    })
    .withFailureHandler(function(err) { toast('Load error: ' + err.message, 'err'); })
    .getInitialData();
}

  var pageRenderMap = {

function updateBadges(){
  ['nbAll','nbSpare','nbAllocated','nbBorrowed','nbDisposal',
   'nbBorrowActive','nbBorrowPool','nbStaffAssets','nbEquipment'].forEach(function(id){
    var el=document.getElementById(id);
    if(el) el.classList.remove('nb-loading');
  });

  var filtered = _filterByScope(ASSETS);
  var spare  = filtered.filter(function(a){return a.status==='spare';}).length;
  var alloc  = filtered.filter(function(a){return ['allocated','transfer'].indexOf(a.status)>=0;}).length;
  var borr   = filtered.filter(function(a){return a.status==='borrowed';}).length;
  var disp   = filtered.filter(function(a){return a.status==='disposal';}).length;
  var pool   = filtered.filter(function(a){return a.status==='borrow-item';}).length;
  document.getElementById('nbAll').textContent       = filtered.length;
  document.getElementById('nbSpare').textContent     = spare;
  document.getElementById('nbAllocated').textContent = alloc;
  document.getElementById('nbBorrowed').textContent  = borr + pool;
  document.getElementById('nbDisposal').textContent  = disp;
  document.getElementById('nbBorrowActive').textContent = borr;
  document.getElementById('nbBorrowPool').textContent   = pool;

  var nbBA = document.getElementById('nbBorrowActiveSub');
  if (nbBA) nbBA.textContent = borr;
  var nbBP = document.getElementById('nbBorrowPoolSub');
  if (nbBP) nbBP.textContent = pool;

  var equipCount = _filterByScope(ASSETS.filter(function(a){return a.status !== 'disposal';})).length;
  var equipEl = document.getElementById('nbEquipment');
  if(equipEl) equipEl.textContent = equipCount;
  var staffEl = document.getElementById('nbStaffAssets');
  if(staffEl) staffEl.textContent = alloc;

  _updateApprovalBadge();
}

function _updateApprovalBadge() {
  var el = document.getElementById('nbForApproval');
  if (!el) return;
  el.classList.remove('nb-loading');

  if (!canReviewForms()) {
    var rejected = MY_FORMS.filter(function(f){ return f.status === 'Rejected'; }).length;
    el.textContent = rejected || '0';
    el.style.display = rejected ? '' : 'none';
    return;
  }
  var pending = PENDING_FORMS.length;
  el.textContent = pending || '0';
  el.style.display = pending ? '' : 'none';
}

function _formatCooldown(cooldownUntil) {
  if (!cooldownUntil) return '';
  var until = new Date(cooldownUntil);
  var now   = new Date();
  var diff  = Math.max(0, Math.round((until - now) / 1000));
  if (diff <= 0) return '';
  var h = Math.floor(diff / 3600);
  var m = Math.floor((diff % 3600) / 60);
  var s = diff % 60;
  if (h > 0) return h + 'h ' + m + 'm remaining';
  if (m > 0) return m + 'm ' + s + 's remaining';
  return s + 's remaining';
}

function _startCooldownTick(formId, cooldownUntil, displayElId) {
  var el = document.getElementById(displayElId);
  if (!el || !cooldownUntil) return;
  var tick = setInterval(function() {
    var txt = _formatCooldown(cooldownUntil);
    if (!txt) {
      clearInterval(tick);
      var cdEl = document.getElementById(displayElId);
      if (cdEl) {
        cdEl.style.display = 'none';
        var btn = document.getElementById('approvalSubmitBtn-' + formId);
        if (btn) { btn.disabled = false; btn.textContent = 'Submit for Review'; }
      }
      return;
    }
    var cdEl = document.getElementById(displayElId);
    if (cdEl) cdEl.textContent = '⏱ ' + txt;
  }, 1000);
}

// ─────────────────────────────────────────────────────────────────────────────
//  _loadApprovalData  —  accepts optional callback (Step 1 fix)
// ─────────────────────────────────────────────────────────────────────────────
function _loadApprovalData(onComplete) {
  if (!SESSION) {
    if (typeof onComplete === 'function') onComplete();
    return;
  }
  google.script.run
    .withSuccessHandler(function(r) {
      MY_FORMS      = _parseApprovalForms(r.myForms      || []);
      PENDING_FORMS = _parseApprovalForms(r.pendingForms || []);
      APPROVAL_CFG  = r.config || {};
      _updateApprovalBadge();
      if (currentPage === 'for-approval') renderForApprovalPage();
      if (typeof onComplete === 'function') onComplete();
    })
    .withFailureHandler(function(){
      if (typeof onComplete === 'function') onComplete();
    })
    .getApprovalDashboardData(SESSION.username, SESSION.roleTier);
}

// Parses assetsJson string → assets array + assetCount on every form object
function _parseApprovalForms(forms) {
  return forms.map(function(f) {
    if (!f.assets) {
      try { f.assets = JSON.parse(f.assetsJson || '[]'); }
      catch(e) { f.assets = []; }
    }
    f.assetCount = f.assets.length;
    return f;
  });
}

// ─────────────────────────────────────────────────────────────────────────────
//  openAssetListModal  —  shows assets in a form without opening the PDF
// ─────────────────────────────────────────────────────────────────────────────
function openAssetListModal(formId) {
  _assetListFormId = formId;
  var form = MY_FORMS.find(function(f){ return f.formId === formId; })
          || PENDING_FORMS.find(function(f){ return f.formId === formId; });
  if (!form) { toast('Form not found', 'err'); return; }

  var assets = form.assets;
  if (!assets) {
    try { assets = JSON.parse(form.assetsJson || '[]'); } catch(e) { assets = []; }
  }

  document.getElementById('assetListModalTitle').textContent = 'Assets in ' + form.formId;
  document.getElementById('assetListModalSubtitle').textContent =
    form.staffName + ' · ' + (form.formType || 'Enrollment');

  var tbody = document.getElementById('assetListModalBody');
  if (!tbody) return;
  tbody.innerHTML = assets.length
    ? assets.map(function(a) {
        return '<tr>'
          + '<td><span class="mono-bc">' + esc(a.barcode || a.Barcode || '—') + '</span></td>'
          + '<td><span class="type-tag">' + esc(a.type || a.Type || '—') + '</span></td>'
          + '<td>' + esc(a.brand || a.Brand || '—') + '</td>'
          + '<td class="mono-sm">' + esc(a.serial || a.Serial || '—') + '</td>'
          + '<td><span class="cond-' + (a.condition || a.Condition || 'good').toLowerCase() + '">'
          +   esc(a.condition || a.Condition || '—') + '</span></td>'
          + '</tr>';
      }).join('')
    : '<tr><td colspan="5" class="tbl-empty">No assets in this form.</td></tr>';

  openModal('assetListModal');
}

// ═══════════════════════════════════════
//  PAGINATION
// ═══════════════════════════════════════
function renderPager(id,key,total,cur){
  var el=document.getElementById(id);
  if(!el||total<=1){ if(el) el.innerHTML=''; return; }
  var show=new Set([1,total]);
  for(var i=Math.max(1,cur-2);i<=Math.min(total,cur+2);i++) show.add(i);
  var sorted=[...show].sort(function(a,b){return a-b;});
  var btns='',prev=0;
  sorted.forEach(function(p){
    if(p-prev>1) btns+='<span style="color:var(--text3);padding:0 4px">…</span>';
    btns+='<button class="page-btn'+(p===cur?' cur':'')+'" onclick="goPage(\''+key+'\','+p+')">'+p+'</button>';
    prev=p;
  });
  el.innerHTML='<span style="color:var(--text3)">Page '+cur+' of '+total+'</span>'
    +'<button class="page-btn" onclick="goPage(\''+key+'\','+(cur-1)+')" '+(cur===1?'disabled':'')+'>‹</button>'
    +btns
    +'<button class="page-btn" onclick="goPage(\''+key+'\','+(cur+1)+')" '+(cur===total?'disabled':'')+'>›</button>';
}

function goPage(key,n){
  pages[key]=n;
  var map={
    all:renderAllTable, spare:renderSpare, allocated:renderAllocated,
    activeBorrow:renderActiveBorrows, borrowPool:renderBorrowPool,
    borrowHist:renderBorrowHistory, disposal:renderDisposal,
    xfers:renderTransferTable, activity:_renderActivityTableRows
  };
  if(map[key]) map[key]();
}

function renderActivityTable() {
  if (!LOGS_FULL_LOADED) {
    var tbody = document.getElementById('tblActivity');
    if (tbody) tbody.innerHTML = '<tr><td colspan="5" class="tbl-empty">'
      + '<div class="tbl-loading-row"><div class="spinner"></div>Loading full log…</div>'
      + '</td></tr>';

    google.script.run
      .withSuccessHandler(function(r) {
        LOGS = (r && r.rows) ? r.rows : [];
        LOGS_FULL_LOADED = true;
        if (typeof _renderActivityTableRows === 'function') _renderActivityTableRows();
      })
      .withFailureHandler(function(err) { toast('Failed to load log: ' + err.message, 'err'); })
      .getActivityLogs(1, 5000);
    return;
  }
  if (typeof _renderActivityTableRows === 'function') _renderActivityTableRows();
}

// ═══════════════════════════════════════
//  PAGE NAVIGATION
// ═══════════════════════════════════════
function switchPage(p){
  closeMobileSidebar();

  currentPage = p;
  Object.keys(pages).forEach(function(k){ pages[k] = 1; });

  var pageKeyMap = {
    'active':  'activeBorrow',
    'pool':    'borrowPool',
    'history': 'borrowHist'
  };
  if (pageKeyMap[p]) pages[pageKeyMap[p]] = 1;

  document.querySelectorAll('.page').forEach(function(el){el.classList.remove('active');});
  document.querySelectorAll('.nav-item').forEach(function(el){el.classList.remove('active');});
  var pg=document.getElementById('page-'+p);
  if(pg) pg.classList.add('active');
  var nav=document.querySelector('[data-page="'+p+'"]');
  if(nav) nav.classList.add('active');
  if(p==='borrow') switchBorrowTab(borrowTab);

  var borrowSubNav = document.getElementById('borrowSubNav');
  if (borrowSubNav) {
    borrowSubNav.style.display = (p === 'borrow') ? 'block' : 'none';
  }

  var gs = document.getElementById('globalSearch');
  if(gs) gs.value = '';
  searchQuery = '';

  var isDirty = _dirtyPages.indexOf(p) >= 0;
  if (isDirty) {
    var pageEl = document.getElementById('page-' + p);
    if (pageEl) {
      var tbodies = pageEl.querySelectorAll('tbody');
      tbodies.forEach(function(tb) {
        tb.innerHTML = '<tr><td colspan="20"><div class="tbl-loading-row">'
          + '<div class="spinner"></div>Refreshing…</div></td></tr>';
      });
    }
    _dirtyPages = _dirtyPages.filter(function(d){ return d !== p; });
    var pageRenderMap = {
      'all-assets':       renderAllTable,
      'spare':            renderSpare,
      'allocated':        renderAllocated,
      'disposal':         renderDisposal,
      'transfers':        renderTransferTable,
      'activity':         renderActivityTable
    };
    var renderer = pageRenderMap[p];
    if (renderer) renderer();
  }
}
