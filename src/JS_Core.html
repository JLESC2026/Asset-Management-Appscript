// ── Location sentinels ────────────────────────────────────────────────────────
// Used as tree-grouping keys when sub-level location data is absent.
// The \x02 prefix guarantees no real data ever matches these keys.
var _LOC_NODIST   = '\x02NODIST';    // Asset at division level only
var _LOC_NOAREA   = '\x02NOAREA';    // Asset at district level only
var _LOC_NOBRANCH = '\x02NOBRANCH';  // Asset at area/district level, no branch

// ─── LOCATION RESOLUTION HELPER ──────────────────────────────────────────────
// Uses Base Office (col G / a.BaseOffice) then Asset Location (a.Location)
// as fallback for missing hierarchy levels.
// Returns null if absolutely no location data exists:
//   - Staff Assets → skip (hide)
//   - Equipment Record → show under (Unassigned)
//   - Asset Pools → always visible (tables don't filter by location)
// Returns true when a tree-key is one of the internal sentinels, not real data.
function _isSentinel(key) {
  return typeof key === 'string' && key.charCodeAt(0) === 2; // \x02 prefix
}

// ─── LOCATION RESOLUTION ─────────────────────────────────────────────────────
//  COLUMN T (a.AssetLocation, col 20) = Physical Asset Location = ABSOLUTE TRUTH
//  Cols 8–11 (Division / District / Area / Branch)  = Accountable Staff Location
//
//  Rules:
//   1. If Column T is set → it determines which Division folder the asset goes in.
//      Staff sub-levels (cols 9–11) are only used when staff Division matches Column T.
//   2. If Column T is empty → fall back to cols 8–11 as before.
//   3. Head Office staff assets: if Column T points to a field division, they go
//      into that field division. The staff's "Head Office" division is ignored.
//   4. Missing sub-levels → return empty strings (renderers apply "Assigned To" label).
//   5. Returns null only when no location data exists at all.
// ─────────────────────────────────────────────────────────────────────────────
function _resolveAssetLocation(a) {
  var assetLoc = (a.AssetLocation || '').trim();  // Column T — physical truth

  var staffDiv    = (a.Division || '').trim();    // Col 8  — staff's division
  var staffDist   = (a.District || '').trim();    // Col 9
  var staffArea   = (a.Area     || '').trim();    // Col 10
  var staffBranch = (a.Branch   || '').trim();    // Col 11

  // ── 1. Determine physical division from Column T ─────────────────────────
  var physDiv = '';

  if (assetLoc) {
    var locLower  = assetLoc.toLowerCase();
    var knownDivs = Object.keys(
      (ENG_LOCATION_DATA && ENG_LOCATION_DATA.divDistrictMap) || {}
    );
    // Try to match against a known division name
    for (var i = 0; i < knownDivs.length; i++) {
      var dLower = knownDivs[i].toLowerCase();
      if (locLower === dLower ||
          locLower.indexOf(dLower) >= 0 ||
          dLower.indexOf(locLower) >= 0) {
        physDiv = knownDivs[i];
        break;
      }
    }
    // No known-division match — use Column T verbatim as the division label
    if (!physDiv) physDiv = assetLoc;
  }

  // ── 2. Fallback chain when Column T is empty ─────────────────────────────
  if (!physDiv) physDiv = staffDiv;
  if (!physDiv) {
    var fb = (a.BaseOffice || a.Location || '').trim();
    if (fb) physDiv = fb;
  }

  // ── 3. Truly no location data ─────────────────────────────────────────────
  if (!physDiv) return null;

  // ── 4. Decide whether to trust staff sub-levels ───────────────────────────
  //  Only inherit staffDist / staffArea / staffBranch when:
  //    (a) Staff division matches the physical division, AND
  //    (b) Staff is NOT a Head Office / Central Office staff member
  //  This prevents HO staff from leaking their district into field division trees.
  var staffIsHO = !!(staffDiv && (
    staffDiv.toLowerCase().indexOf('head office')    >= 0 ||
    staffDiv.toLowerCase() === 'ho'                       ||
    staffDiv.toLowerCase().indexOf('central office') >= 0
  ));

  var colTConflicts = !!(
    assetLoc &&
    staffDiv &&
    physDiv.toLowerCase() !== staffDiv.toLowerCase()
  );

  var useStaffSub = !staffIsHO && !colTConflicts;

  return {
    div:    physDiv,
    dist:   useStaffSub ? staffDist   : '',
    area:   useStaffSub ? staffArea   : '',
    branch: useStaffSub ? staffBranch : ''
  };
}

// ── Floating tooltip init ─────────────────────────────────────────────────────
(function(){
  function _initTip(){
    if(!document.body) return;
    var tip=document.createElement('div');
    tip.id='floating-tip';
    document.body.appendChild(tip);
    document.addEventListener('mouseover',function(e){
      var el=e.target.closest('[data-tip]');
      if(!el){tip.style.display='none';return;}
      var r=el.getBoundingClientRect();
      tip.textContent=el.dataset.tip;
      tip.style.left=(r.left+r.width/2)+'px';
      tip.style.top=(r.top-6)+'px';
      tip.style.transform='translate(-50%,-100%)';
      tip.style.display='block';
    });
    document.addEventListener('mouseout',function(e){
      if(e.target.closest('[data-tip]')) tip.style.display='none';
    });
  }
  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',_initTip);
  } else {
    _initTip();
  }
})();

var _escCache = {};
function esc(s) {
  var str = String(s || '');
  if (_escCache[str] !== undefined) return _escCache[str];
  var result = str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
  if (str.length < 100) _escCache[str] = result;
  return result;
}

function fmtDate(raw){
  if(!raw) return '';
  if(/^\d{2}\/\d{2}\/\d{4}$/.test(raw)) return raw;
  if(/^\d{4}-\d{2}-\d{2}$/.test(raw)){
    var parts=raw.split('-');return parts[1]+'/'+parts[2]+'/'+parts[0];
  }
  var d=new Date(raw);
  if(!isNaN(d.getTime()))
    return String(d.getUTCMonth()+1).padStart(2,'0')+'/'+String(d.getUTCDate()).padStart(2,'0')+'/'+d.getUTCFullYear();
  return raw;
}

function renderLocPills(div,dist,area,branch){
  var p=[];
  if(div)    p.push('<span class="loc-pill lp-div">'+esc(div)+'</span>');
  if(dist)   p.push('<span class="loc-pill lp-dist">'+esc(dist)+'</span>');
  if(area)   p.push('<span class="loc-pill lp-area">'+esc(area)+'</span>');
  if(branch) p.push('<span class="loc-pill lp-branch">'+esc(branch)+'</span>');
  return p.length?'<div class="loc-pills">'+p.join('')+'</div>':'<span style="color:var(--text3)">—</span>';
}

function toast(msg,type){
  type = type || 'ok';
  var wrap = document.getElementById('toast-wrap');
  if (!wrap) return;

  var t = document.createElement('div');
  t.className = 'toast ' + type;
  var icons = { ok:'✓', err:'✕', warn:'⚠' };
  t.innerHTML =
    '<span style="font-size:1rem;flex-shrink:0">' + (icons[type] || '•') + '</span>' +
    '<span style="flex:1">' + esc(msg) + '</span>' +
    '<button onclick="this.parentNode.remove()" style="background:none;border:none;color:inherit;cursor:pointer;opacity:.6;font-size:1rem;padding:0 0 0 8px;flex-shrink:0;font-family:inherit">×</button>';

  wrap.appendChild(t);

  setTimeout(function(){
    t.style.transition = 'opacity .3s, transform .3s';
    t.style.opacity = '0';
    t.style.transform = 'translateX(20px)';
    setTimeout(function(){ if(t.parentNode) t.parentNode.removeChild(t); }, 300);
  }, 3500);

  var toasts = wrap.querySelectorAll('.toast');
  if (toasts.length > 4) {
    toasts[0].remove();
  }
}

function daysUntil(dateStr){
  if(!dateStr) return null;

  var parts = String(dateStr).split(/[-\/]/);
  var d;
  if(parts.length===3){
    if(parts[0].length===4){
      d = new Date(parseInt(parts[0],10), parseInt(parts[1],10)-1, parseInt(parts[2],10));
    } else {
      d = new Date(parseInt(parts[2],10), parseInt(parts[0],10)-1, parseInt(parts[1],10));
    }
  } else {
    d = new Date(dateStr);
  }
  if(isNaN(d.getTime())) return null;

  d.setHours(0,0,0,0);
  var today = new Date();
  today.setHours(0,0,0,0);
  return Math.round((d - today)/(1000*60*60*24));
}

function todayISO(){ return new Date().toISOString().split('T')[0]; }

//  ACCESS CONTROL
// ═══════════════════════════════════════
function isAdmin(){ return false; }
function isSenior(){
  return SESSION && SESSION.roleTier === 'senior';
}
function isFE(){
  return SESSION && !isSenior();
}
function isHO() {
  return SESSION && SESSION.roleTier === 'ho';
}

function _getScopeDistricts(){
  if(!SESSION) return [];
  if(isHO()){
    var depts = SESSION.seniorDistrictScope || [];
    if(depts.length > 0) return depts.map(function(d){return d.toLowerCase();});
    return [];
  }
  if(isSenior()){
    var scope = SESSION.seniorDistrictScope || [];
    if(scope.length > 0) return scope.map(function(d){return d.toLowerCase();});
    var ud = SESSION.userDistricts || [];
    return ud.map(function(d){return d.toLowerCase();});
  }
  var arr = (SESSION.userDistricts && SESSION.userDistricts.length > 0)
    ? SESSION.userDistricts
    : (SESSION.district ? [SESSION.district] : []);
  return arr.map(function(d){return d.toLowerCase();});
}

function _filterByScope(assets) {
  if (assets === ASSETS && _scopeCache) return _scopeCache;
  var result;

  if (isHO()) {
    // HO users see ONLY assets physically at Head Office / Central Office.
    // An asset allocated to a HO staff member but physically in Division 3
    // (Column T = "Division 3") is NOT shown here — it belongs to Division 3.
    result = assets.filter(function(a) {
      var physLoc = (a.AssetLocation || '').trim().toLowerCase();
      var assign  = (a.Assignment    || '').trim().toLowerCase();
      var div     = (a.Division      || '').trim().toLowerCase();

      if (assign === 'central office') return true;

      if (physLoc) {
        // Column T is set: only HO/Central assets
        return physLoc.indexOf('head office')    >= 0 ||
               physLoc.indexOf('central office') >= 0;
      }

      // Column T empty: fall back to staff Division
      if (div.indexOf('head office') >= 0 ||
          div.indexOf('central')     >= 0) return true;

      // No location at all → show in HO as unassigned
      var hasLoc = !!(a.District || a.Division || a.Area || a.Branch);
      return !hasLoc;
    });

  } else {
    var dists    = _getScopeDistricts();
    var userDivs = (SESSION.userDivisions || []).map(function(d) {
      return d.toLowerCase();
    });

    if (dists.length === 0 && userDivs.length === 0) {
      result = [];
    } else {
      result = assets.filter(function(a) {
        var assign  = (a.Assignment || '').trim().toLowerCase();
        if (assign === 'central office') return false;

        var physLoc = (a.AssetLocation || '').trim().toLowerCase();
        var dist    = (a.District       || '').toLowerCase();
        var div     = (a.Division       || '').toLowerCase();

        // ── Column T is present → it is the authoritative scope gate ─────
        if (physLoc) {
          // Exclude HO/Central assets from field-scoped views
          if (physLoc.indexOf('head office')    >= 0 ||
              physLoc.indexOf('central office') >= 0) return false;

          // Include if Column T matches any of the user's divisions
          for (var i = 0; i < userDivs.length; i++) {
            if (physLoc.indexOf(userDivs[i]) >= 0 ||
                userDivs[i].indexOf(physLoc)  >= 0) return true;
          }
          // Column T is set but not in user's division scope
          return false;
        }

        // ── Column T empty → fall back to cols 8–11 ──────────────────────
        // Exclude HO staff assets from field views when no Column T is set
        if (div.indexOf('head office') >= 0 ||
            div.indexOf('central')     >= 0) return false;

        if (dist) return dists.indexOf(dist) >= 0;
        if (div && userDivs.length) return userDivs.indexOf(div) >= 0;
        return isSenior();
      });
    }
  }

  if (assets === ASSETS) _scopeCache = result;
  return result;
}

function _getFEDistricts(){ return _getScopeDistricts(); }
function _filterByFEDistricts(assets){ return _filterByScope(assets); }

function openModal(id){
  document.getElementById(id).classList.add('open');
  
  setTimeout(function() {
    var modal  = document.getElementById(id);
    if (!modal) return;
    var body   = modal.querySelector('.modal-body');
    var header = modal.querySelector('.modal-hdr');
    if (body && header) {
      body.addEventListener('scroll', function() {
        header.classList.toggle('scrolled', body.scrollTop > 4);
      }, { passive: true });
    }
    var first = modal.querySelector(
      'input:not([readonly]):not([disabled]),' +
      'select:not([disabled]),' +
      'textarea:not([readonly]):not([disabled])'
    );
    if (first) first.focus();
  }, 100);
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    var openModals = document.querySelectorAll('.modal-backdrop.open');
    if (openModals.length > 0) {
      var topModal = openModals[openModals.length - 1];
      topModal.classList.remove('open');
    }
  }
  
  if (e.key === 'Tab') {
    var openModal = document.querySelector('.modal-backdrop.open .modal');
    if (!openModal) return;
    
    var focusable = openModal.querySelectorAll(
      'button:not([disabled]),input:not([disabled]),select:not([disabled]),' +
      'textarea:not([disabled]),[tabindex]:not([tabindex="-1"])'
    );
    if (focusable.length === 0) return;
    
    var first = focusable[0];
    var last = focusable[focusable.length - 1];
    
    if (e.shiftKey && document.activeElement === first) {
      e.preventDefault();
      last.focus();
    } else if (!e.shiftKey && document.activeElement === last) {
      e.preventDefault();
      first.focus();
    }
  }
  
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    var openModals = document.querySelectorAll('.modal-backdrop.open');
    if (openModals.length > 0) {
      var topModal = openModals[openModals.length - 1];
      var submitBtn = topModal.querySelector('.btn-primary:not([disabled])');
      if (submitBtn) submitBtn.click();
    }
  }
});
function closeModal(id){ document.getElementById(id).classList.remove('open'); }

function doLogin(){
  if(document.getElementById('loginBtn').disabled) return;
  
  var u=document.getElementById('authUser').value.trim();
  var p=document.getElementById('authPass').value;
  var e=document.getElementById('authError');
  var btn=document.getElementById('loginBtn');
  var sts=document.getElementById('loginStatus');

  if(!u||!p){
    e.textContent='Enter Employee ID and password.';
    e.style.display='block';
    return;
  }
  e.style.display='none';
  _lockBtn(btn);

  var msgTimer;
  if(sts){
    sts.style.opacity='1';
    sts.textContent='Connecting…';
    var msgs=['Verifying credentials…','Loading your scope…','Almost there…'];
    var mi=0;
    msgTimer=setInterval(function(){
      if(mi<msgs.length&&sts){
        sts.textContent=msgs[mi++];
      }
    },1800);
  }

  var timedOut=false;
  var timeoutId=setTimeout(function(){
    timedOut=true;
    _unlockBtn(btn);
    if(sts){sts.style.opacity='0';}
    e.textContent='Connection timed out. Check your network and try again.';
    e.style.display='block';
    clearInterval(msgTimer);
  },30000);

  google.script.run
    .withSuccessHandler(function(r){
      clearTimeout(timeoutId);
      clearInterval(msgTimer);
      if(timedOut) return;
      _unlockBtn(btn);
      if(sts) sts.style.opacity='0';
      if(!r.ok){
        e.textContent=r.error;
        e.style.display='block';
        return;
      }
      SESSION={
        username:            r.username,
        role:                r.role,
        roleTier:            r.roleTier || 'fe',
        name:                r.name||r.username,
        division:            r.division||'',
        district:            r.district||'',
        userDivisions:       r.userDivisions||[],
        userDistricts:       r.userDistricts||(r.district?[r.district]:[]),
        seniorDistrictScope: r.seniorDistrictScope||[],
        divDistrictMap:      r.divDistrictMap||{},
        area:                r.area||'',
        branch:              r.branch||''
      };
      if(r.firstLogin){
        document.getElementById('authScreen').style.display='none';
        document.getElementById('changePwdScreen').style.display='flex';
        return;
      }
      startApp();
    })
    .withFailureHandler(function(err){
      clearTimeout(timeoutId);
      clearInterval(msgTimer);
      if(timedOut) return;
      _unlockBtn(btn);
      if(sts) sts.style.opacity='0';
      e.textContent='Connection error: '+err.message;
      e.style.display='block';
    })
    .loginUser(u,p);
}

function doChangePwd(){
  var p1=document.getElementById('newPwd1').value;
  var p2=document.getElementById('newPwd2').value;
  var e=document.getElementById('pwdError');
  var btn=document.getElementById('changePwdBtn');
  if(p1!==p2){e.textContent='Passwords do not match.';e.style.display='block';return;}
  if(p1.length<4){e.textContent='Minimum 4 characters.';e.style.display='block';return;}
  e.style.display='none';
  _lockBtn(btn);
  google.script.run
    .withSuccessHandler(function(r){
      _unlockBtn(btn);
      if(!r.ok){e.textContent=r.error;e.style.display='block';return;}
      document.getElementById('changePwdScreen').style.display='none';
      startApp();
    })
    .withFailureHandler(function(err){
      _unlockBtn(btn);
      e.textContent=err.message;
      e.style.display='block';
    })
    .changePassword(SESSION.username,p1);
}

function startApp(){
  document.getElementById('authScreen').style.display='none';
  document.getElementById('changePwdScreen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('topUser').textContent=SESSION.name||SESSION.username;
  document.getElementById('topRole').textContent=SESSION.role;
  document.getElementById('dashDate').textContent=new Date().toLocaleDateString('en-PH',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

  var badge=document.getElementById('districtBadge');
  if(isSenior()){
    var divLabel = (SESSION.userDivisions&&SESSION.userDivisions.length>0)
      ? SESSION.userDivisions.join(', ')
      : (SESSION.division||'');
    if(divLabel){ badge.textContent='🏢 '+divLabel; badge.style.display='block'; }
  } else if(isFE()){
    var distList = (SESSION.userDistricts && SESSION.userDistricts.length > 0)
      ? SESSION.userDistricts
      : (SESSION.district ? [SESSION.district] : []);
    if(distList.length > 0){ badge.textContent='📍 '+distList.join(', '); badge.style.display='block'; }
  }

  loadData();
  loadDropdownData();
  loadLocationData();
}

function logout(){
  SESSION=null; ASSETS=[]; BORROWS=[]; XFERS=[]; DISPOSALS=[]; LOGS=[];
  document.getElementById('app').style.display='none';
  document.getElementById('authScreen').style.display='flex';
  document.getElementById('authPass').value='';
}

// ═══════════════════════════════════════
//  DATA LOADING
// ═══════════════════════════════════════
function loadData(){
  _scopeCache = null;
  showLoading();
  google.script.run
    .withSuccessHandler(function(r) {
      ASSETS    = r.assets;
      BORROWS   = r.borrows;
      XFERS     = r.transfers;
      DISPOSALS = r.disposals;
      LOGS      = r.logs;
      renderAll();
    })
    .withFailureHandler(function(err) { toast('Load error: ' + err.message, 'err'); })
    .getInitialData();
}

function showLoading(){
  var loadRow = '<tr><td colspan="20"><div class="tbl-loading-row">'
    +'<div class="spinner"></div>Loading data…</div></td></tr>';
  var treeLoad = '<div class="module-loading">'
    +'<div class="spinner" style="width:24px;height:24px;border-width:3px"></div>'
    +'<span>Loading…</span></div>';

  ['nbAll','nbSpare','nbAllocated','nbBorrowed','nbDisposal',
   'nbBorrowActive','nbBorrowPool','nbStaffAssets','nbEquipment'].forEach(function(id){
    var el=document.getElementById(id);
    if(el){ el.textContent=''; el.classList.add('nb-loading'); }
  });

  ['tblAll','tblSpare','tblAllocated','tblActiveBorrow',
   'tblBorrowPool','tblBorrowHistory','tblDisposal',
   'tblTransfers','tblActivity'].forEach(function(id){
    var el=document.getElementById(id);
    if(el) el.innerHTML=loadRow;
  });

  ['pagerAll','pagerSpare','pagerAllocated','pagerActiveBorrow',
   'pagerBorrowPool','pagerBorrowHistory','pagerDisposal','pagerTransfers'].forEach(function(id){
    var el=document.getElementById(id);
    if(el) el.innerHTML='';
  });

  var st=document.getElementById('staffAssetsTree');
  if(st) st.innerHTML=treeLoad;
  var eq=document.getElementById('equipTree');
  if(eq) eq.innerHTML=treeLoad;

  var ds=document.getElementById('dashStats');
  if(ds){
    ds.innerHTML=[1,2,3,4,5,6].map(function(){
      return '<div class="stat-card stat-card-skeleton">'
        +'<div class="skeleton-icon"></div>'
        +'<div class="skeleton-val"></div>'
        +'<div class="skeleton-label"></div>'
        +'</div>';
    }).join('');
  }

  var da=document.getElementById('dashActivity');
  if(da){
    da.innerHTML=[1,2,3].map(function(){
      return '<div class="activity-item">'
        +'<div class="act-dot" style="background:var(--border)"></div>'
        +'<div style="flex:1"><div class="skeleton-text"></div>'
        +'<div class="skeleton-text" style="width:60%;margin-top:5px"></div></div>'
        +'</div>';
    }).join('');
  }

  ['spareSummary','allocSummary','poolSummary','equipSummary','staffAssetsSummary'].forEach(function(id){
    var el=document.getElementById(id);
    if(el) el.innerHTML='<div class="skeleton-pill"></div><div class="skeleton-pill"></div>';
  });
}

// ═══════════════════════════════════════
//  RENDER ALL
// ═══════════════════════════════════════
function renderAll(){
  updateBadges();
  renderDashboard();

  var pageRenderMap = {
    'dashboard':        function(){},
    'all-assets':       renderAllTable,
    'spare':            renderSpare,
    'allocated':        renderAllocated,
    'borrow':           function(){
      if (borrowTab === 'active')       renderActiveBorrows();
      else if (borrowTab === 'pool')    renderBorrowPool();
      else                              renderBorrowHistory();
    },
    'disposal':         renderDisposal,
    'transfers':        renderTransferTable,
    'activity':         renderActivityTable,
    'staff-assets':     renderStaffAssets,
    'equipment-record': renderEquipmentRecord
  };

  var renderer = pageRenderMap[currentPage];
  if (renderer) renderer();

  _dirtyPages = Object.keys(pageRenderMap).filter(function(p){ return p !== currentPage && p !== 'dashboard'; });
}

function globalFilter(q){
  searchQuery = q.toLowerCase();
  ['allSearch','spareSearch','allocSearch'].forEach(function(id){
    var el = document.getElementById(id);
    if(el) el.value = '';
  });

  renderAllTable();
  renderSpare();
  renderAllocated();
}

function updateBadges(){
  ['nbAll','nbSpare','nbAllocated','nbBorrowed','nbDisposal',
   'nbBorrowActive','nbBorrowPool','nbStaffAssets','nbEquipment'].forEach(function(id){
    var el=document.getElementById(id);
    if(el) el.classList.remove('nb-loading');
  });

  var filtered = _filterByScope(ASSETS);
  var spare  = filtered.filter(function(a){return a.status==='spare';}).length;
  var alloc  = filtered.filter(function(a){return ['allocated','transfer'].indexOf(a.status)>=0;}).length;
  var borr   = filtered.filter(function(a){return a.status==='borrowed';}).length;
  var disp   = filtered.filter(function(a){return a.status==='disposal';}).length;
  var pool   = filtered.filter(function(a){return a.status==='borrow-item';}).length;
  document.getElementById('nbAll').textContent       = filtered.length;
  document.getElementById('nbSpare').textContent     = spare;
  document.getElementById('nbAllocated').textContent = alloc;
  document.getElementById('nbBorrowed').textContent  = borr + pool;
  document.getElementById('nbDisposal').textContent  = disp;
  document.getElementById('nbBorrowActive').textContent = borr;
  document.getElementById('nbBorrowPool').textContent   = pool;
  
  var nbBA = document.getElementById('nbBorrowActiveSub');
  if (nbBA) nbBA.textContent = borr;
  var nbBP = document.getElementById('nbBorrowPoolSub');
  if (nbBP) nbBP.textContent = pool;
  
  var equipCount = _filterByScope(ASSETS.filter(function(a){return a.status !== 'disposal';})).length;
  var equipEl = document.getElementById('nbEquipment');
  if(equipEl) equipEl.textContent = equipCount;
  var staffEl = document.getElementById('nbStaffAssets');
  if(staffEl) staffEl.textContent = alloc;
}

// ═══════════════════════════════════════
//  PAGINATION
// ═══════════════════════════════════════
function renderPager(id,key,total,cur){
  var el=document.getElementById(id);
  if(!el||total<=1){ if(el) el.innerHTML=''; return; }
  var show=new Set([1,total]);
  for(var i=Math.max(1,cur-2);i<=Math.min(total,cur+2);i++) show.add(i);
  var sorted=[...show].sort(function(a,b){return a-b;});
  var btns='',prev=0;
  sorted.forEach(function(p){
    if(p-prev>1) btns+='<span style="color:var(--text3);padding:0 4px">…</span>';
    btns+='<button class="page-btn'+(p===cur?' cur':'')+'" onclick="goPage(\''+key+'\','+p+')">'+p+'</button>';
    prev=p;
  });
  el.innerHTML='<span style="color:var(--text3)">Page '+cur+' of '+total+'</span>'
    +'<button class="page-btn" onclick="goPage(\''+key+'\','+(cur-1)+')" '+(cur===1?'disabled':'')+'>‹</button>'
    +btns
    +'<button class="page-btn" onclick="goPage(\''+key+'\','+(cur+1)+')" '+(cur===total?'disabled':'')+'>›</button>';
}

function goPage(key,n){
  pages[key]=n;
  var map={
    all:renderAllTable, spare:renderSpare, allocated:renderAllocated,
    activeBorrow:renderActiveBorrows, borrowPool:renderBorrowPool,
    borrowHist:renderBorrowHistory, disposal:renderDisposal,
    xfers:renderTransferTable, activity:_renderActivityTableRows
  };
  if(map[key]) map[key]();
}

function renderActivityTable() {
  if (!LOGS_FULL_LOADED) {
    var tbody = document.getElementById('tblActivity');
    if (tbody) tbody.innerHTML = '<tr><td colspan="5" class="tbl-empty">'
      + '<div class="tbl-loading-row"><div class="spinner"></div>Loading full log…</div>'
      + '</td></tr>';

    google.script.run
      .withSuccessHandler(function(r) {
        LOGS = (r && r.rows) ? r.rows : [];
        LOGS_FULL_LOADED = true;
        if (typeof _renderActivityTableRows === 'function') _renderActivityTableRows();
      })
      .withFailureHandler(function(err) { toast('Failed to load log: ' + err.message, 'err'); })
      .getActivityLogs(1, 5000);
    return;
  }
  if (typeof _renderActivityTableRows === 'function') _renderActivityTableRows();
}

// ═══════════════════════════════════════
//  PAGE NAVIGATION
// ═══════════════════════════════════════
function switchPage(p){
  closeMobileSidebar();

  currentPage = p;
  Object.keys(pages).forEach(function(k){ pages[k] = 1; });

  var pageKeyMap = {
    'active':  'activeBorrow',
    'pool':    'borrowPool',
    'history': 'borrowHist'
  };
  if (pageKeyMap[p]) pages[pageKeyMap[p]] = 1;

  document.querySelectorAll('.page').forEach(function(el){el.classList.remove('active');});
  document.querySelectorAll('.nav-item').forEach(function(el){el.classList.remove('active');});
  var pg=document.getElementById('page-'+p);
  if(pg) pg.classList.add('active');
  var nav=document.querySelector('[data-page="'+p+'"]');
  if(nav) nav.classList.add('active');
  if(p==='borrow') switchBorrowTab(borrowTab);

  var borrowSubNav = document.getElementById('borrowSubNav');
  if (borrowSubNav) {
    borrowSubNav.style.display = (p === 'borrow') ? 'block' : 'none';
  }

  var gs = document.getElementById('globalSearch');
  if(gs) gs.value = '';
  searchQuery = '';

  var isDirty = _dirtyPages.indexOf(p) >= 0;
  if (isDirty) {
    var pageEl = document.getElementById('page-' + p);
    if (pageEl) {
      var tbodies = pageEl.querySelectorAll('tbody');
      tbodies.forEach(function(tb) {
        tb.innerHTML = '<tr><td colspan="20"><div class="tbl-loading-row">'
          + '<div class="spinner"></div>Refreshing…</div></td></tr>';
      });
    }
    _dirtyPages = _dirtyPages.filter(function(d){ return d !== p; });
    var pageRenderMap = {
      'all-assets':       renderAllTable,
      'spare':            renderSpare,
      'allocated':        renderAllocated,
      'disposal':         renderDisposal,
      'transfers':        renderTransferTable,
      'activity':         renderActivityTable
    };
    var renderer = pageRenderMap[p];
    if (renderer) renderer();
  }
}

function loadDropdownData(){
  google.script.run
    .withSuccessHandler(function(d){ DROPDOWN_DATA=d; populateCategoryDropdown(); populateSupplierDropdown(); })
    .withFailureHandler(function(){})
    .getDropdownData();
}

function loadLocationData(){
  google.script.run
    .withSuccessHandler(function(d){
      ENG_LOCATION_DATA = d;
      populateAllLocationDropdowns();
      populateDistrictFilter();
    })
    .withFailureHandler(function(){})
    .getLocationData(SESSION ? SESSION.username : null);
}
function loadEngLocationData(){ loadLocationData(); }
</script>
