<script>
// ═══════════════════════════════════════
//  DASHBOARD
// ═══════════════════════════════════════
function renderDashboard(){
  var dashData = _filterByScope(ASSETS);
  var spare = dashData.filter(function(a){return a.status==='spare';}).length;
  var alloc = dashData.filter(function(a){return ['allocated','transfer'].indexOf(a.status)>=0;}).length;
  var borr  = dashData.filter(function(a){return a.status==='borrowed';}).length;
  var disp  = dashData.filter(function(a){return a.status==='disposal';}).length;
  var pool  = dashData.filter(function(a){return a.status==='borrow-item';}).length;

  var stats=[
    {label:'Total Assets', val:dashData.length, color:'var(--accent)',  icon:'📦', page:'all-assets'},
    {label:'Allocated',    val:alloc,            color:'var(--blue)',    icon:'👤', page:'allocated'},
    {label:'Spare Pool',   val:spare,            color:'var(--accent2)', icon:'🗄️', page:'spare'},
    {label:'Borrow Pool',  val:pool,             color:'var(--orange)',  icon:'📋', page:'borrow'},
    {label:'On Borrow',    val:borr,             color:'var(--yellow)',  icon:'📤', page:'borrow'},
    {label:'Disposed',     val:disp,             color:'var(--red)',     icon:'🗑️', page:'disposal'},
  ];
  document.getElementById('dashStats').innerHTML=stats.map(function(s){
    return '<div class="stat-card" onclick="switchPage(\''+s.page+'\')" style="cursor:pointer">'
      +'<div class="stat-icon" style="background:'+s.color+'22;font-size:1.1rem">'+s.icon+'</div>'
      +'<div class="stat-val" style="color:'+s.color+'">'+s.val+'</div>'
      +'<div class="stat-label">'+s.label+'</div>'
      +'</div>';
  }).join('');

  var actColors={CREATE:'var(--green)',ALLOCATE:'var(--blue)',ASSIGN:'var(--blue)',TRANSFER:'var(--cyan)',BORROW:'var(--yellow)',RETURN:'var(--green)',DISPOSE:'var(--red)',DELETE:'var(--red)',DEALLOCATE:'var(--orange)'};
  document.getElementById('dashActivity').innerHTML=LOGS.slice(0,8).map(function(l){
    return '<div class="activity-item">'
      +'<div class="act-dot" style="background:'+(actColors[l.action]||'var(--accent)')+'"></div>'
      +'<div style="flex:1;min-width:0">'
      +'<div style="font-weight:600">'+esc(l.action)+' — <span style="font-family:\'JetBrains Mono\',monospace;font-size:.78rem">'+esc(l.barcode)+'</span></div>'
      +'<div style="color:var(--text2)">'+esc(l.details)+'</div>'
      +'<div class="act-time">'+esc(l.timestamp)+'</div>'
      +'</div></div>';
  }).join('')||'<div style="color:var(--text3);padding:16px 0;text-align:center;font-size:.85rem">No recent activity</div>';

  var typeCounts={};
  dashData.forEach(function(a){ if(a.Type) typeCounts[a.Type]=(typeCounts[a.Type]||0)+1; });
  var vals=Object.values(typeCounts);
  var max=vals.length?Math.max.apply(null,vals):1;
  document.getElementById('dashTypeChart').innerHTML=Object.entries(typeCounts).sort(function(a,b){return b[1]-a[1];}).slice(0,8).map(function(entry){
    var t=entry[0], c=entry[1];
    return '<div class="type-row">'
      +'<div class="type-label" title="'+t+'">'+t+'</div>'
      +'<div class="type-track"><div class="type-fill" style="width:'+(c/max*100).toFixed(1)+'%"></div></div>'
      +'<div class="type-count">'+c+'</div>'
      +'</div>';
  }).join('');
}
</script>
