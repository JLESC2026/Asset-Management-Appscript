<script>
// ═══════════════════════════════════════
//  STAFF ASSETS MODULE
//  Field users: Division → District → Area → Branch → Staff
//  HO users:    Head Office → Department → Staff
//
//  Location resolution:
//   - Missing levels filled from BaseOffice (col G), then Asset Location
//   - Assets with NO location data at all are SKIPPED in Staff Assets
//     (they remain visible in Asset Pools and Equipment Record)
// ═══════════════════════════════════════

function renderStaffAssets() {
  _stSearchQ = (document.getElementById('staffAssetsSearch')?.value || '').toLowerCase();
  _renderStaffTree();
  _updateStaffBadge();
}

function onStaffAssetsSearch() {
  _stSearchQ = (document.getElementById('staffAssetsSearch')?.value || '').toLowerCase();
  if (_stSearchQ) _stAutoExpand();
  _renderStaffTree();
}

// ── HO-specific tree builder: Head Office → Department → EmpID ───────────────
function _buildHOStaffTree() {
  var base = _filterByScope(
    ASSETS.filter(function(a){
      return ['allocated','transfer'].indexOf(a.status) >= 0 &&
             (a.EffectiveAssignment || '').trim().toLowerCase() === 'central office';
    })
  );
  var data = _stSearchQ
    ? base.filter(function(a){
        return [a.Staff,a.EmpID,a.Designation,a.Barcode,a.Type,a.Brand,a.Department,a.BaseOffice,a.Branch,a.Location]
          .some(function(v){ return (v||'').toLowerCase().includes(_stSearchQ); });
      })
    : base;

  var tree = {}; // { dept: { empId: { name, empId, designation, department, baseOffice, assets[] } } }
  data.forEach(function(a) {
    var dept   = a.Department || '(No Department)';
    var empId  = a.EmpID      || 'UNKNOWN';
    var staff  = a.Staff      || 'Unassigned';
    var desig  = a.Designation || '';
    if (!tree[dept]) tree[dept] = {};
    if (!tree[dept][empId]) {
      tree[dept][empId] = {
        name: staff, empId: empId, designation: desig,
        department: dept, baseOffice: a.BaseOffice || '', assets: []
      };
    }
    tree[dept][empId].assets.push(a);
  });
  return tree;
}

// ── Field tree builder: Division → District → Area → Branch → EmpID ──────────
// Uses _resolveAssetLocation() so missing hierarchy levels are filled from
// BaseOffice (col G) then Asset Location. Assets with truly no location are
// skipped here (but remain visible in Asset Pools and Equipment Record).
function _buildFieldStaffTree() {
  var base = _filterByScope(
    ASSETS.filter(function(a){
      return ['allocated','transfer'].indexOf(a.status) >= 0 &&
             (a.EffectiveAssignment || '').trim().toLowerCase() === 'field office';
    })
  );
  var data = _stSearchQ
    ? base.filter(function(a){
        return [a.Staff,a.EmpID,a.Designation,a.Barcode,a.Type,a.Brand,a.Serial,
                a.Division,a.District,a.Area,a.Branch,a.BaseOffice,a.Location]
          .some(function(v){ return (v||'').toLowerCase().includes(_stSearchQ); });
      })
    : base;

  var tree = {};
  data.forEach(function(a) {
    var loc = _resolveAssetLocation(a);
    if (!loc) return;

    var div    = loc.div;
    var dist   = loc.dist   || _LOC_NODIST;
    var area   = loc.area   || _LOC_NOAREA;
    var branch = loc.branch || _LOC_NOBRANCH;
    var empId  = a.EmpID       || 'UNKNOWN';
    var staff  = a.Staff       || 'Unassigned';
    var desig  = a.Designation || '';

    if (!tree[div])                         tree[div]                         = {};
    if (!tree[div][dist])                   tree[div][dist]                   = {};
    if (!tree[div][dist][area])             tree[div][dist][area]             = {};
    if (!tree[div][dist][area][branch])     tree[div][dist][area][branch]     = {};

    if (!tree[div][dist][area][branch][empId]) {
      tree[div][dist][area][branch][empId] = {
        name: staff, empId: empId, designation: desig,
        division: div,
        district: _isSentinel(dist)   ? '' : dist,
        area:     _isSentinel(area)   ? '' : area,
        branch:   _isSentinel(branch) ? '' : branch,
        assets: []
      };
    }
    tree[div][dist][area][branch][empId].assets.push(a);
  });
  return tree;
}

function _stAutoExpand() {
  _stExpanded['__HO_ROOT__']    = true;
  _stExpanded['__FIELD_ROOT__'] = true;

  // HO departments
  var hoTree = _buildHOStaffTree();
  Object.keys(hoTree).forEach(function(dept) {
    _stExpanded['ho-dept::' + dept] = true;
  });

  // Field hierarchy
  var fieldTree = _buildFieldStaffTree();
  Object.keys(fieldTree).forEach(function(div) {
    _stExpanded[div] = true;
    Object.keys(fieldTree[div]).forEach(function(dist) {
      _stExpanded[div + '::' + dist] = true;
      Object.keys(fieldTree[div][dist]).forEach(function(area) {
        _stExpanded[div + '::' + dist + '::' + area] = true;
        Object.keys(fieldTree[div][dist][area]).forEach(function(branch) {
          _stExpanded[div + '::' + dist + '::' + area + '::' + branch] = true;
        });
      });
    });
  });
}

function stExpandAll() {
  _stExpanded['__HO_ROOT__']    = true;
  _stExpanded['__FIELD_ROOT__'] = true;

  var hoTree = _buildHOStaffTree();
  Object.keys(hoTree).forEach(function(dept) {
    _stExpanded['ho-dept::' + dept] = true;
  });

  var fieldTree = _buildFieldStaffTree();
  Object.keys(fieldTree).forEach(function(div) {
    _stExpanded[div] = true;
    Object.keys(fieldTree[div]).forEach(function(dist) {
      _stExpanded[div + '::' + dist] = true;
      Object.keys(fieldTree[div][dist]).forEach(function(area) {
        _stExpanded[div + '::' + dist + '::' + area] = true;
        Object.keys(fieldTree[div][dist][area]).forEach(function(branch) {
          _stExpanded[div + '::' + dist + '::' + area + '::' + branch] = true;
        });
      });
    });
  });
  _renderStaffTree();
}

function stCollapseAll() {
  _stExpanded = {};
  _renderStaffTree();
}

function stToggle(key) {
  _stExpanded[key] = !_stExpanded[key];
  // Rebuild the combined staff tree to avoid stale/undefined lookups
  var ho = _buildHOStaffTree();
  var field = _buildFieldStaffTree();
  _stTree = {};
  Object.keys(ho).forEach(function(k){ _stTree[k] = ho[k]; });
  Object.keys(field).forEach(function(k){ _stTree[k] = field[k]; });
  _renderStaffTree();
}

function _updateStaffBadge() {
  var total = _filterByScope(
    ASSETS.filter(function(a){ return ['allocated','transfer'].indexOf(a.status) >= 0; })
  ).length;
  var el = document.getElementById('nbStaffAssets');
  if (el) el.textContent = total;
}

// ── Main render dispatcher ────────────────────────────────────────────────────
function _renderStaffTree() {
  _stEmpRegistry = [];
  var container = document.getElementById('staffAssetsTree');
  if (!container) return;

  var showHO    = canSeeHO();
  var showField = canSeeField();

  // ── Build both trees ──────────────────────────────────────────────────────
  var hoTree    = showHO    ? _buildHOStaffTree()    : {};
  var fieldTree = showField ? _buildFieldStaffTree() : {};

  // ── Compute totals for summary pills ──────────────────────────────────────
  var hoEmp = 0, hoAssets = 0;
  Object.keys(hoTree).forEach(function(dept) {
    Object.keys(hoTree[dept]).forEach(function(empId) {
      hoEmp++;
      hoAssets += (hoTree[dept][empId].assets || []).length;
    });
  });

  var fieldEmp = 0, fieldAssets = 0;
  Object.keys(fieldTree).forEach(function(div) {
    Object.keys(fieldTree[div]).forEach(function(dist) {
      Object.keys(fieldTree[div][dist]).forEach(function(area) {
        Object.keys(fieldTree[div][dist][area]).forEach(function(branch) {
          Object.keys(fieldTree[div][dist][area][branch]).forEach(function(empId) {
            fieldEmp++;
            fieldAssets += (fieldTree[div][dist][area][branch][empId].assets || []).length;
          });
        });
      });
    });
  });

  var totalEmp    = hoEmp    + fieldEmp;
  var totalAssets = hoAssets + fieldAssets;

  var summEl = document.getElementById('staffAssetsSummary');
  if (summEl) {
    var pills = '<div class="pool-pill pool-pill-blue">' + totalAssets + ' Assets</div>'
      + '<div class="pool-pill">' + totalEmp + ' Staff Members</div>';
    if (showHO && showField) {
      pills += '<div class="pool-pill" style="background:rgba(8,145,178,.1);border-color:rgba(8,145,178,.3);color:#0891b2">' + hoAssets + ' HO</div>';
      pills += '<div class="pool-pill">' + fieldAssets + ' Field</div>';
    }
    summEl.innerHTML = pills;
  }

  if (!showHO && !showField) {
    container.innerHTML = '<div class="st-empty">No assets in scope.</div>';
    return;
  }

  var html = '<div class="st-tree">';

  // ── HEAD OFFICE ROOT NODE ─────────────────────────────────────────────────
  if (showHO) {
    var hoOpen  = !!_stExpanded['__HO_ROOT__'];
    var deptKeys = Object.keys(hoTree).sort();
    html += '<div class="st-node st-div" style="border-color:rgba(8,145,178,.3);background:rgba(8,145,178,.03)">'
      + '<div class="st-row" data-stkey="__HO_ROOT__" onclick="stToggle(this.getAttribute(\'data-stkey\'))">'
      + '<span class="st-chevron ' + (hoOpen ? 'open' : '') + '">›</span>'
      + '<span class="st-icon">🏛</span>'
      + '<span class="st-label" style="color:#0891b2">Head Office</span>'
      + '<span class="st-meta">' + deptKeys.length + ' dept(s) · ' + hoEmp + ' staff · ' + hoAssets + ' assets</span>'
      + '</div>';
    if (hoOpen) {
      html += '<div class="st-children">';
      deptKeys.forEach(function(dept) { html += _renderHODeptNode(dept, hoTree); });
      html += '</div>';
    }
    html += '</div>';
  }

  // ── FIELD OFFICE ROOT NODE ────────────────────────────────────────────────
  if (showField) {
    var fieldOpen = !!_stExpanded['__FIELD_ROOT__'];
    var divKeys   = Object.keys(fieldTree).sort();

    if (divKeys.length === 0 && !_stSearchQ) {
      // No field assets in scope — show helpful empty state inside a root node
      html += '<div class="st-node st-div">'
        + '<div class="st-row" style="cursor:default">'
        + '<span class="st-icon">🏢</span>'
        + '<span class="st-label">Field Office</span>'
        + '<span class="st-meta">No allocated assets in scope</span>'
        + '</div></div>';
    } else {
      html += '<div class="st-node st-div">'
        + '<div class="st-row" data-stkey="__FIELD_ROOT__" onclick="stToggle(this.getAttribute(\'data-stkey\'))">'
        + '<span class="st-chevron ' + (fieldOpen ? 'open' : '') + '">›</span>'
        + '<span class="st-icon">🏢</span>'
        + '<span class="st-label">Field Office</span>'
        + '<span class="st-meta">' + divKeys.length + ' division(s) · ' + fieldEmp + ' staff · ' + fieldAssets + ' assets</span>'
        + '</div>';

      if (fieldOpen) {
        html += '<div class="st-children">';
        if (divKeys.length === 0) {
          html += '<div class="st-empty-small">No assets match your search.</div>';
        } else {
          divKeys.forEach(function(div) { html += _renderStaffDivNode(div, fieldTree); });
        }
        html += '</div>';
      }
      html += '</div>';
    }
  }

  html += '</div>';
  container.innerHTML = html;
}

// ── Staff Asset Modal (handles both HO and field) ─────────────────────────────
function openStaffAssetModal(empId, div, dist, area, branch, mode) {
  _samCurrentEmpId = empId;
  var emp, assets;
  if (mode === 'ho') {
    var dept = div;
    emp = _stTree[dept] && _stTree[dept][empId];
    assets = emp ? (emp.assets||[]) : [];
  } else {
    emp = _stTree[div]?.[dist]?.[area]?.[branch]?.[empId];
    assets = emp ? (emp.assets||[]) : [];
  }
  if (!emp) { toast('Staff data not found.','err'); return; }

  document.getElementById('samStaffName').textContent  = emp.name       || '—';
  var nameEl = document.getElementById('samStaffName');
  var fullName = emp.name || '';
  nameEl.textContent = fullName;
  nameEl.title = fullName;
  nameEl.dataset.fullname = fullName;

  if (fullName.length > 32) {
    nameEl.style.cursor = 'pointer';
    nameEl.onclick = function() {
      this.style.whiteSpace = this.style.whiteSpace === 'normal' ? '' : 'normal';
      this.style.wordBreak = this.style.wordBreak === 'break-word' ? '' : 'break-word';
    };
    nameEl.title = 'Click to expand full name';
  }
  document.getElementById('samStaffId').textContent    = empId         || '—';
  document.getElementById('samStaffDesig').textContent = emp.designation || '—';

  var pd = document.getElementById('samPillDiv');
  var ps = document.getElementById('samPillDist');
  var pb = document.getElementById('samPillBranch');
  var pc = document.getElementById('samStaffCount');

  if (mode === 'ho') {
    if(pd){ pd.textContent = '🏛 Head Office'; pd.className = 'loc-pill lp-div'; }
    if(ps){ ps.textContent = div || '—'; ps.className = 'loc-pill lp-dist'; }
    if(pb){ pb.textContent = emp.baseOffice || '—'; pb.className = 'loc-pill lp-branch'; }
  } else {
    if(pd) pd.textContent = (div !== '(No Division)')  ? div    : '—';
    if(ps) ps.textContent = (dist !== '(No District)')  ? dist   : '—';
    if(pb) pb.textContent = (branch !== '(No Branch)')  ? branch : '—';
  }
  if(pc) pc.textContent = assets.length+' asset'+(assets.length!==1?'s':'');

  var tbody = document.getElementById('samAssetRows');
  if (!tbody) { openModal('staffAssetModal'); return; }
  var lcBadge = {Active:'spare',Allocated:'allocated',Transfer:'transfer',Borrow:'borrowed',Returned:'returned',Dispose:'disposal',BorrowItem:'borrow-item'};
  tbody.innerHTML = assets.length
    ? assets.map(function(a){
        var lc=a.Lifecycle||'Active';
        return '<tr>'
          +'<td><span class="mono-bc">'+esc(a.Barcode)+'</span></td>'
          +'<td><span class="type-tag">'+esc(a.Type)+'</span></td>'
          +'<td style="font-weight:600">'+(esc(a.Brand)||'—')+'</td>'
          +'<td class="mono-sm">'+(esc(a.Serial)||'—')+'</td>'
          +'<td><span class="cond-'+(a.Condition||'good').toLowerCase()+'">'+(esc(a.Condition)||'—')+'</span></td>'
          +'<td class="nowrap-sm">'+(fmtDate(a.EffDate)||'—')+'</td>'
          +'<td><button class="btn btn-secondary btn-sm" style="gap:5px;padding:5px 10px" onclick="closeModal(\'staffAssetModal\');viewAsset(\''+esc(a.Barcode)+'\')">'+_ICO.view+' View</button></td>'
          +'</tr>';
      }).join('')
    : '<tr><td colspan="7" class="tbl-empty">No assets assigned to this staff member</td></tr>';

  const modalEl = document.querySelector('#staffAssetModal .modal');
  if (modalEl) {
    modalEl.classList.toggle('modal-name-safe', (emp.name || '').length > 28);
  }
  openModal('staffAssetModal');
}

// ── Helper to render Head Office Department Nodes ────────────────────────────
window._renderHODeptNode = function(dept, hoTree) {
  var isExpanded = !!_stExpanded['ho-dept::' + dept];
  var emps = hoTree[dept];
  var empIds = Object.keys(emps).sort();
  
  var html = '<div class="st-node st-dept">'
    + '<div class="st-row" data-stkey="ho-dept::' + dept + '" onclick="stToggle(this.getAttribute(\'data-stkey\'))">'
    + '<span class="st-chevron ' + (isExpanded ? 'open' : '') + '">›</span>'
    + '<span class="st-label">' + dept + '</span>'
    + '<span class="st-meta">' + empIds.length + ' staff</span>'
    + '</div>';

  if (isExpanded) {
    html += '<div class="st-children">';
    empIds.forEach(function(eid) {
      var emp = emps[eid];
      html += _renderStaffLeaf(emp, 'ho');
    });
    html += '</div>';
  }
  html += '</div>';
  return html;
};

// ── Helper to render Field Division/District/Area/Branch Nodes ────────────────
window._renderStaffDivNode = function(div, fieldTree) {
  var isExpanded = !!_stExpanded[div];
  var dists = fieldTree[div];
  var distKeys = Object.keys(dists).sort();

  var html = '<div class="st-node st-div">'
    + '<div class="st-row" data-stkey="' + div + '" onclick="stToggle(this.getAttribute(\'data-stkey\'))">'
    + '<span class="st-chevron ' + (isExpanded ? 'open' : '') + '">›</span>'
    + '<span class="st-label">' + div + '</span>'
    + '</div>';

  if (isExpanded) {
    html += '<div class="st-children">';
    distKeys.forEach(function(dist) {
      // You would likely need similar recursive logic here for 
      // District -> Area -> Branch -> Leaf
      html += '<div class="st-empty-small">' + dist + ' (Tree continues...)</div>';
    });
    html += '</div>';
  }
  html += '</div>';
  return html;
};

// ── Helper to render the actual Staff Member (Leaf Node) ──────────────────────
window._renderStaffLeaf = function(emp, mode) {
  var key = mode + '::' + emp.empId;
  return '<div class="st-leaf" onclick="openStaffAssetModal(\''+emp.empId+'\',\''+(emp.department||emp.division)+'\',\''+(emp.district||'')+'\',\''+(emp.area||'')+'\',\''+(emp.branch||'')+'\',\''+mode+'\')">'
    + '<div class="st-staff-info">'
    + '<div class="st-staff-name">' + (emp.name || 'Unknown') + '</div>'
    + '<div class="st-staff-id">' + emp.empId + ' · ' + (emp.designation || '—') + '</div>'
    + '</div>'
    + '<div class="st-staff-badge">' + (emp.assets || []).length + '</div>'
    + '</div>';
};
</script>
