<script>
// ═══════════════════════════════════════
//  STAFF ASSETS MODULE
//  Field users: Division → District → Area → Branch → Staff
//  HO users:    Head Office → Department → Staff
//
//  Location resolution:
//   - Missing levels filled from BaseOffice (col G), then Asset Location
//   - Assets with NO location data at all are SKIPPED in Staff Assets
//     (they remain visible in Asset Pools and Equipment Record)
// ═══════════════════════════════════════

function renderStaffAssets() {
  _stSearchQ = (document.getElementById('staffAssetsSearch')?.value || '').toLowerCase();
  _renderStaffTree();
  _updateStaffBadge();
}

function onStaffAssetsSearch() {
  _stSearchQ = (document.getElementById('staffAssetsSearch')?.value || '').toLowerCase();
  if (_stSearchQ) _stAutoExpand();
  _renderStaffTree();
}

// ── HO-specific tree builder: Head Office → Department → EmpID ───────────────
function _buildHOStaffTree() {
  var base = _filterByScope(
    ASSETS.filter(function(a){
      return ['allocated','transfer'].indexOf(a.status) >= 0 &&
             (a.EffectiveAssignment || '').trim().toLowerCase() === 'central office';
    })
  );
  var data = _stSearchQ
    ? base.filter(function(a){
        return [a.Staff,a.EmpID,a.Designation,a.Barcode,a.Type,a.Brand,a.Department,a.BaseOffice,a.Branch,a.Location]
          .some(function(v){ return (v||'').toLowerCase().includes(_stSearchQ); });
      })
    : base;

  var tree = {}; // { dept: { empId: { name, empId, designation, department, baseOffice, assets[] } } }
  data.forEach(function(a) {
    var dept   = a.Department || '(No Department)';
    var empId  = a.EmpID      || 'UNKNOWN';
    var staff  = a.Staff      || 'Unassigned';
    var desig  = a.Designation || '';
    if (!tree[dept]) tree[dept] = {};
    if (!tree[dept][empId]) {
      tree[dept][empId] = {
        name: staff, empId: empId, designation: desig,
        department: dept, baseOffice: a.BaseOffice || '', assets: []
      };
    }
    tree[dept][empId].assets.push(a);
  });
  return tree;
}

// ── Field tree builder: Division → District → Area → Branch → EmpID ──────────
// Uses _resolveAssetLocation() so missing hierarchy levels are filled from
// BaseOffice (col G) then Asset Location. Assets with truly no location are
// skipped here (but remain visible in Asset Pools and Equipment Record).
function _buildFieldStaffTree() {
  var base = _filterByScope(
    ASSETS.filter(function(a){
      return ['allocated','transfer'].indexOf(a.status) >= 0 &&
             (a.EffectiveAssignment || '').trim().toLowerCase() === 'field office';
    })
  );
  var data = _stSearchQ
    ? base.filter(function(a){
        return [a.Staff,a.EmpID,a.Designation,a.Barcode,a.Type,a.Brand,a.Serial,
                a.Division,a.District,a.Area,a.Branch,a.BaseOffice,a.Location]
          .some(function(v){ return (v||'').toLowerCase().includes(_stSearchQ); });
      })
    : base;

  var tree = {};
  data.forEach(function(a) {
    var loc = _resolveAssetLocation(a);
    if (!loc) return;

    var div    = loc.div;
    var dist   = loc.dist   || _LOC_NODIST;
    var area   = loc.area   || _LOC_NOAREA;
    var branch = loc.branch || _LOC_NOBRANCH;
    var empId  = a.EmpID       || 'UNKNOWN';
    var staff  = a.Staff       || 'Unassigned';
    var desig  = a.Designation || '';

    if (!tree[div])                         tree[div]                         = {};
    if (!tree[div][dist])                   tree[div][dist]                   = {};
    if (!tree[div][dist][area])             tree[div][dist][area]             = {};
    if (!tree[div][dist][area][branch])     tree[div][dist][area][branch]     = {};

    if (!tree[div][dist][area][branch][empId]) {
      tree[div][dist][area][branch][empId] = {
        name: staff, empId: empId, designation: desig,
        division: div,
        district: _isSentinel(dist)   ? '' : dist,
        area:     _isSentinel(area)   ? '' : area,
        branch:   _isSentinel(branch) ? '' : branch,
        assets: []
      };
    }
    tree[div][dist][area][branch][empId].assets.push(a);
  });
  return tree;
}

function _stAutoExpand() {
  _stExpanded['__HO_ROOT__']    = true;
  _stExpanded['__FIELD_ROOT__'] = true;

  // HO departments
  var hoTree = _buildHOStaffTree();
  Object.keys(hoTree).forEach(function(dept) {
    _stExpanded['ho-dept::' + dept] = true;
  });

  // Field hierarchy
  var fieldTree = _buildFieldStaffTree();
  Object.keys(fieldTree).forEach(function(div) {
    _stExpanded[div] = true;
    Object.keys(fieldTree[div]).forEach(function(dist) {
      _stExpanded[div + '::' + dist] = true;
      Object.keys(fieldTree[div][dist]).forEach(function(area) {
        _stExpanded[div + '::' + dist + '::' + area] = true;
        Object.keys(fieldTree[div][dist][area]).forEach(function(branch) {
          _stExpanded[div + '::' + dist + '::' + area + '::' + branch] = true;
        });
      });
    });
  });
}

function stExpandAll() {
  _stExpanded['__HO_ROOT__']    = true;
  _stExpanded['__FIELD_ROOT__'] = true;

  var hoTree = _buildHOStaffTree();
  Object.keys(hoTree).forEach(function(dept) {
    _stExpanded['ho-dept::' + dept] = true;
  });

  var fieldTree = _buildFieldStaffTree();
  Object.keys(fieldTree).forEach(function(div) {
    _stExpanded[div] = true;
    Object.keys(fieldTree[div]).forEach(function(dist) {
      _stExpanded[div + '::' + dist] = true;
      Object.keys(fieldTree[div][dist]).forEach(function(area) {
        _stExpanded[div + '::' + dist + '::' + area] = true;
        Object.keys(fieldTree[div][dist][area]).forEach(function(branch) {
          _stExpanded[div + '::' + dist + '::' + area + '::' + branch] = true;
        });
      });
    });
  });
  _renderStaffTree();
}

function stCollapseAll() {
  _stExpanded = {};
  _renderStaffTree();
}

function stToggle(key) {
  _stExpanded[key] = !_stExpanded[key];
  _renderStaffTree(); // _renderStaffTree always updates _stTree and _stFieldTree
}

function _updateStaffBadge() {
  var total = _filterByScope(
    ASSETS.filter(function(a){ return ['allocated','transfer'].indexOf(a.status) >= 0; })
  ).length;
  var el = document.getElementById('nbStaffAssets');
  if (el) el.textContent = total;
}

// ── Main render dispatcher ────────────────────────────────────────────────────
function _renderStaffTree() {
  _stEmpRegistry = [];
  var container = document.getElementById('staffAssetsTree');
  if (!container) return;

  var showHO    = canSeeHO();
  var showField = canSeeField();

  // ── Build both trees and expose globally for openStaffAssetModal ──────────
  var hoTree    = showHO    ? _buildHOStaffTree()    : {};
  var fieldTree = showField ? _buildFieldStaffTree() : {};

  _stTree = {};
  Object.keys(hoTree).forEach(function(dept) { _stTree[dept] = hoTree[dept]; });
  window._stFieldTree = fieldTree;

  // ── Compute totals for summary pills ──────────────────────────────────────
  var hoEmp = 0, hoAssets = 0;
  Object.keys(hoTree).forEach(function(dept) {
    Object.keys(hoTree[dept]).forEach(function(empId) {
      hoEmp++;
      hoAssets += (hoTree[dept][empId].assets || []).length;
    });
  });

  var fieldEmp = 0, fieldAssets = 0;
  Object.keys(fieldTree).forEach(function(div) {
    Object.keys(fieldTree[div]).forEach(function(dist) {
      Object.keys(fieldTree[div][dist]).forEach(function(area) {
        Object.keys(fieldTree[div][dist][area]).forEach(function(branch) {
          Object.keys(fieldTree[div][dist][area][branch]).forEach(function(empId) {
            fieldEmp++;
            fieldAssets += (fieldTree[div][dist][area][branch][empId].assets || []).length;
          });
        });
      });
    });
  });

  var totalEmp    = hoEmp    + fieldEmp;
  var totalAssets = hoAssets + fieldAssets;

  var summEl = document.getElementById('staffAssetsSummary');
  if (summEl) {
    var pills = '<div class="pool-pill pool-pill-blue">' + totalAssets + ' Assets</div>'
      + '<div class="pool-pill">' + totalEmp + ' Staff Members</div>';
    if (showHO && showField) {
      pills += '<div class="pool-pill" style="background:rgba(8,145,178,.1);border-color:rgba(8,145,178,.3);color:#0891b2">' + hoAssets + ' HO</div>';
      pills += '<div class="pool-pill">' + fieldAssets + ' Field</div>';
    }
    summEl.innerHTML = pills;
  }

  if (!showHO && !showField) {
    container.innerHTML = '<div class="st-empty">No assets in scope.</div>';
    return;
  }

  var html = '<div class="st-tree">';

  // ── HEAD OFFICE ROOT NODE ─────────────────────────────────────────────────
  if (showHO) {
    var hoOpen  = !!_stExpanded['__HO_ROOT__'];
    var deptKeys = Object.keys(hoTree).sort();
    html += '<div class="st-node st-div" style="border-color:rgba(8,145,178,.3);background:rgba(8,145,178,.03)">'
      + '<div class="st-row" data-stkey="__HO_ROOT__" onclick="stToggle(this.getAttribute(\'data-stkey\'))">'
      + '<span class="st-chevron ' + (hoOpen ? 'open' : '') + '">›</span>'
      + '<span class="st-icon">🏛</span>'
      + '<span class="st-label" style="color:#0891b2">Head Office</span>'
      + '<span class="st-meta">' + deptKeys.length + ' dept(s) · ' + hoEmp + ' staff · ' + hoAssets + ' assets</span>'
      + '</div>';
    if (hoOpen) {
      html += '<div class="st-children">';
      deptKeys.forEach(function(dept) { html += _renderHODeptNode(dept, hoTree); });
      html += '</div>';
    }
    html += '</div>';
  }

  // ── FIELD OFFICE ROOT NODE ────────────────────────────────────────────────
  if (showField) {
    var fieldOpen = !!_stExpanded['__FIELD_ROOT__'];
    var divKeys   = Object.keys(fieldTree).sort();

    if (divKeys.length === 0 && !_stSearchQ) {
      // No field assets in scope — show helpful empty state inside a root node
      html += '<div class="st-node st-div">'
        + '<div class="st-row" style="cursor:default">'
        + '<span class="st-icon">🏢</span>'
        + '<span class="st-label">Field Office</span>'
        + '<span class="st-meta">No allocated assets in scope</span>'
        + '</div></div>';
    } else {
      html += '<div class="st-node st-div">'
        + '<div class="st-row" data-stkey="__FIELD_ROOT__" onclick="stToggle(this.getAttribute(\'data-stkey\'))">'
        + '<span class="st-chevron ' + (fieldOpen ? 'open' : '') + '">›</span>'
        + '<span class="st-icon">🏢</span>'
        + '<span class="st-label">Field Office</span>'
        + '<span class="st-meta">' + divKeys.length + ' division(s) · ' + fieldEmp + ' staff · ' + fieldAssets + ' assets</span>'
        + '</div>';

      if (fieldOpen) {
        html += '<div class="st-children">';
        if (divKeys.length === 0) {
          html += '<div class="st-empty-small">No assets match your search.</div>';
        } else {
          divKeys.forEach(function(div) { html += _renderStaffDivNode(div, fieldTree); });
        }
        html += '</div>';
      }
      html += '</div>';
    }
  }

  html += '</div>';
  container.innerHTML = html;
}

// DELETED: Old dual-scope and field rendering functions - replaced by unified _renderStaffTree()

// ── Staff Asset Modal (handles both HO and field) ─────────────────────────────
function openStaffAssetModal(empId, div, dist, area, branch, mode) {
  _samCurrentEmpId = empId;
  window._samDiv    = div;
  window._samDist   = dist;
  window._samArea   = area;
  window._samBranch = branch;
  window._samMode   = mode;
  var emp, assets;
  if (mode === 'ho') {
    emp = _stTree[div] && _stTree[div][empId];
    assets = emp ? (emp.assets||[]) : [];
  } else {
    // Use _stFieldTree; dist/area/branch are '' when sentinel-collapsed
    var ft        = window._stFieldTree || {};
    var distKey   = dist   || _LOC_NODIST;
    var areaKey   = area   || _LOC_NOAREA;
    var branchKey = branch || _LOC_NOBRANCH;
    var bTree = (((ft[div] || {})[distKey] || {})[areaKey] || {})[branchKey] || {};
    emp    = bTree[empId] || null;
    assets = emp ? (emp.assets||[]) : [];
  }
  if (!emp) { toast('Staff data not found.','err'); return; }

  document.getElementById('samStaffName').textContent  = emp.name       || '—';
  var nameEl = document.getElementById('samStaffName');
  var fullName = emp.name || '';
  nameEl.textContent = fullName;
  nameEl.title = fullName;
  nameEl.dataset.fullname = fullName;

  if (fullName.length > 32) {
    nameEl.style.cursor = 'pointer';
    nameEl.onclick = function() {
      this.style.whiteSpace = this.style.whiteSpace === 'normal' ? '' : 'normal';
      this.style.wordBreak = this.style.wordBreak === 'break-word' ? '' : 'break-word';
    };
    nameEl.title = 'Click to expand full name';
  }
  document.getElementById('samStaffId').textContent    = empId         || '—';
  document.getElementById('samStaffDesig').textContent = emp.designation || '—';

  var pd = document.getElementById('samPillDiv');
  var ps = document.getElementById('samPillDist');
  var pb = document.getElementById('samPillBranch');
  var pc = document.getElementById('samStaffCount');

  if (mode === 'ho') {
    if(pd){ pd.textContent = '🏛 Head Office'; pd.className = 'loc-pill lp-div'; }
    if(ps){ ps.textContent = div  || '—'; ps.className = 'loc-pill lp-dist'; }
    if(pb){ pb.textContent = (emp && emp.baseOffice) || branch || '—'; pb.className = 'loc-pill lp-branch'; }
  } else {
    if(pd) pd.textContent = div    || '—';
    if(ps) ps.textContent = dist   || '—';
    if(pb) pb.textContent = branch || '—';
  }
  if(pc) pc.textContent = assets.length+' asset'+(assets.length!==1?'s':'');

  var tbody = document.getElementById('samAssetRows');
  if (!tbody) { openModal('staffAssetModal'); return; }
  var lcBadge = {Active:'spare',Allocated:'allocated',Transfer:'transfer',Borrow:'borrowed',Returned:'returned',Dispose:'disposal',BorrowItem:'borrow-item'};
  tbody.innerHTML = assets.length
    ? assets.map(function(a){
        var lc=a.Lifecycle||'Active';
        return '<tr>'
          +'<td><span class="mono-bc">'+esc(a.Barcode)+'</span></td>'
          +'<td><span class="type-tag">'+esc(a.Type)+'</span></td>'
          +'<td style="font-weight:600">'+(esc(a.Brand)||'—')+'</td>'
          +'<td class="mono-sm">'+(esc(a.Serial)||'—')+'</td>'
          +'<td><span class="cond-'+(a.Condition||'good').toLowerCase()+'">'+(esc(a.Condition)||'—')+'</span></td>'
          +'<td class="nowrap-sm">'+(fmtDate(a.EffDate)||'—')+'</td>'
          +'<td><button class="btn btn-secondary btn-sm" style="gap:5px;padding:5px 10px" onclick="closeModal(\'staffAssetModal\');viewAsset(\''+esc(a.Barcode)+'\')">'+_ICO.view+' View</button></td>'
          +'</tr>';
      }).join('')
    : '<tr><td colspan="7" class="tbl-empty">No assets assigned to this staff member</td></tr>';

  const modalEl = document.querySelector('#staffAssetModal .modal');
  if (modalEl) {
    modalEl.classList.toggle('modal-name-safe', (emp.name || '').length > 28);
  }

  // Show/hide Transfer All button based on conditions
  var bxBtn = document.getElementById('samBulkXferBtn');
  if (bxBtn) {
    var hasAllocated = assets.some(function(a){ 
      return ['allocated','transfer'].indexOf(a.status) >= 0; 
    });
    bxBtn.style.display = (canTransfer && canTransfer() && hasAllocated) ? '' : 'none';
  }

  openModal('staffAssetModal');
}

// ═══════════════════════════════════════════════════════════════════════════
//  STAFF TREE NODE RENDERERS
// ═══════════════════════════════════════════════════════════════════════════

// ── HO: Department node ──────────────────────────────────────────────────────
window._renderHODeptNode = function(dept, hoTree) {
  var isExpanded = !!_stExpanded['ho-dept::' + dept];
  var emps = hoTree[dept];
  var empIds = Object.keys(emps).sort(function(a,b){
    return (emps[a].name||'').localeCompare(emps[b].name||'');
  });
  var totalAssets = 0;
  empIds.forEach(function(eid){ totalAssets += (emps[eid].assets||[]).length; });
  var typeCounts = {};
  empIds.forEach(function(eid){
    (emps[eid].assets||[]).forEach(function(a){ if(a.Type) typeCounts[a.Type]=(typeCounts[a.Type]||0)+1; });
  });
  var chips = Object.entries(typeCounts).sort(function(a,b){return b[1]-a[1];}).slice(0,4)
    .map(function(e){ return '<span class="st-type-chip">'+esc(e[0])+' <strong>'+e[1]+'</strong></span>'; })
    .join('');

  var html = '<div class="st-node st-emp" style="margin:2px 0 2px var(--tree-indent)">'
    + '<div class="st-row" data-stkey="ho-dept::'+esc(dept)+'" onclick="stToggle(this.getAttribute(\'data-stkey\'))">'
    + '<span class="st-chevron '+(isExpanded?'open':'')+'">›</span>'
    + '<span class="st-icon">🏢</span>'
    + '<span class="st-label">'+esc(dept)+'</span>'
    + '<div class="st-type-chips" style="flex:0 1 auto">'+chips+'</div>'
    + '<span class="st-meta">'+empIds.length+' staff · '+totalAssets+' assets</span>'
    + '</div>';
  if (isExpanded) {
    html += '<div class="st-children">';
    empIds.forEach(function(eid){ html += _renderStaffEmpInline(emps[eid], dept, '', '', '', 'ho'); });
    html += '</div>';
  }
  html += '</div>';
  return html;
};

// ── Field: Division node ──────────────────────────────────────────────────────
window._renderStaffDivNode = function(div, fieldTree) {
  var key = div;
  var isExpanded = !!_stExpanded[key];
  var dists = fieldTree[div];
  var distKeys = Object.keys(dists).sort();
  var totalStaff = 0, totalAssets = 0;
  distKeys.forEach(function(dist){
    Object.keys(dists[dist]).forEach(function(area){
      Object.keys(dists[dist][area]).forEach(function(branch){
        Object.keys(dists[dist][area][branch]).forEach(function(eid){
          totalStaff++;
          totalAssets += (dists[dist][area][branch][eid].assets||[]).length;
        });
      });
    });
  });
  var html = '<div class="st-node st-dist" style="margin:4px 0">'
    + '<div class="st-row" data-stkey="'+esc(key)+'" onclick="stToggle(this.getAttribute(\'data-stkey\'))">'
    + '<span class="st-chevron '+(isExpanded?'open':'')+'">›</span>'
    + '<span class="st-icon">🏢</span>'
    + '<span class="st-label">'+esc(div)+'</span>'
    + '<span class="st-meta">'+distKeys.length+' dist · '+totalStaff+' staff · '+totalAssets+' assets</span>'
    + '</div>';
  if (isExpanded) {
    html += '<div class="st-children">';
    distKeys.forEach(function(dist){ html += _renderStaffDistNode(div, dist, dists[dist]); });
    html += '</div>';
  }
  html += '</div>';
  return html;
};

// ── Field: District node ──────────────────────────────────────────────────────
window._renderStaffDistNode = function(div, dist, areaTree) {
  var key = div+'::'+dist;
  var isExpanded = !!_stExpanded[key];
  var areaKeys = Object.keys(areaTree).sort();
  var totalStaff = 0, totalAssets = 0;
  areaKeys.forEach(function(area){
    Object.keys(areaTree[area]).forEach(function(branch){
      Object.keys(areaTree[area][branch]).forEach(function(eid){
        totalStaff++;
        totalAssets += (areaTree[area][branch][eid].assets||[]).length;
      });
    });
  });
  var label = _isSentinel(dist)
    ? '<span style="color:var(--text3);font-style:italic">No District</span>'
    : esc(dist);
  var html = '<div class="st-node st-area">'
    + '<div class="st-row" data-stkey="'+esc(key)+'" onclick="stToggle(this.getAttribute(\'data-stkey\'))">'
    + '<span class="st-chevron '+(isExpanded?'open':'')+'">›</span>'
    + '<span class="st-icon">📍</span>'
    + '<span class="st-label">'+label+'</span>'
    + '<span class="st-meta">'
    +   areaKeys.filter(function(a){return !_isSentinel(a);}).length
    +   ' area(s) · '+totalStaff+' staff · '+totalAssets+' assets'
    + '</span>'
    + '</div>';
  if (isExpanded) {
    html += '<div class="st-children">';
    areaKeys.forEach(function(area){ html += _renderStaffAreaNode(div, dist, area, areaTree[area]); });
    html += '</div>';
  }
  html += '</div>';
  return html;
};

// ── Field: Area node ──────────────────────────────────────────────────────────
window._renderStaffAreaNode = function(div, dist, area, branchTree) {
  var key = div+'::'+dist+'::'+area;
  var isExpanded = !!_stExpanded[key];
  var branchKeys = Object.keys(branchTree).sort();
  var totalStaff = 0, totalAssets = 0;
  branchKeys.forEach(function(branch){
    Object.keys(branchTree[branch]).forEach(function(eid){
      totalStaff++;
      totalAssets += (branchTree[branch][eid].assets||[]).length;
    });
  });
  var label = _isSentinel(area)
    ? '<span style="color:var(--text3);font-style:italic">No Area</span>'
    : esc(area);
  var html = '<div class="st-node st-branch">'
    + '<div class="st-row" data-stkey="'+esc(key)+'" onclick="stToggle(this.getAttribute(\'data-stkey\'))">'
    + '<span class="st-chevron '+(isExpanded?'open':'')+'">›</span>'
    + '<span class="st-icon">📁</span>'
    + '<span class="st-label">'+label+'</span>'
    + '<span class="st-meta">'
    +   branchKeys.filter(function(b){return !_isSentinel(b);}).length
    +   ' branch(es) · '+totalStaff+' staff · '+totalAssets+' assets'
    + '</span>'
    + '</div>';
  if (isExpanded) {
    html += '<div class="st-children">';
    branchKeys.forEach(function(branch){ html += _renderStaffBranchNode(div, dist, area, branch, branchTree[branch]); });
    html += '</div>';
  }
  html += '</div>';
  return html;
};

// ── Field: Branch node ────────────────────────────────────────────────────────
window._renderStaffBranchNode = function(div, dist, area, branch, empTree) {
  var key = div+'::'+dist+'::'+area+'::'+branch;
  var isExpanded = !!_stExpanded[key];
  var empIds = Object.keys(empTree).sort(function(a,b){
    return (empTree[a].name||'').localeCompare(empTree[b].name||'');
  });
  var totalAssets = 0;
  empIds.forEach(function(eid){ totalAssets += (empTree[eid].assets||[]).length; });
  var typeCounts = {};
  empIds.forEach(function(eid){
    (empTree[eid].assets||[]).forEach(function(a){ if(a.Type) typeCounts[a.Type]=(typeCounts[a.Type]||0)+1; });
  });
  var chips = Object.entries(typeCounts).sort(function(a,b){return b[1]-a[1];}).slice(0,4)
    .map(function(e){ return '<span class="st-type-chip">'+esc(e[0])+' <strong>'+e[1]+'</strong></span>'; })
    .join('');
  var label = _isSentinel(branch)
    ? '<span style="color:var(--text3);font-style:italic">No Branch</span>'
    : esc(branch);
  // Pass empty strings for sentinels so openStaffAssetModal remaps via _LOC_* constants
  var passDist   = _isSentinel(dist)   ? '' : dist;
  var passArea   = _isSentinel(area)   ? '' : area;
  var passBranch = _isSentinel(branch) ? '' : branch;

  var html = '<div class="st-node st-emp" style="margin:2px 0 2px var(--tree-indent)">'
    + '<div class="st-row" data-stkey="'+esc(key)+'" onclick="stToggle(this.getAttribute(\'data-stkey\'))">'
    + '<span class="st-chevron '+(isExpanded?'open':'')+'">›</span>'
    + '<span class="st-icon">🏬</span>'
    + '<span class="st-label">'+label+'</span>'
    + '<div class="st-type-chips" style="flex:0 1 auto">'+chips+'</div>'
    + '<span class="st-meta">'+empIds.length+' staff · '+totalAssets+' assets</span>'
    + '</div>';
  if (isExpanded) {
    html += '<div class="st-children">';
    empIds.forEach(function(eid){
      html += _renderStaffEmpInline(empTree[eid], div, passDist, passArea, passBranch, 'field');
    });
    html += '</div>';
  }
  html += '</div>';
  return html;
};

// ── Shared: Staff member inline leaf (HO and Field) ───────────────────────────
window._renderStaffEmpInline = function(emp, div, dist, area, branch, mode) {
  var typeCounts = {};
  (emp.assets||[]).forEach(function(a){ if(a.Type) typeCounts[a.Type]=(typeCounts[a.Type]||0)+1; });
  var typeChips = Object.entries(typeCounts).sort(function(a,b){return b[1]-a[1];}).slice(0,4)
    .map(function(e){ return '<span class="st-type-chip">'+esc(e[0])+' <strong>'+e[1]+'</strong></span>'; })
    .join('');
  var passDiv    = div    || '';
  var passDist   = dist   || '';
  var passArea   = area   || '';
  var passBranch = mode === 'ho' ? (emp.baseOffice || branch || '') : (branch || '');

  return '<div class="st-emp st-emp-inline">'
    + '<div class="st-emp-row" style="cursor:pointer" onclick="openStaffAssetModal(\''
    +   esc(emp.empId||'')+'\',\''+esc(passDiv)+'\',\''+esc(passDist)
    +   '\',\''+esc(passArea)+'\',\''+esc(passBranch)+'\',\''+mode+'\')">'
    + '<span class="st-icon" style="flex-shrink:0">👤</span>'
    + '<div class="st-emp-info">'
    +   '<span class="st-label" style="font-size:.85rem;white-space:normal;word-break:break-word">'+esc(emp.name||'Unknown')+'</span>'
    +   '<div class="st-emp-sub">'
    +     '<span class="mono-sm">'+esc(emp.empId||'')+'</span>'
    +     (emp.designation ? '<span style="font-size:.7rem;color:var(--text3)"> · '+esc(emp.designation)+'</span>' : '')
    +   '</div>'
    + '</div>'
    + '<div class="st-type-chips" style="flex:0 1 auto;margin:0 8px">'+typeChips+'</div>'
    + '<span class="st-meta" style="flex-shrink:0;margin-left:auto">'+((emp.assets||[]).length)+' assets</span>'
    + '</div>'
    + '</div>';
};

// Alias for any lingering references
window._renderStaffLeaf = window._renderStaffEmpInline;

// ── BULK TRANSFER MODAL FUNCTIONS ──────────────────────────────────────────
function openBulkTransferModal(empId, div, dist, area, branch, mode) {
  closeModal('staffAssetModal');
  
  // Get from employee data
  var emp, assets;
  if (mode === 'ho') {
    emp = _stTree[div] && _stTree[div][empId];
    assets = emp ? (emp.assets||[]) : [];
  } else {
    var ft = window._stFieldTree || {};
    var distKey = dist || _LOC_NODIST;
    var areaKey = area || _LOC_NOAREA;
    var branchKey = branch || _LOC_NOBRANCH;
    var bTree = (((ft[div] || {})[distKey] || {})[areaKey] || {})[branchKey] || {};
    emp = bTree[empId] || null;
    assets = emp ? (emp.assets||[]) : [];
  }
  
  if (!emp) { toast('Staff data not found.','err'); return; }
  
  // Filter to only allocated/transfer status
  var toTransfer = assets.filter(function(a) {
    return ['allocated','transfer'].indexOf(a.status) >= 0;
  });
  
  // Store from employee info
  window._bxFromEmp = emp;
  window._bxFromAssets = toTransfer;
  window._bxSelectedAssets = toTransfer.map(function(a) { return a.Barcode; });
  
  // Populate from party
  document.getElementById('bxFromName').textContent = emp.name || '—';
  document.getElementById('bxFromEmpId').textContent = empId || '—';
  
  var locStr = '';
  if (mode === 'ho') {
    locStr = '🏛 Head Office / ' + (div || '—');
  } else {
    locStr = (div || '—') + ' / ' + (dist || '—') + ' / ' + (branch || '—');
  }
  document.getElementById('bxFromLoc').textContent = locStr;
  
  // Build asset checklist
  var listHtml = toTransfer.map(function(a, idx) {
    return '<div style="display:flex;gap:8px;align-items:center;padding:6px 10px;' +
           'background:var(--bg3);border-radius:6px;border:1px solid var(--border)">' +
           '<input type="checkbox" id="bxAsset_'+idx+'" checked style="cursor:pointer" ' +
           'data-barcode="'+esc(a.Barcode)+'" onchange="updateBxSelectedCount()"/>' +
           '<label for="bxAsset_'+idx+'" style="flex:1;cursor:pointer;display:flex;gap:8px;align-items:center;margin:0">' +
           '<span class="mono-bc" style="font-size:.75rem">'+esc(a.Barcode)+'</span>' +
           '<span style="font-size:.75rem;color:var(--text3)">'+esc(a.Brand)+' '+esc(a.Type)+'</span>' +
           '<span class="cond-'+(a.Condition||'good').toLowerCase()+'" style="font-size:.7rem;margin-left:auto">' +
           (esc(a.Condition)||'—')+'</span>' +
           '</label></div>';
  }).join('');
  
  document.getElementById('bxAssetList').innerHTML = listHtml || '<div style="color:var(--text3);font-size:.78rem">No assets to transfer</div>';
  
  // Clear form fields
  document.getElementById('bxType').value = 'Permanent';
  document.getElementById('bxEffDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('bxToEmpId').value = '';
  document.getElementById('bxToStaff').value = '';
  document.getElementById('bxToDesig').value = '';
  document.getElementById('bxToDiv').value = '';
  document.getElementById('bxToDist').value = '';
  document.getElementById('bxToArea').value = '';
  document.getElementById('bxToBranch').value = '';
  document.getElementById('bxLookupMsg').style.display = 'none';
  
  updateBxSelectedCount();
  openModal('bulkTransferModal');
}

function updateBxSelectedCount() {
  var checkboxes = document.querySelectorAll('#bxAssetList input[type="checkbox"]');
  var selected = Array.from(checkboxes).filter(function(cb) { return cb.checked; });
  window._bxSelectedAssets = selected.map(function(cb) { return cb.dataset.barcode; });
  document.getElementById('bxSelectedCount').textContent = selected.length + ' selected';
}

function onBxToEmpInput() {
  var empId = document.getElementById('bxToEmpId').value.trim();
  var msgEl = document.getElementById('bxLookupMsg');
  
  if (!empId) {
    msgEl.style.display = 'none';
    document.getElementById('bxToStaff').value = '';
    document.getElementById('bxToDesig').value = '';
    document.getElementById('bxToDiv').value = '';
    document.getElementById('bxToDist').value = '';
    document.getElementById('bxToArea').value = '';
    document.getElementById('bxToBranch').value = '';
    return;
  }
  
  var spinner = document.getElementById('bxToEmpSpinner');
  spinner.style.display = 'block';
  msgEl.style.display = 'none';
  
  // Lookup in masterlist
  var found = null;
  if (window.MASTERLIST && window.MASTERLIST.length > 0) {
    found = MASTERLIST.find(function(row) {
      return String(row[2] || '').trim().toLowerCase() === String(empId).trim().toLowerCase();
    });
  }
  
  spinner.style.display = 'none';
  
  if (!found) {
    msgEl.textContent = '❌ Employee not found in Masterlist';
    msgEl.className = 'msg-error';
    msgEl.style.background = 'rgba(239,68,68,.08)';
    msgEl.style.borderColor = 'rgba(239,68,68,.25)';
    msgEl.style.color = '#ef4444';
    msgEl.style.display = 'block';
    document.getElementById('bxToStaff').value = '';
    document.getElementById('bxToDesig').value = '';
    document.getElementById('bxToDiv').value = '';
    document.getElementById('bxToDist').value = '';
    document.getElementById('bxToArea').value = '';
    document.getElementById('bxToBranch').value = '';
    return;
  }
  
  // Populate fields (masterlist typically has: Role, Name, ID, Desig, Dept, BaseOffice, Division, District, Area, Branch...)
  var name = String(found[1] || '').trim();
  var desig = String(found[3] || '').trim();
  var div = String(found[6] || '').trim();
  var dist = String(found[7] || '').trim();
  var area = String(found[8] || '').trim();
  var branch = String(found[9] || '').trim();
  
  document.getElementById('bxToStaff').value = name;
  document.getElementById('bxToDesig').value = desig;
  document.getElementById('bxToDiv').value = _normDiv(div);
  document.getElementById('bxToDist').value = _normDist(dist);
  document.getElementById('bxToArea').value = area;
  document.getElementById('bxToBranch').value = branch;
  
  msgEl.textContent = '✓ Found: ' + name;
  msgEl.className = 'msg-success';
  msgEl.style.background = 'rgba(34,197,94,.08)';
  msgEl.style.borderColor = 'rgba(34,197,94,.25)';
  msgEl.style.color = '#22c55e';
  msgEl.style.display = 'block';
}

function submitBulkTransfer() {
  var fromEmp = window._bxFromEmp;
  var selectedBarcodes = window._bxSelectedAssets || [];
  var toEmpId = document.getElementById('bxToEmpId').value.trim();
  var toStaff = document.getElementById('bxToStaff').value.trim();
  var xferType = document.getElementById('bxType').value;
  var effDate = document.getElementById('bxEffDate').value;
  
  if (!selectedBarcodes || selectedBarcodes.length === 0) {
    toast('Select at least one asset to transfer.', 'err');
    return;
  }
  if (!toEmpId || !toStaff) {
    toast('Receiving employee ID and name are required.', 'err');
    return;
  }
  if (!effDate) {
    toast('Effectivity date is required.', 'err');
    return;
  }
  
  var btn = document.getElementById('bxSubmitBtn');
  btn.disabled = true;
  var origText = btn.innerHTML;
  btn.innerHTML = '<span class="spinner" style="width:13px;height:13px;border-width:2px;display:inline-block"></span> Processing...';
  
  var payload = {
    fromEmpId: fromEmp.empId,
    toEmpId: toEmpId,
    toName: toStaff,
    barcodes: selectedBarcodes,
    type: xferType,
    effDate: effDate
  };
  
  google.script.run
    .withSuccessHandler(function(result) {
      btn.disabled = false;
      btn.innerHTML = origText;
      if (result && result.success) {
        toast('Bulk transfer submitted successfully!', 'ok');
        closeModal('bulkTransferModal');
        refreshAssets();
      } else {
        toast('Error: ' + (result.error || 'Unknown error'), 'err');
      }
    })
    .withFailureHandler(function(err) {
      btn.disabled = false;
      btn.innerHTML = origText;
      toast('Error: ' + err.message, 'err');
    })
    .submitBulkTransfer(payload);
}
</script>
