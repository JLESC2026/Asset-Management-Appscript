<script>
// ═══════════════════════════════════════
//  ALL ASSETS TABLE
// ═══════════════════════════════════════
var _TBL_SEL = {
  spare:       {cls:'cb-spare',       hdr:'cbSpare',       btn:'btnBulkDelSpare'},
  allocated:   {cls:'cb-allocated',   hdr:'cbAllocated',   btn:'btnBulkDelAllocated'},
  activeBorrow:{cls:'cb-activeBorrow',hdr:'cbActiveBorrow',btn:'btnBulkDelActiveBorrow'},
  disposal:    {cls:'cb-disposal',    hdr:'cbDisposal',    btn:'btnBulkDelDisposal'}
};

function renderAllTable(){
  var data = _filterByScope(ASSETS);
  var q = (document.getElementById('allSearch')?.value || '').toLowerCase();
  if (q) searchQuery = '';
  if (!q) q = searchQuery;
  var fType=document.getElementById('filterType')?.value||'';
  var fLC  =document.getElementById('filterLifecycle')?.value||'';
  if(q) data=data.filter(function(a){return [a.Barcode,a.Brand,a.Type,a.Staff,a.EmpID,a.District,a.Serial].some(function(v){return (v||'').toLowerCase().includes(q);});});
  if(fType) data=data.filter(function(a){return (a.Type||'').toUpperCase()===(fType||'').toUpperCase();});
  if(fLC)   data=data.filter(function(a){return (a.Lifecycle||'').toLowerCase()===(fLC||'').toLowerCase();});
  var el=document.getElementById('filteredCount');
  if(el) el.textContent=data.length+' asset'+(data.length!==1?'s':'');
  if(!pages.all) pages.all=1;
  var totalPages=Math.ceil(data.length/PAGE_SIZE)||1;
  if(pages.all>totalPages) pages.all=totalPages;
  var slice=data.slice((pages.all-1)*PAGE_SIZE, pages.all*PAGE_SIZE);
  var tbody=document.getElementById('tblAll');
  if(!tbody) return;
  if(!data.length){ tbody.innerHTML='<tr><td colspan="11" class="tbl-empty">No assets found</td></tr>'; document.getElementById('pagerAll').innerHTML=''; return; }
  var lcBadge={Active:'spare',Allocated:'allocated',Transfer:'transfer',Borrow:'borrowed',Returned:'returned',Dispose:'disposal',BorrowItem:'borrow-item'};
  tbody.innerHTML=slice.map(function(a){
    var lc=a.Lifecycle||'Active';
    var badgeKey=lcBadge[lc]||a.status||'spare';
    return '<tr>'
      +'<td><input type="checkbox" class="cb row-cb" value="'+esc(a.Barcode)+'" onclick="checkSel()"/></td>'
      +'<td><span class="mono-bc">'+esc(a.Barcode)+'</span></td>'
      +'<td><span class="type-tag">'+esc(a.Type)+'</span></td>'
      +'<td>'+(esc(a.Brand)||'—')+'</td>'
      +'<td class="mono-sm">'+(esc(a.Serial)||'—')+'</td>'
      +'<td><span class="cond-'+(a.Condition||'good').toLowerCase()+'">'+esc(a.Condition)+'</span></td>'
      +'<td><span class="badge badge-'+badgeKey+'">'+esc(lc)+'</span></td>'
      +'<td style="max-width:130px;overflow:hidden;text-overflow:ellipsis">'+(esc(a.Staff)||'<span style="color:var(--text3)">—</span>')+'</td>'
      +'<td style="max-width:210px">'+renderLocPills(a.Division,a.District,a.Area,a.Branch)+'</td>'
      +'<td class="nowrap-sm">'+(fmtDate(a.PurchDate)||'—')+'</td>'
      +'<td><div style="display:flex;gap:4px">'
        +'<button class="btn btn-secondary btn-sm" onclick="viewAsset(\''+esc(a.Barcode)+'\')">View</button>'
        +'<button class="btn btn-secondary btn-sm" onclick="showBarcode(\''+esc(a.Barcode)+'\')">🔖</button>'
      +'</div></td>'
      +'</tr>';
  }).join('');
  renderPager('pagerAll','all',totalPages,pages.all);
}

function toggleSelectAll(){
  var all=document.getElementById('cbAll').checked;
  document.querySelectorAll('.row-cb').forEach(function(c){c.checked=all;});
  checkSel();
}

function checkSel(){
  var any=document.querySelectorAll('.row-cb:checked').length>0;
  var btn=document.getElementById('btnBulkDelete');
  if(btn) btn.style.display=any?'':'none';
}

function bulkDelete(){
  if (!canDelete()) { toast('You do not have permission to delete assets.', 'warn'); return; }
  var bcs=[...document.querySelectorAll('.row-cb:checked')].map(function(c){return c.value;});
  if(!bcs.length) return;
  if(!confirm('Delete '+bcs.length+' asset(s)? This cannot be undone.')) return;
  google.script.run
    .withSuccessHandler(function(r){ toast(r, r.startsWith('Error')?'err':'ok'); loadData(); })
    .withFailureHandler(function(err){toast(err.message,'err');})
    .deleteAssets(bcs, SESSION ? SESSION.username : '');
}

// ── Per-table bulk select / delete ────────────────────────────────────────────
function _resetTblSel(key){
  var c=_TBL_SEL[key]; if(!c) return;
  var h=document.getElementById(c.hdr); if(h) h.checked=false;
  var b=document.getElementById(c.btn); if(b) b.style.display='none';
}

function toggleSelectAllTable(key){
  var c=_TBL_SEL[key]; if(!c) return;
  var all=document.getElementById(c.hdr)?.checked||false;
  document.querySelectorAll('.'+c.cls).forEach(function(x){x.checked=all;});
  checkSelTable(key);
}

function checkSelTable(key){
  var c=_TBL_SEL[key]; if(!c) return;
  var any=document.querySelectorAll('.'+c.cls+':checked').length>0;
  var b=document.getElementById(c.btn); if(b) b.style.display=any?'':'none';
}

function bulkDeleteTable(key, callerEmpId){
  if (!canDelete()) { toast('You do not have permission to delete assets.', 'warn'); return; }
  callerEmpId = callerEmpId || SESSION.username;
  var c=_TBL_SEL[key]; if(!c) return;
  var bcs=[...document.querySelectorAll('.'+c.cls+':checked')].map(function(x){return x.value;});
  if(!bcs.length) return;
  if(!confirm('Delete '+bcs.length+' asset(s)? This cannot be undone.')) return;
  google.script.run
    .withSuccessHandler(function(r){ toast(r,r.startsWith('Error')?'err':'ok'); loadData(); })
    .withFailureHandler(function(err){toast(err.message,'err');})
    .deleteAssets(bcs, callerEmpId);
}
</script>
