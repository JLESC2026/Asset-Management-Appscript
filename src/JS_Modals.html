<script>
// ═══════════════════════════════════════════════════════════
//  JS_Modals.html  (v6.2) — All modal open / submit / action logic
//  Changes v6.2:
//    • openAddAssetModal resets Department, Base Office, Asset Location, Notes
//    • _buildEnrollConfirm shows all new fields in review step
//    • _submitEnroll passes department, baseOffice, location, notes to backend
//    • assetListModal elements referenced correctly
// ═══════════════════════════════════════════════════════════

// ─── SHARED LOOKUP HELPER ────────────────────────────────────────────────────
function _setReadOnly(id, value) {
  var el = document.getElementById(id);
  if (!el) return;
  el.value    = (value !== undefined && value !== null) ? String(value) : '';
  el.readOnly = true;
  el.style.opacity    = '0.65';
  el.style.cursor     = 'not-allowed';
  el.style.background = 'var(--bg4)';
}

function _clearReadOnly(id) {
  var el = document.getElementById(id);
  if (!el) return;
  el.value    = '';
  el.readOnly = false;
  el.style.opacity    = '';
  el.style.cursor     = '';
  el.style.background = '';
}

// ─── VIEW ASSET ──────────────────────────────────────────────────────────────
function viewAsset(barcode) {
  _viewBarcode = barcode;
  const a = ASSETS.find(x => x.Barcode === barcode);
  if (!a) { toast('Asset not found', 'err'); return; }

  switchViewTab('details');

  const lcBadge = {
    Active:'spare', Allocated:'allocated', Transfer:'transfer',
    Borrow:'borrowed', Returned:'returned', Dispose:'disposal', BorrowItem:'borrow-item'
  };
  const lc = a.Lifecycle || 'Active';

  document.getElementById('viewModalBody').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      <div style="grid-column:1/-1;display:flex;align-items:center;gap:12px;padding:12px 16px;
                  background:var(--bg3);border:1px solid var(--border);border-radius:8px">
        <div>
          <div style="font-size:.7rem;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.06em">Barcode</div>
          <div style="font-family:'JetBrains Mono',monospace;font-size:1.05rem;font-weight:700;color:var(--accent2)">${esc(a.Barcode)}</div>
        </div>
        <span class="type-tag" style="font-size:.82rem">${esc(a.Type)}</span>
        <span class="badge badge-${lcBadge[lc]||'spare'}" style="margin-left:auto">${esc(lc)}</span>
      </div>
      ${_vf('Brand', a.Brand)} ${_vf('Serial No.', a.Serial)}
      ${_vf('Condition', a.Condition)} ${_vf('Purchase Date', fmtDate(a.PurchDate))}
      ${_vf('Warranty Term', a.WarrantyTerm ? a.WarrantyTerm+' year(s)' : '')}
      ${_vf('Warranty Exp.', fmtDate(a.WarrantyVal))}
      ${_vf('Supplier', a.Supplier)}
      ${_vf('Specifications', a.Specs, true)}

      <div style="grid-column:1/-1;border-top:1px solid var(--border);padding-top:12px;margin-top:4px">
        <div style="font-size:.7rem;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">Assignment</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          ${_vf('Accountable Staff', a.Staff || 'Unassigned')}
          ${_vf('Employee ID', a.EmpID || '—')}
          ${_vf('Designation', a.Designation)}
          ${_vf('Department', a.Department)}
          ${_vf('Base Office', a.BaseOffice)}
          ${_vf('Asset Location', a.AssetLocation)}
          ${_vf('Division', a.Division)} ${_vf('District', a.District)}
          ${_vf('Area', a.Area)} ${_vf('Branch', a.Branch)}
          ${_vf('Effectivity Date', fmtDate(a.EffDate))}
        </div>
      </div>

      ${a.BorName ? `
      <div style="grid-column:1/-1;border-top:1px solid var(--border);padding-top:12px;margin-top:4px">
        <div style="font-size:.7rem;font-weight:700;color:var(--yellow);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">Active Borrow</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          ${_vf('Borrower', a.BorName)} ${_vf('Borrower ID', a.BorEmpID)}
          ${_vf('Borrow Date', fmtDate(a.BorDate))} ${_vf('Expected Return', fmtDate(a.ExpReturn))}
        </div>
      </div>` : ''}

      ${_vf('Remarks', a.Remarks, true)}
    </div>`;

  const footer = document.getElementById('viewModalFooter');
  if (!a.hasRealBarcode) {
    footer.innerHTML = `
      <div style="flex:1;padding:8px 12px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);
        border-radius:6px;font-size:.8rem;color:#fbbf24">
        ⚠ No barcode assigned — allocate, borrow, transfer and dispose are unavailable until a barcode is added.
      </div>
      <button class="btn btn-secondary" onclick="closeModal('viewModal')">Close</button>`;
    openModal('viewModal');
    return;
  }
  let actions = '';
  if (a.status === 'spare') {
    const btns = [];
    if (canAllocate()) btns.push(`<button class="btn btn-allocate btn-sm" onclick="closeModal('viewModal');openAllocateModal('${esc(a.Barcode)}')">Allocate</button>`);
    if (canBorrow())   btns.push(`<button class="btn btn-borrow btn-sm"   onclick="closeModal('viewModal');openBorrowModal('${esc(a.Barcode)}')">Borrow</button>`);
    if (canDispose())  btns.push(`<button class="btn btn-danger btn-sm"   onclick="closeModal('viewModal');openDisposalModal('${esc(a.Barcode)}')">Dispose</button>`);
    actions = btns.join('');
  } else if (a.status === 'allocated' || a.status === 'transfer') {
    const btns = [];
    if (canTransfer()) btns.push(`<button class="btn btn-transfer btn-sm" onclick="closeModal('viewModal');openTransferModal('${esc(a.Barcode)}')">Transfer</button>`);
    if (canBorrow())   btns.push(`<button class="btn btn-borrow btn-sm"   onclick="closeModal('viewModal');openBorrowModal('${esc(a.Barcode)}')">Borrow</button>`);
    if (canDealloc())  btns.push(`<button class="btn btn-spare btn-sm"    onclick="closeModal('viewModal');openDeallocModal('${esc(a.Barcode)}','${esc(a.Staff||'')}')">↩ Spare</button>`);
    if (canDispose())  btns.push(`<button class="btn btn-danger btn-sm"   onclick="closeModal('viewModal');openDisposalModal('${esc(a.Barcode)}')">Dispose</button>`);
    actions = btns.join('');
  } else if (a.status === 'borrowed') {
    if (canBorrow()) actions = `<button class="btn btn-success btn-sm" onclick="closeModal('viewModal');openReturnModal('${esc(a.Barcode)}','${esc(a.BorName||'')}')">Return Asset</button>`;
  } else if (a.status === 'borrow-item') {
    const isBorrowed = (a.Lifecycle || '').toLowerCase() === 'borrow';
    if (isBorrowed) {
      if (canBorrow()) actions = `<button class="btn btn-success btn-sm" onclick="closeModal('viewModal');openReturnModal('${esc(a.Barcode)}','${esc(a.BorName||'')}')">Return Asset</button>`;
    } else {
      if (canBorrow()) actions = `<button class="btn btn-borrow btn-sm" onclick="closeModal('viewModal');openBorrowModal('${esc(a.Barcode)}')">Borrow</button><span style="color:var(--text3);font-size:.76rem;align-self:center">Pool asset — cannot allocate</span>`;
    }
  }

  const editBtn = canEdit()
    ? `<button class="btn btn-secondary btn-sm" onclick="openEditAssetModal('${esc(a.Barcode)}')" style="color:var(--blue);border-color:rgba(59,130,246,.3)">✏ Edit Details</button>`
    : '';

  footer.innerHTML = `
    <button class="btn btn-secondary btn-sm" onclick="showBarcode('${esc(a.Barcode)}')">🔖 Barcode</button>
    ${editBtn}
    <div style="flex:1"></div>
    ${actions}
    <button class="btn btn-secondary" onclick="closeModal('viewModal')">Close</button>`;

  openModal('viewModal');
}

function openEditAssetModal(barcode) {
  const a = ASSETS.find(x => x.Barcode === barcode);
  if (!a) { toast('Asset not found', 'err'); return; }
  document.getElementById('viewModalBody').innerHTML = `
    <div style="padding:10px 14px;background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.2);border-radius:8px;font-size:.8rem;color:#60a5fa;margin-bottom:16px">
      ✏ Editing: <strong>${esc(a.Barcode)}</strong> — only basic details can be changed here.
    </div>
    <div class="form-grid" style="gap:12px">
      <div class="field"><label>Brand</label><input type="text" id="editBrand" value="${esc(a.Brand || '')}"/></div>
      <div class="field"><label>Serial No.</label><input type="text" id="editSerial" value="${esc(a.Serial || '')}"/></div>
      <div class="field"><label>Condition</label>
        <select id="editCondition">
          ${['New','Good','Damage','Repair'].map(c=>`<option value="${c}"${a.Condition===c?' selected':''}>${c}</option>`).join('')}
        </select>
      </div>
      <div class="field"><label>Purchase Date</label><input type="date" id="editPurchDate" value="${a.PurchDate || ''}"/></div>
      <div class="field form-span2"><label>Specifications / Model</label><input type="text" id="editSpecs" value="${esc(a.Specs || '')}"/></div>
      <div class="field form-span2"><label>Remarks</label><textarea id="editRemarks" style="min-height:60px">${esc(a.Remarks || '')}</textarea></div>
    </div>`;
  document.getElementById('viewModalFooter').innerHTML = `
    <button class="btn btn-secondary" onclick="viewAsset('${esc(barcode)}')">← Cancel Edit</button>
    <div style="flex:1"></div>
    <button class="btn btn-primary" onclick="submitEditAsset('${esc(barcode)}')">Save Changes</button>`;
}

function submitEditAsset(barcode) {
  const btn = document.querySelector('#viewModalFooter .btn-primary');
  _lockBtn(btn);
  google.script.run
    .withSuccessHandler(function(r) {
      _unlockBtn(btn);
      toast(r, r.startsWith('Error') ? 'err' : 'ok');
      if (!r.startsWith('Error')) { loadData(); setTimeout(() => viewAsset(barcode), 800); }
    })
    .withFailureHandler(function(err) { _unlockBtn(btn); toast(err.message, 'err'); })
    .updateAssetDetails(barcode, {
      brand:     document.getElementById('editBrand').value.trim(),
      serial:    document.getElementById('editSerial').value.trim(),
      condition: document.getElementById('editCondition').value,
      purchDate: document.getElementById('editPurchDate').value,
      specs:     document.getElementById('editSpecs').value.trim(),
      remarks:   document.getElementById('editRemarks').value.trim()
    });
}

function _vf(label, value, fullWidth) {
  const v = value ? esc(value) : '<span style="color:var(--text3)">—</span>';
  return `<div${fullWidth ? ' style="grid-column:1/-1"' : ''}>
    <div style="font-size:.7rem;font-weight:600;color:var(--text3);margin-bottom:3px">${esc(label)}</div>
    <div style="font-size:.87rem;color:var(--text)">${v}</div>
  </div>`;
}

function switchViewTab(tab) {
  document.getElementById('vmt-details').classList.toggle('active', tab === 'details');
  document.getElementById('vmt-xfer').classList.toggle('active', tab === 'xfer');
  document.getElementById('viewModalBody').style.display     = tab === 'details' ? '' : 'none';
  document.getElementById('viewModalXferBody').style.display = tab === 'xfer'    ? '' : 'none';
  if (tab === 'xfer') {
    const history = XFERS.filter(r => String(r[0]) === _viewBarcode);
    const body = document.getElementById('viewModalXferBody');
    if (!history.length) { body.innerHTML = '<div class="xfer-empty">No transfer history for this asset.</div>'; return; }
    body.innerHTML = '<div class="xfer-tl">' + history.map((r, i) => `
      <div class="xfer-item">
        <div class="xfer-dot ${i===0?'xd-start':''}"></div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <span class="xfer-from">${esc(r[2]||'—')}</span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
          <span class="xfer-to">${esc(r[10]||'—')}</span>
        </div>
        <div class="xfer-meta">
          <span>📋 ${esc(r[1]||'—')}</span><span>📅 ${fmtDate(r[18])||'—'}</span>
          <span class="badge badge-${r[19]==='Completed'?'returned':'transfer'}" style="font-size:.68rem">${esc(r[19]||'Pending')}</span>
        </div>
      </div>`).join('') + '</div>';
  }
}

// ─── BARCODE VIEWER ───────────────────────────────────────────────────────────
function showBarcode(barcode) {
  _shownBarcode = barcode;
  const body = document.getElementById('barcodeModalBody');
  body.innerHTML = '';
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.id = 'bcSvg';
  body.appendChild(svg);
  const lbl = document.createElement('div');
  lbl.textContent = barcode;
  lbl.style.cssText = 'font-family:"JetBrains Mono",monospace;font-size:.9rem;font-weight:600;letter-spacing:.05em;color:var(--text);margin-top:8px';
  body.appendChild(lbl);
  try { JsBarcode('#bcSvg', barcode, { format:'CODE128', displayValue:false, width:2, height:60, margin:10, background:'#ffffff' }); }
  catch(e) { body.innerHTML = '<div style="color:var(--text3);padding:24px">Could not render barcode</div>'; }
  openModal('barcodeModal');
}

function printBarcode() {
  const svg = document.getElementById('bcSvg');
  if (!svg) return;
  const data = new XMLSerializer().serializeToString(svg);
  const label = _shownBarcode || _viewBarcode || '';
  const w = window.open('','_blank');
  w.document.write(`<html><body style="text-align:center;padding:30px;font-family:monospace">${data}<br/><div style="font-size:14px;font-weight:700;margin-top:6px">${label}</div><script>window.onload=()=>window.print()<\/script></body></html>`);
  w.document.close();
}

// ─── ADD ASSET (STEPPER) ─────────────────────────────────────────────────────
function openAddAssetModal() {
  enrollStep = 1;
  _syncEnrollStepper();

  ['fSerial','fRemarks'].forEach(id => { const el = document.getElementById(id); if(el) el.value = ''; });
  const bcField = document.getElementById('fBarcode');
  if (bcField) { bcField.value = ''; bcField.dataset.autoGenerated = 'false'; }
  document.getElementById('fCondition').value = 'New';
  document.getElementById('fPurchDate').value = '';
  document.getElementById('fWTerm').value     = '0';
  document.getElementById('fWVal').value      = '';
  document.getElementById('fFieldType').value = '';
  document.getElementById('fFieldDetails').style.display = 'none';
  document.getElementById('laptopSpecsSection').style.display = 'none';
  document.getElementById('laptopSpecsRows').innerHTML = '';

  // NEW: Reset additional fields
  var fieldsToReset = ['fDepartment', 'fBaseOffice', 'fAssetLocation', 'fNotes'];
  fieldsToReset.forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.value = '';
  });

  // Inputter (read-only)
  document.getElementById('fEntryEmpId').value = SESSION ? SESSION.username : '';
  document.getElementById('fEntryName').value  = SESSION ? SESSION.name     : '';
  document.getElementById('enrolledByLabel').textContent = SESSION ? SESSION.name : '—';

  // Accountable person — reset to empty, unlocked
  _clearAccountablePerson();

  onCategoryChange && onCategoryChange();
  document.getElementById('fCategory').value = '';
  document.getElementById('fBrand').value    = '';
  document.getElementById('fBrand').disabled = true;
  document.getElementById('fModel').value    = '';
  document.getElementById('fModel').disabled = true;

  _fillDivSelect('fDivision');
  document.getElementById('fDistrict').innerHTML = '<option value="">Select…</option>';

  openModal('addAssetModal');
}

function _clearAccountablePerson() {
  _clearReadOnly('fAccName');
  _clearReadOnly('fAccDesig');
  var empIdEl = document.getElementById('fAccEmpId');
  if (empIdEl) empIdEl.value = '';
  var msgEl = document.getElementById('accLookupMsg');
  if (msgEl) msgEl.style.display = 'none';
}

var _accEmpTimer = null;
function onAccEmpInput() {
  clearTimeout(_accEmpTimer);
  var id = (document.getElementById('fAccEmpId') || {}).value || '';
  id = id.trim();
  if (id.length < 3) { _clearAccountablePerson(); document.getElementById('fAccEmpId').value = id; return; }
  _accEmpTimer = setTimeout(function() { _lookupAccountablePerson(id); }, 420);
}

function _lookupAccountablePerson(id) {
  var spin = document.getElementById('accLookupSpinner');
  if (spin) spin.style.display = 'block';
  google.script.run
    .withSuccessHandler(function(r) {
      if (spin) spin.style.display = 'none';
      var msg = document.getElementById('accLookupMsg');
      if (!r.ok) {
        _clearAccountablePerson();
        document.getElementById('fAccEmpId').value = id;
        if (msg) { msg.style.display='block'; msg.style.color='var(--red)'; msg.textContent = r.error; }
        return;
      }
      if (msg) msg.style.display = 'none';
      _setReadOnly('fAccName',  r.name     || ' - ');
      _setReadOnly('fAccDesig', r.position || ' - ');
    })
    .withFailureHandler(function(err) {
      if (spin) spin.style.display = 'none';
      toast(err.message, 'err');
    })
    .getEmployeeById(id);
}

function _syncEnrollStepper() {
  [1,2,3].forEach(i => {
    const ind = document.getElementById('stepInd'+i);
    if (!ind) return;
    ind.classList.remove('active','done');
    if (i < enrollStep)  ind.classList.add('done');
    if (i === enrollStep) ind.classList.add('active');
  });
  const labels = ['Step 1 of 3 — Asset Information','Step 2 of 3 — Location & Purchase','Step 3 of 3 — Confirm & Enroll'];
  const lbl = document.getElementById('enrollStepLabel');
  if (lbl) lbl.textContent = labels[enrollStep-1] || '';
  document.getElementById('enrollStep1').style.display = enrollStep===1 ? '' : 'none';
  document.getElementById('enrollStep2').style.display = enrollStep===2 ? '' : 'none';
  document.getElementById('enrollStep3').style.display = enrollStep===3 ? '' : 'none';
  document.getElementById('enrollBackBtn').style.display = enrollStep > 1 ? '' : 'none';
  document.getElementById('enrollNextBtn').textContent = enrollStep===3 ? 'Enroll Asset' : 'Next →';
}

function enrollBack() { if (enrollStep > 1) { enrollStep--; _syncEnrollStepper(); } }

function enrollNext() {
  if (enrollStep === 1) {
    if (!document.getElementById('fCategory').value) { toast('Category is required', 'warn'); return; }
    const bcVal = document.getElementById('fBarcode').value.trim();
    if (!bcVal || bcVal === 'Generating…') { toast('Please wait — barcode is being generated, or click Auto to retry', 'warn'); return; }
    if (!/^[A-Z]{2,4}-\d{4}-\d{3,4}$/.test(bcVal)) {
      const proceed = confirm('The barcode "' + bcVal + '" does not match the standard format.\n\nProceed anyway?');
      if (!proceed) return;
    }
    enrollStep = 2; _syncEnrollStepper();
  } else if (enrollStep === 2) {
    const fieldType = document.getElementById('fFieldType').value;
    if (!fieldType) { toast('Please select Field / Office type', 'warn'); return; }
    if (fieldType === 'Field') {
      if (!document.getElementById('fDivision').value) { toast('Division is required for Field assets', 'warn'); return; }
      if (!document.getElementById('fDistrict').value) { toast('District is required for Field assets', 'warn'); return; }
    }
    const wTerm = parseInt(document.getElementById('fWTerm').value, 10);
    if (isNaN(wTerm) || wTerm < 0 || wTerm > 10) { toast('Warranty term must be between 0 and 10 years', 'warn'); return; }
    if (!document.getElementById('fPurchDate').value) {
      const proceed = confirm('No Purchase Date entered. Assets without a purchase date cannot have warranty tracking. Continue anyway?');
      if (!proceed) return;
    }
    enrollStep = 3; _buildEnrollConfirm(); _syncEnrollStepper();
  } else {
    _submitEnroll();
  }
}

function _buildEnrollConfirm() {
  function getSelectLabel(id) {
    var el = document.getElementById(id);
    if (!el) return '—';
    return el.selectedOptions && el.selectedOptions[0] ? el.selectedOptions[0].text : (el.value || '—');
  }
  function getVal(id) { var el = document.getElementById(id); return el ? (el.value || '—') : '—'; }

  var accName  = getVal('fAccName');
  var accEmpId = getVal('fAccEmpId');
  var accDesig = getVal('fAccDesig');

  const rows = [
    ['Category',       getSelectLabel('fCategory')],
    ['Brand',          getSelectLabel('fBrand')],
    ['Serial No.',     getVal('fSerial')],
    ['Barcode',        getVal('fBarcode')],
    ['Condition',      getSelectLabel('fCondition')],
    ['Purch. Date',    getVal('fPurchDate') || '—'],
    ['Warranty',       (getVal('fWTerm') || '0') + ' year(s)'],
    ['─── Location ───', ''],
    ['Location Type',  getSelectLabel('fFieldType')],
    ['Department',     getVal('fDepartment')],
    ['Base Office',    getVal('fBaseOffice')],
    ['Asset Location', getVal('fAssetLocation')],
    ['Division',       getSelectLabel('fDivision')],
    ['District',       getSelectLabel('fDistrict')],
    ['Area',           getVal('fArea')],
    ['Branch',         getVal('fBranch')],
    ['─── Accountable Person ───', ''],
    ['Employee ID',    accEmpId !== '—' ? accEmpId : '(spare — no accountable person yet)'],
    ['Name',           accName  !== '—' ? accName  : '(assign during allocation)'],
    ['Designation',    accDesig !== '—' ? accDesig : '—'],
    ['─── Notes ───', ''],
    ['Remarks',        getVal('fRemarks')],
    ['Notes',          getVal('fNotes')],
  ];
  document.getElementById('enrollConfirmBody').innerHTML = `
    <div style="padding:10px 14px;background:rgba(22,163,74,.08);border:1px solid rgba(22,163,74,.2);
                border-radius:8px;font-size:.82rem;color:var(--green);margin-bottom:14px">
      ✓ Review details below. Asset will be added to the <strong>Spare Pool</strong>.
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      ${rows.map(([l,v])=>
        l.startsWith('─') ?
        `<div style="grid-column:1/-1;border-top:1px solid var(--border);padding-top:6px;font-size:.7rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">${esc(l)}</div>` :
        `<div style="background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px 12px">
          <div style="font-size:.68rem;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.04em">${esc(l)}</div>
          <div style="font-size:.86rem;color:var(--text);margin-top:2px">${esc(v)}</div>
        </div>`
      ).join('')}
    </div>`;
}

function _submitEnroll() {
  var btn = document.getElementById('enrollNextBtn');
  _lockBtn(btn);

  var specs = [];
  document.querySelectorAll('#laptopSpecsRows .spec-row').forEach(function(row) {
    var t = (row.querySelector('.spec-type') || {}).value || '';
    var v = (row.querySelector('.spec-val')  || {}).value || '';
    if (t && v) specs.push(t + ': ' + v);
  });

  var accEmpId = (document.getElementById('fAccEmpId') || {}).value || '';
  var accName  = (document.getElementById('fAccName')  || {}).value || '';
  var accDesig = (document.getElementById('fAccDesig') || {}).value || '';

  var obj = {
    entryEmpId:   document.getElementById('fEntryEmpId').value,
    entryName:    document.getElementById('fEntryName').value,
    accEmpId:     accEmpId.trim(),
    accName:      accName.trim(),
    accDesig:     accDesig.trim(),
    barcode:      document.getElementById('fBarcode').value.trim(),
    type:         document.getElementById('fCategory').value,
    brand:        document.getElementById('fBrand').value    || '',
    serial:       document.getElementById('fSerial').value   || '',
    specs:        specs.join(' | ') || (document.getElementById('fModel').value || ''),
    condition:    document.getElementById('fCondition').value,
    purchDate:    document.getElementById('fPurchDate').value,
    wTerm:        document.getElementById('fWTerm').value,
    wValidity:    document.getElementById('fWVal').value,
    supplier:     document.getElementById('fSupplier').value || '',
    // ── NEW: Department, Base Office, Asset Location, Notes ──

function genBarcode() {
  const cat = document.getElementById('fCategory').value;
  if (!cat) { toast('Select a category first', 'warn'); return; }
  const PFX = {
    'Laptop':'LTP','Laptop Adaptor':'LAD','CPU':'CPU','Monitor':'MTR','Printer':'PTR',
    'Scanner':'SCN','Scansnap':'SCN','Keyboard':'KBD','Mouse':'MSE',
    'UPS':'UPS','Camera':'CAM','Speaker':'SPR','External Drive':'EXD'
  };
  const pre = PFX[cat] || 'AST';
  const yr  = new Date().getFullYear();
  const bcField = document.getElementById('fBarcode');
  bcField.value = pre + '-' + yr + '-···';
  bcField.dataset.autoGenerated = 'false';
  bcField.style.color = 'var(--text3)';
  const frames = ['···', '—··', '·—·', '··—'];
  let fi = 0;
  const tick = setInterval(() => {
    fi = (fi + 1) % frames.length;
    if (bcField.value.endsWith(frames[(fi + frames.length - 1) % frames.length]) ||
        bcField.value.endsWith('···')) {
      bcField.value = pre + '-' + yr + '-' + frames[fi];
    } else { clearInterval(tick); }
  }, 180);
  google.script.run
    .withSuccessHandler(bc => {
      clearInterval(tick);
      if (bc.startsWith('Error')) { bcField.value = ''; bcField.style.color = ''; toast(bc, 'err'); return; }
      bcField.style.transition = 'color .25s';
      bcField.style.color = 'var(--accent2)';
      bcField.value = bc;
      bcField.dataset.autoGenerated = 'true';
      setTimeout(() => { bcField.style.color = ''; bcField.style.transition = ''; }, 600);
    })
    .withFailureHandler(err => { clearInterval(tick); bcField.value = ''; bcField.style.color = ''; toast(err.message, 'err'); })
    .generateNextBarcode(cat);
}

function recalcWarranty() {
  const pd  = document.getElementById('fPurchDate').value;
  const yrs = parseInt(document.getElementById('fWTerm').value) || 0;
  if (!pd || !yrs) { document.getElementById('fWVal').value = ''; return; }
  const d = new Date(pd);
  d.setFullYear(d.getFullYear() + yrs);
  document.getElementById('fWVal').value = d.toISOString().split('T')[0];
}

function stepWarranty(delta) {
  const inp = document.getElementById('fWTerm');
  inp.value = Math.max(0, Math.min(10, (parseInt(inp.value)||0) + delta));
  recalcWarranty();
}

        _setReadOnly('bxToDesig',  r.position   || ' - ');
        _setReadOnly('bxToDiv',    r.division   || ' - ');
        _setReadOnly('bxToDist',   r.district   || ' - ');
        _setReadOnly('bxToArea',   r.area       || ' - ');
        _setReadOnly('bxToBranch', r.baseOffice || r.branch || ' - ');
      })
      .withFailureHandler(function(err) { if(spin) spin.style.display='none'; toast(err.message,'err'); })
      .getEmployeeById(id);
  }, 420);
}

function submitBulkTransfer() {
  var selectedBarcodes = [...document.querySelectorAll('.bx-asset-cb:checked')].map(function(c){ return c.value; });
  if (!selectedBarcodes.length) { toast('Select at least one asset to transfer', 'warn'); return; }
  var toEmpId = (document.getElementById('bxToEmpId') || {}).value || '';
  var toStaff = (document.getElementById('bxToStaff') || {}).value || '';
  var effDate = (document.getElementById('bxEffDate') || {}).value || '';
  var tType   = (document.getElementById('bxType')    || {}).value || 'Permanent';
  toEmpId = toEmpId.trim(); toStaff = toStaff.trim();
  if (!toEmpId)                         { toast('Destination Employee ID is required', 'warn'); return; }
  if (!toStaff || toStaff === ' - ')    { toast('Destination Staff Name is required — look up an Employee ID first', 'warn'); return; }
  if (!effDate)                         { toast('Transfer Date is required', 'warn'); return; }
  function _cleanVal2(id) {
    var v = (document.getElementById(id) || {}).value || '';
    return v.trim() === ' - ' ? '' : v.trim();
  }
  var fromAsset = _bulkXferAssets.length ? _bulkXferAssets[0] : {};
  var confirmed = confirm('Bulk Transfer Confirmation\n\nTransferring ' + selectedBarcodes.length + ' asset(s) from:\n  ' + _bulkXferStaff + ' (' + _bulkXferEmpId + ')\n\nTo:\n  ' + toStaff + ' (' + toEmpId + ')\n\nContinue?');
  if (!confirmed) return;
  var _btn = document.getElementById('bxSubmitBtn');
  _lockBtn(_btn);
  var t = {
    transferType: tType, effDate: effDate,
    fromStaff: _bulkXferStaff, fromEmpId: _bulkXferEmpId,
    fromDesig: fromAsset.Designation || '', fromDiv: fromAsset.Division || '',
    fromDist: fromAsset.District || '', fromArea: fromAsset.Area || '',
    fromBranch: fromAsset.Branch || '', fromRemarks: '',
    toStaff, toEmpId,
    toDesig: _cleanVal2('bxToDesig'), toDiv: _cleanVal2('bxToDiv'),
    toDist: _cleanVal2('bxToDist'), toArea: _cleanVal2('bxToArea'),
    toBranch: _cleanVal2('bxToBranch'), toRemarks: ''
  };
  google.script.run
    .withSuccessHandler(function(r) {
      _unlockBtn(_btn);
      var msg        = typeof r === 'string' ? r : (r.result || r.message || 'Bulk transfer saved.');
      var fromFormId = r && r.fromFormId ? r.fromFormId : null;
      var toFormId   = r && r.toFormId   ? r.toFormId   : null;
      var isErr      = typeof msg === 'string' && msg.startsWith('Error');
      toast(msg, isErr ? 'err' : 'ok');
      if (!isErr) {
        closeModal('bulkTransferModal');
        loadData();
        if (fromFormId && toFormId) {
          _loadApprovalData(function() {
            switchPage('for-approval');
            setTimeout(function() {
              var card = document.getElementById('acard-' + toFormId);
              if (card) card.scrollIntoView({ behavior:'smooth', block:'center' });
            }, 300);
          });
        }
      }
    })
    .withFailureHandler(function(err) { _unlockBtn(_btn); toast(err.message,'err'); })
    .saveBulkTransfer(selectedBarcodes, t);
}

function openMoveOrgUnitModal(unitType, div, dist, area, branch) {
  _mouUnitType    = unitType;
  _mouCurrentPath = { div, dist, area, branch };
  const titles = { district:'Move District', area:'Move Area', branch:'Move Branch' };
  document.getElementById('mouTitle').textContent    = titles[unitType] || 'Move Unit';
  document.getElementById('mouSubtitle').textContent = 'All assets in this '+unitType+' will be updated';
  document.getElementById('mouUnitLabel').textContent = unitType;
  document.getElementById('mouCurrentLoc').textContent = [div, dist, area, branch].filter(x => x && !x.startsWith('(No')).join(' › ');
  const affected = ASSETS.filter(a => {
    if (unitType === 'district') return a.Division === div && a.District === dist;
    if (unitType === 'area')     return a.Division === div && a.District === dist && a.Area === area;
    if (unitType === 'branch')   return a.Division === div && a.District === dist && a.Area === area && a.Branch === branch;
    return false;
  });
  document.getElementById('mouAssetCount').textContent = affected.length + ' asset(s) will be affected';
  document.getElementById('mouDistField').style.display = (unitType==='area'||unitType==='branch') ? '' : 'none';
  document.getElementById('mouAreaField').style.display = unitType==='branch' ? '' : 'none';
  _fillDivSelect('mouNewDiv');
  document.getElementById('mouNewDist').innerHTML = '<option value="">Select District…</option>';
  const areaEl = document.getElementById('mouNewArea');
  if (areaEl) areaEl.value = '';
  openModal('moveOrgUnitModal');
}

      && ['allocated', 'transfer'].indexOf(a.status) >= 0;

      closeModal('staffAssetModal');
      _loadApprovalData(function() { switchPage('for-approval'); });

    return;
  }

  var rec = _eqBranchReg[idx];
  if (!rec || !rec.assets || !rec.assets.length) { toast('No assets to print.', 'warn'); return; }
  if (!_checkPrintGate(rec.assets)) {
    if (confirm('Some assets in this branch are pending supervisor approval.\n\nGo to the For Approval page?')) {
      closeModal('equipmentBranchModal');

function populateDistrictFilter() {
  const sel = document.getElementById('allocFilterDistrict');
  if (!sel) return;
  if (isSenior()) {
    const scope = SESSION.seniorDistrictScope || [];
    sel.innerHTML = '<option value="">All My Division</option>' +
      scope.map(d => `<option value="${esc(d)}">${esc(d)}</option>`).join('');
    sel.disabled = scope.length <= 1;
    return;
  }
  const feDistricts = SESSION.userDistricts || (SESSION.district ? [SESSION.district] : []);
  if (feDistricts.length === 1) {
    sel.innerHTML = `<option value="${esc(feDistricts[0])}">${esc(feDistricts[0])}</option>`;
    sel.value    = feDistricts[0];
    sel.disabled = true;
  } else {
    sel.innerHTML = '<option value="">All My Districts</option>' +
      feDistricts.map(d => `<option value="${esc(d)}">${esc(d)}</option>`).join('');
    sel.disabled = false;
  }
}

function onAllocDivisionChange() {
  const selDiv  = (document.getElementById('alDiv')?.value || '').trim();
  const distSel = document.getElementById('alDist');
  if (!distSel) return;
  const map       = ENG_LOCATION_DATA.divDistrictMap || {};
  const userDists = ENG_LOCATION_DATA.userDistricts  || [];
  if (!selDiv) {
    distSel.innerHTML = '<option value="">Select…</option>' +
      userDists.map(d => `<option>${esc(d)}</option>`).join('');
    return;
  }
  const divDists = map[selDiv] || [];
  const matched  = divDists.filter(d => userDists.some(ud => ud.toLowerCase() === d.toLowerCase()));
  const allowed  = matched.length > 0 ? matched : (divDists.length > 0 ? divDists : userDists);
  distSel.innerHTML = '<option value="">Select…</option>' +
    allowed.map(d => `<option>${esc(d)}</option>`).join('');
}

function onAllocDistrictChange() {
  const div     = (document.getElementById('alDiv')?.value || '').trim();
  const dist    = (document.getElementById('alDist')?.value || '').trim();
  const areaSel = document.getElementById('alArea');
  if (!areaSel) return;
  const areas = new Set();
  ASSETS.forEach(function(a) {
    if ((a.Division || '') === div && (a.District || '') === dist && (a.Area || '').trim())
      areas.add(a.Area.trim());
  });
  const sorted = [...areas].sort();
  areaSel.innerHTML = '<option value="">Select…</option>' +
    sorted.map(function(a) { return '<option value="' + esc(a) + '">' + esc(a) + '</option>'; }).join('') +
    '<option value="__custom__">+ Enter custom area…</option>';
  areaSel.onchange = function() {
    if (areaSel.value === '__custom__') {
      const custom = prompt('Enter area (e.g. 1, 2, 3):');
      if (custom && custom.trim()) {
        const trimmed = custom.trim();
        const opt = document.createElement('option');
        opt.value = trimmed; opt.textContent = trimmed; opt.selected = true;
        areaSel.insertBefore(opt, areaSel.lastElementChild);
        areaSel.value = trimmed;
      } else { areaSel.value = ''; }
    }
  };
}

function openAssetListModal(formId) {
  _assetListFormId = formId;
  var form = MY_FORMS.find(function(f){ return f.formId === formId; })
          || PENDING_FORMS.find(function(f){ return f.formId === formId; });
  if (!form) { toast('Form not found: ' + formId, 'err'); return; }
  var assets = form.assets;
  if (!assets) { try { assets = JSON.parse(form.assetsJson || '[]'); } catch(e) { assets = []; } }

  var titleEl = document.getElementById('assetListModalTitle');
  var subtitleEl = document.getElementById('assetListModalSubtitle');
  var tbody = document.getElementById('assetListModalBody');

  if (!titleEl || !subtitleEl || !tbody) {
    toast('Asset list modal not found in page — check Modals.html', 'err');
    return;
  }

  titleEl.textContent    = 'Assets in ' + form.formId;
  subtitleEl.textContent = (form.staffName || '—') + ' · ' + (form.formType || 'Enrollment');

  tbody.innerHTML = assets.length
    ? assets.map(function(a) {
        return '<tr>'
          + '<td><span class="mono-bc">' + esc(a.barcode || a.Barcode || '—') + '</span></td>'
          + '<td><span class="type-tag">' + esc(a.type || a.Type || '—') + '</span></td>'
          + '<td>' + esc(a.brand || a.Brand || '—') + '</td>'
          + '<td class="mono-sm">' + esc(a.serial || a.Serial || '—') + '</td>'
          + '<td><span class="cond-' + (a.condition || a.Condition || 'good').toLowerCase() + '">'
          +   esc(a.condition || a.Condition || '—') + '</span></td>'
          + '</tr>';
      }).join('')
    : '<tr><td colspan="5" class="tbl-empty">No assets in this form.</td></tr>';

  openModal('assetListModal');
}
