function esc(s){
  const d=document.createElement('div');
  d.textContent=String(s||'');
  return d.innerHTML;
}

function fmtDate(raw){
  if(!raw) return '';
  if(/^\d{2}\/\d{2}\/\d{4}$/.test(raw)) return raw;
  if(/^\d{4}-\d{2}-\d{2}$/.test(raw)){
    const[y,m,d]=raw.split('-');return`${m}/${d}/${y}`;
  }
  const d=new Date(raw);
  if(!isNaN(d.getTime()))
    return`${String(d.getUTCMonth()+1).padStart(2,'0')}/${String(d.getUTCDate()).padStart(2,'0')}/${d.getUTCFullYear()}`;
  return raw;
}

function renderLocPills(div,dist,area,branch){
  const p=[];
  if(div)    p.push(`<span class="loc-pill lp-div">${esc(div)}</span>`);
  if(dist)   p.push(`<span class="loc-pill lp-dist">${esc(dist)}</span>`);
  if(area)   p.push(`<span class="loc-pill lp-area">${esc(area)}</span>`);
  if(branch) p.push(`<span class="loc-pill lp-branch">${esc(branch)}</span>`);
  return p.length?`<div class="loc-pills">${p.join('')}</div>`:'<span style="color:var(--text3)">—</span>';
}

function toast(msg,type='ok'){
  let t=document.getElementById('toastEl');
  if(!t){
    t=document.createElement('div');
    t.id='toastEl';
    t.style.cssText='position:fixed;bottom:24px;right:24px;z-index:9999;padding:12px 20px;border-radius:8px;font-size:.88rem;font-weight:600;max-width:340px;box-shadow:0 4px 20px rgba(0,0,0,.4);transition:opacity .3s';
    document.body.appendChild(t);
  }
  t.textContent=msg;
  t.style.background=type==='err'?'rgba(239,68,68,.95)':type==='warn'?'rgba(217,119,6,.95)':'rgba(34,197,94,.95)';
  t.style.color='#fff';
  t.style.opacity='1';
  clearTimeout(t._tid);
  t._tid=setTimeout(()=>t.style.opacity='0',3200);
}

function isAdmin(){ return false; }
function isSenior(){
  return SESSION && SESSION.roleTier === 'senior';
}
function isFE(){
  return SESSION && !isSenior();
}

function _getScopeDistricts(){
  if(!SESSION) return [];
  if(isSenior()){
    const scope = SESSION.seniorDistrictScope || [];
    if(scope.length > 0) return scope.map(d => d.toLowerCase());
    const ud = SESSION.userDistricts || [];
    return ud.map(d => d.toLowerCase());
  }
  const arr = (SESSION.userDistricts && SESSION.userDistricts.length > 0)
    ? SESSION.userDistricts
    : (SESSION.district ? [SESSION.district] : []);
  return arr.map(d => d.toLowerCase());
}

function _filterByScope(assets){
  const dists = _getScopeDistricts();
  if(dists.length === 0) return [];
  return assets.filter(a => {
    const dist = (a.District||'').toLowerCase();
    if(!dist && (a.status==='spare' || a.status==='borrow-item')) return true;
    return dists.includes(dist);
  });
}

function _getFEDistricts(){ return _getScopeDistricts(); }
function _filterByFEDistricts(assets){ return _filterByScope(assets); }

function daysUntil(dateStr){
  if(!dateStr) return null;
  const d=new Date(dateStr);
  if(isNaN(d)) return null;
  return Math.round((d - new Date())/(1000*60*60*24));
}
function todayISO(){ return new Date().toISOString().split('T')[0]; }

function onFieldTypeChange(){
  const val = document.getElementById('fFieldType')?.value;
  const det = document.getElementById('fFieldDetails');
  if (!det) return;
  det.style.display = (val === 'Field') ? '' : 'none';
  if (val !== 'Field') {
    ['fDivision','fDistrict','fArea','fBranch'].forEach(id=>{
      const el=document.getElementById(id); if(el) el.value='';
    });
  }
}

function stepWarranty(delta){
  const inp=document.getElementById('fWTerm');
  inp.value=Math.min(10,Math.max(0,(parseInt(inp.value)||0)+delta));
  recalcWarranty();
}
function recalcWarranty(){
  const d=new Date(document.getElementById('fPurchDate').value);
  const y=parseInt(document.getElementById('fWTerm').value);
  if(isNaN(d.getTime())||!y||y<1) return;
  d.setFullYear(d.getFullYear()+y);
  document.getElementById('fWVal').value=d.toISOString().split('T')[0];
}

function doLogin(){
  const u=document.getElementById('authUser').value.trim();
  const p=document.getElementById('authPass').value;
  const e=document.getElementById('authError');
  const b=document.getElementById('loginBtnTxt');
  if(!u||!p){e.textContent='Enter Employee ID and password.';e.style.display='block';return;}
  e.style.display='none'; b.textContent='Signing in…';
  google.script.run
    .withSuccessHandler(r=>{
      b.textContent='Sign In';
      if(!r.ok){e.textContent=r.error;e.style.display='block';return;}
      SESSION={
        username:     r.username,
        role:         r.role,
        roleTier:     r.roleTier || 'fe',
        name:         r.name||r.username,
        division:     r.division||'',
        district:     r.district||'',
        userDivisions:r.userDivisions||[],
        userDistricts:r.userDistricts||(r.district?[r.district]:[]),
        seniorDistrictScope: r.seniorDistrictScope||[],
        divDistrictMap: r.divDistrictMap||{},
        area:         r.area||'',
        branch:       r.branch||''
      };
      if(r.firstLogin){
        document.getElementById('authScreen').style.display='none';
        document.getElementById('changePwdScreen').style.display='flex';
        return;
      }
      startApp();
    })
    .withFailureHandler(err=>{
      b.textContent='Sign In';
      e.textContent='Connection error: '+err.message;
      e.style.display='block';
    })
    .loginUser(u,p);
}

function doChangePwd(){
  const p1=document.getElementById('newPwd1').value;
  const p2=document.getElementById('newPwd2').value;
  const e=document.getElementById('pwdError');
  if(p1!==p2){e.textContent='Passwords do not match.';e.style.display='block';return;}
  if(p1.length<4){e.textContent='Minimum 4 characters.';e.style.display='block';return;}
  e.style.display='none';
  google.script.run
    .withSuccessHandler(r=>{
      if(!r.ok){e.textContent=r.error;e.style.display='block';return;}
      document.getElementById('changePwdScreen').style.display='none';
      startApp();
    })
    .withFailureHandler(err=>{e.textContent=err.message;e.style.display='block';})
    .changePassword(SESSION.username,p1);
}

function startApp(){
  document.getElementById('authScreen').style.display='none';
  document.getElementById('changePwdScreen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('topUser').textContent=SESSION.name||SESSION.username;
  document.getElementById('topRole').textContent=SESSION.role;
  document.getElementById('dashDate').textContent=new Date().toLocaleDateString('en-PH',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

  const badge=document.getElementById('districtBadge');
  if(isSenior()){
    const divLabel = (SESSION.userDivisions&&SESSION.userDivisions.length>0)
      ? SESSION.userDivisions.join(', ')
      : (SESSION.division||'');
    if(divLabel){
      badge.textContent='🏢 '+divLabel;
      badge.style.display='block';
    }
  } else if(isFE()){
    const distList = (SESSION.userDistricts && SESSION.userDistricts.length > 0)
      ? SESSION.userDistricts
      : (SESSION.district ? [SESSION.district] : []);
    if(distList.length > 0){
      badge.textContent = '📍 ' + distList.join(', ');
      badge.style.display = 'block';
    }
  }

  loadData();
  loadDropdownData();
  loadLocationData();
}

function logout(){
  SESSION=null; ASSETS=[]; BORROWS=[]; XFERS=[]; DISPOSALS=[]; LOGS=[];
  document.getElementById('app').style.display='none';
  document.getElementById('authScreen').style.display='flex';
  document.getElementById('authPass').value='';
}

function loadData(){
  showLoading();
  let pending=5;
  function done(){ if(--pending===0) renderAll(); }
  google.script.run
    .withSuccessHandler(r=>{ if(r.success) ASSETS=r.data||[]; done(); })
    .withFailureHandler(err=>{ toast('Load error: '+err.message,'err'); done(); })
    .getAllAssets();
  google.script.run
    .withSuccessHandler(r=>{ LOGS=(r&&r.rows)?r.rows:(Array.isArray(r)?r:[]); renderActivityTable(); done(); })
    .withFailureHandler(()=>done())
    .getActivityLogs();
  google.script.run
    .withSuccessHandler(r=>{ BORROWS=r||[]; done(); })
    .withFailureHandler(()=>done())
    .getBorrowData();
  google.script.run
    .withSuccessHandler(r=>{ XFERS=r||[]; renderTransferTable(); done(); })
    .withFailureHandler(()=>done())
    .getTransferData();
  google.script.run
    .withSuccessHandler(r=>{ DISPOSALS=r||[]; done(); })
    .withFailureHandler(()=>done())
    .getDisposalData();
}

function showLoading(){
  ['nbAll','nbSpare','nbAllocated','nbBorrowed','nbDisposal',
   'nbBorrowActive','nbBorrowPool'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.textContent='…';

  if(el) el.innerHTML='<tr class="loading-row"><td colspan="20"><div style="display:flex;align-items:center;justify-content:center;gap:10px"><div class="spinner"></div>Loading…</div></td></tr>';

  const spare  = filtered.filter(a=>a.status==='spare').length;

  const borr   = filtered.filter(a=>a.status==='borrowed').length;

  const pool   = filtered.filter(a=>a.status==='borrow-item').length;

function renderDashboard(){
  const dashData = _filterByScope(ASSETS);
  const spare = dashData.filter(a=>a.status==='spare').length;
  const alloc = dashData.filter(a=>['allocated','transfer'].includes(a.status)).length;
  const borr  = dashData.filter(a=>a.status==='borrowed').length;
  const disp  = dashData.filter(a=>a.status==='disposal').length;
  const pool  = dashData.filter(a=>a.status==='borrow-item').length;

  const stats=[
    {label:'Total Assets', val:dashData.length, color:'var(--accent)',  icon:'📦', page:'all-assets'},
    {label:'Allocated',    val:alloc,            color:'var(--blue)',    icon:'👤', page:'allocated'},
    {label:'Spare Pool',   val:spare,            color:'var(--accent2)', icon:'🗄️', page:'spare'},
    {label:'Borrow Pool',  val:pool,             color:'var(--orange)',  icon:'📋', page:'borrow'},
    {label:'On Borrow',    val:borr,             color:'var(--yellow)',  icon:'📤', page:'borrow'},
    {label:'Disposed',     val:disp,             color:'var(--red)',     icon:'🗑️', page:'disposal'},
  ];
  document.getElementById('dashStats').innerHTML=stats.map(s=>`
    <div class="stat-card" onclick="switchPage('${s.page}')" style="cursor:pointer">
      <div class="stat-icon" style="background:${s.color}22;font-size:1.1rem">${s.icon}</div>
      <div class="stat-val" style="color:${s.color}">${s.val}</div>
      <div class="stat-label">${s.label}</div>
    </div>`).join('');

  const actColors={CREATE:'var(--green)',ALLOCATE:'var(--blue)',ASSIGN:'var(--blue)',TRANSFER:'var(--cyan)',BORROW:'var(--yellow)',RETURN:'var(--green)',DISPOSE:'var(--red)',DELETE:'var(--red)',DEALLOCATE:'var(--orange)'};
  document.getElementById('dashActivity').innerHTML=LOGS.slice(0,8).map(l=>`
    <div class="activity-item">
      <div class="act-dot" style="background:${actColors[l.action]||'var(--accent)'}"></div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:600">${esc(l.action)} — <span style="font-family:'JetBrains Mono',monospace;font-size:.78rem">${esc(l.barcode)}</span></div>
        <div style="color:var(--text2)">${esc(l.details)}</div>
        <div class="act-time">${esc(l.timestamp)}</div>
      </div>
    </div>`).join('')||'<div style="color:var(--text3);padding:16px 0;text-align:center;font-size:.85rem">No recent activity</div>';

  const typeCounts={};
  dashData.forEach(a=>{ if(a.Type) typeCounts[a.Type]=(typeCounts[a.Type]||0)+1; });
  const max=Math.max(...Object.values(typeCounts),1);
  document.getElementById('dashTypeChart').innerHTML=Object.entries(typeCounts).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([t,c])=>`
    <div class="type-row">
      <div class="type-label" title="${t}">${t}</div>
      <div class="type-track"><div class="type-fill" style="width:${(c/max*100).toFixed(1)}%"></div></div>
      <div class="type-count">${c}</div>
    </div>`).join('');
}

// ═══════════════════════════════════════
//  ALL ASSETS TABLE
// ═══════════════════════════════════════
function renderAllTable(){
  let data = _filterByScope(ASSETS);
  const q=(document.getElementById('allSearch')?.value||'').toLowerCase()||searchQuery;
  const fType=document.getElementById('filterType')?.value||'';
  const fLC  =document.getElementById('filterLifecycle')?.value||'';
  if(q) data=data.filter(a=>[a.Barcode,a.Brand,a.Type,a.Staff,a.EmpID,a.District,a.Serial].some(v=>(v||'').toLowerCase().includes(q)));
  if(fType) data=data.filter(a=>(a.Type||'').toUpperCase()===(fType||'').toUpperCase());
  if(fLC)   data=data.filter(a=>(a.Lifecycle||'').toLowerCase()===(fLC||'').toLowerCase());
  const el=document.getElementById('filteredCount');
  if(el) el.textContent=`${data.length} asset${data.length!==1?'s':''}`;
  if(!pages.all) pages.all=1;
  const totalPages=Math.ceil(data.length/PAGE_SIZE)||1;
  if(pages.all>totalPages) pages.all=totalPages;
  const slice=data.slice((pages.all-1)*PAGE_SIZE, pages.all*PAGE_SIZE);
  const tbody=document.getElementById('tblAll');
  if(!tbody) return;
  if(!data.length){ tbody.innerHTML='<tr><td colspan="11" class="tbl-empty">No assets found</td></tr>'; document.getElementById('pagerAll').innerHTML=''; return; }
  const lcBadge={Active:'spare',Allocated:'allocated',Transfer:'transfer',Borrow:'borrowed',Returned:'returned',Dispose:'disposal',BorrowItem:'borrow-item'};
  tbody.innerHTML=slice.map(a=>{
    const lc=a.Lifecycle||'Active';
    const badgeKey=lcBadge[lc]||a.status||'spare';
    return`<tr>
      <td><input type="checkbox" class="cb row-cb" value="${esc(a.Barcode)}" onclick="checkSel()"/></td>
      <td><span class="mono-bc">${esc(a.Barcode)}</span></td>
      <td><span class="type-tag">${esc(a.Type)}</span></td>
      <td>${esc(a.Brand)||'—'}</td>
      <td class="mono-sm">${esc(a.Serial)||'—'}</td>
      <td><span class="cond-${(a.Condition||'good').toLowerCase()}">${esc(a.Condition)}</span></td>
      <td><span class="badge badge-${badgeKey}">${esc(lc)}</span></td>
      <td style="max-width:130px;overflow:hidden;text-overflow:ellipsis">${esc(a.Staff)||'<span style="color:var(--text3)">—</span>'}</td>
      <td style="max-width:210px">${renderLocPills(a.Division,a.District,a.Area,a.Branch)}</td>
      <td class="nowrap-sm">${fmtDate(a.PurchDate)||'—'}</td>
      <td>
        <div style="display:flex;gap:4px">
          <button class="btn btn-secondary btn-sm" onclick="viewAsset('${esc(a.Barcode)}')">View</button>
          <button class="btn btn-secondary btn-sm" onclick="showBarcode('${esc(a.Barcode)}')">🔖</button>
        </div>
      </td>
    </tr>`;
  }).join('');
  renderPager('pagerAll','all',totalPages,pages.all);
}

  const all=document.getElementById('cbAll').checked;
  document.querySelectorAll('.row-cb').forEach(c=>c.checked=all);
  checkSel();
}
function checkSel(){
  if(!isSenior()) return;
  const any=document.querySelectorAll('.row-cb:checked').length>0;
  const btn=document.getElementById('btnBulkDelete');
  if(btn) btn.style.display=any?'':'none';
}
function bulkDelete(){
  if(!isSenior()){ toast('Only senior staff can delete assets.','err'); return; }
  const bcs=[...document.querySelectorAll('.row-cb:checked')].map(c=>c.value);
  if(!bcs.length) return;
  if(!confirm(`Delete ${bcs.length} asset(s)? This cannot be undone.`)) return;
  google.script.run
    .withSuccessHandler(r=>{ toast(r, r.startsWith('Error')?'err':'ok'); loadData(); })
    .withFailureHandler(err=>toast(err.message,'err'))
    .deleteAssets(bcs);
}

(function(){
  function _initTip(){
    if(!document.body) return;
    const tip=document.createElement('div');
    tip.id='floating-tip';
    document.body.appendChild(tip);
    document.addEventListener('mouseover',e=>{
      const el=e.target.closest('[data-tip]');
      if(!el){tip.style.display='none';return;}
      const r=el.getBoundingClientRect();
      tip.textContent=el.dataset.tip;
      tip.style.left=(r.left+r.width/2)+'px';
      tip.style.top=(r.top-6)+'px';
      tip.style.transform='translate(-50%,-100%)';
      tip.style.display='block';
    });
    document.addEventListener('mouseout',e=>{
      if(e.target.closest('[data-tip]')) tip.style.display='none';
    });
  }
  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',_initTip);
  } else {
    _initTip();
  }
})();

  if(!logs.length){ tbody.innerHTML='<tr><td colspan="5" class="tbl-empty">No activity yet</td></tr>'; return; }
  const colors={CREATE:'var(--green)',ALLOCATE:'var(--blue)',ASSIGN:'var(--blue)',TRANSFER:'var(--cyan)',BORROW:'var(--yellow)',RETURN:'var(--green)',DISPOSE:'var(--red)',DELETE:'var(--red)',DEALLOCATE:'var(--orange)'};
  tbody.innerHTML=logs.map(l=>`<tr>
    <td class="nowrap-sm" style="color:var(--text3)">${esc(l.timestamp)}</td>
    <td><span class="badge" style="background:${colors[l.action]||'var(--accent)'}22;color:${colors[l.action]||'var(--accent)'}">${esc(l.action)}</span></td>
    <td><span class="mono-bc">${esc(l.barcode)}</span></td>
    <td style="color:var(--text2)">${esc(l.details)}</td>
    <td style="font-size:.76rem;color:var(--text3);font-family:'JetBrains Mono',monospace">${esc(l.performer||'—')}</td>
  </tr>`).join('');
}

function renderPager(id,key,total,cur){
  const el=document.getElementById(id);
  if(!el||total<=1){ if(el) el.innerHTML=''; return; }
  const show=new Set([1,total]);
  for(let i=Math.max(1,cur-2);i<=Math.min(total,cur+2);i++) show.add(i);
  const sorted=[...show].sort((a,b)=>a-b);
  let btns='',prev=0;
  for(const p of sorted){
    if(p-prev>1) btns+='<span style="color:var(--text3);padding:0 4px">…</span>';
    btns+=`<button class="page-btn${p===cur?' cur':''}" onclick="goPage('${key}',${p})">${p}</button>`;
    prev=p;
  }
  el.innerHTML=`<span style="color:var(--text3)">Page ${cur} of ${total}</span>
    <button class="page-btn" onclick="goPage('${key}',${cur-1})" ${cur===1?'disabled':''}>‹</button>
    ${btns}
    <button class="page-btn" onclick="goPage('${key}',${cur+1})" ${cur===total?'disabled':''}>›</button>`;
}
function goPage(key,n){
  pages[key]=n;
  const map={
    all:renderAllTable, spare:renderSpare, allocated:renderAllocated,
    activeBorrow:renderActiveBorrows, borrowPool:renderBorrowPool,
    borrowHist:renderBorrowHistory, disposal:renderDisposal,
    xfers:renderTransferTable
  };
  if(map[key]) map[key]();
}

function switchPage(p){
  currentPage=p;
  Object.keys(pages).forEach(k => pages[k] = 1);
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const pg=document.getElementById('page-'+p);
  if(pg) pg.classList.add('active');
  const nav=document.querySelector(`[data-page="${p}"]`);
  if(nav) nav.classList.add('active');
  if(p==='borrow') switchBorrowTab(borrowTab);
}

function submitEnroll(){
  const cat=document.getElementById('fCategory').value;
  const bc =document.getElementById('fBarcode').value;
  if(!cat||!bc){ toast('Missing required fields.','warn'); return; }

  const seenSpecTypes = new Set();
  let hasDupSpec = false;
  document.querySelectorAll('.spec-row').forEach(r=>{
    const t=r.querySelector('.spec-type')?.value;
    if(t){
      if(seenSpecTypes.has(t)) hasDupSpec=true;
      seenSpecTypes.add(t);
    }
  });
  if(hasDupSpec){ toast('Duplicate spec types found. Please remove duplicates before saving.','warn'); return; }

  const specParts=[];
  document.querySelectorAll('.spec-row').forEach(r=>{
    const t=r.querySelector('.spec-type')?.value;
    const v=r.querySelector('.spec-val')?.value;
    if(t&&v) specParts.push(t+': '+v);
  });
  const modelVal=document.getElementById('fModel')?.value||'';
  const specs=[modelVal,...specParts].filter(Boolean).join(' | ');
  const _ftVal = document.getElementById('fFieldType')?.value || '';
  const obj={
    barcode:bc, type:cat,
    brand:  document.getElementById('fBrand').value,
    serial: document.getElementById('fSerial').value,
    specs,
    condition:  document.getElementById('fCondition').value,
    purchDate:  document.getElementById('fPurchDate').value,
    wTerm:      document.getElementById('fWTerm').value,
    wValidity:  document.getElementById('fWVal').value,
    supplier:   document.getElementById('fSupplier')?.value||'',
    division:   _ftVal==='Field'
                  ?(document.getElementById('fDivision')?.value||'')
                  :(SESSION.userDivisions?.[0]||SESSION.division||''),
    district:   _ftVal==='Field'
                  ?(document.getElementById('fDistrict')?.value||'')
                  :(SESSION.userDistricts?.[0]||SESSION.district||''),
    area:       _ftVal==='Field'?(document.getElementById('fArea')?.value||''):'',
    branch:     document.getElementById('fBranch')?.value||'',
    remarks:    document.getElementById('fRemarks')?.value||'',
    entryEmpId: SESSION.username,
    entryName:  SESSION.name,
    enrolledBy: SESSION.username,
    statusChoice:'Spare'
  };
  const btn=document.getElementById('enrollNextBtn');
  btn.textContent='Saving…'; btn.disabled=true;
  google.script.run
    .withSuccessHandler(r=>{
      btn.textContent='✓ Add to Spare Pool'; btn.disabled=false;
      if(r.startsWith('Error')){ toast(r,'err'); return; }
      toast(r,'ok');
      closeModal('addAssetModal');
      loadData();
    })
    .withFailureHandler(err=>{ btn.textContent='✓ Add to Spare Pool'; btn.disabled=false; toast(err.message,'err'); })
    .processAsset(obj,false);
}

  const userDistricts = ENG_LOCATION_DATA.userDistricts  || [];

  if (!selDiv) {
    distSel.innerHTML = '<option value="">Select…</option>' +
      userDistricts.map(d => `<option>${esc(d)}</option>`).join('');
    return;
  }

  const divDistricts = map[selDiv] || [];
  const matched = divDistricts.filter(d =>
    userDistricts.some(ud => ud.toLowerCase() === d.toLowerCase())
  );
  const allowed = matched.length > 0 ? matched : (divDistricts.length > 0 ? divDistricts : userDistricts);

  distSel.innerHTML = '<option value="">Select…</option>' +
    allowed.map(d => `<option>${esc(d)}</option>`).join('');
}

function lookupEmpForAlloc(empId){

    .withSuccessHandler(r=>{

        if(msg){ msg.textContent=r.error; msg.style.cssText='display:block;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--red)'; }

      ${vrow('Division',esc(a.Division))}
      ${vrow('District',esc(a.District))}
      ${vrow('Branch',esc(a.Branch))}
      ${vrow('Date Allocated',fmtDate(a.EffDate))}

function renderXferHistory(barcode){
  const el=document.getElementById('viewModalXferBody');
  if(!el) return;
  const records=XFERS.filter(r=>String(r[0]).trim()===String(barcode).trim());
  if(!records.length){
    el.innerHTML=`<div class="xfer-empty">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
           style="margin:0 auto 10px;display:block;color:var(--text3)">

        <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
        <polyline points="7 23 3 19 7 15"/>
        <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
      </svg>

    </div>`;
    return;
  }
  const chrono=[...records].sort((a,b)=>new Date(a[18])-new Date(b[18]));
  let html=`<div style="padding:0 4px">
    <div style="font-size:.72rem;color:var(--text3);margin-bottom:16px;display:flex;gap:16px;flex-wrap:wrap;
                padding:8px 12px;background:var(--bg3);border-radius:6px;border:1px solid var(--border)">

      <span>Asset: <span style="font-family:'JetBrains Mono',monospace;color:var(--accent2)">${esc(barcode)}</span></span>
    </div>
    <div class="xfer-tl">`;

    const fromLoc=renderLocPills(r[5],r[6],r[7],r[8]);
    const toLoc  =renderLocPills(r[13],r[14],r[15],r[16]);
    const dotCls =i===0?'xd-start':i===chrono.length-1?'xd-end':'';
    const tBadge =r[1]?`<span class="badge badge-transfer" style="font-size:.66rem;padding:1px 7px">${esc(r[1])}</span>`:'';
    const sBadge =r[19]==='Completed'
      ?`<span class="badge badge-returned" style="font-size:.66rem;padding:1px 7px">Completed</span>`
      :`<span class="badge badge-borrowed" style="font-size:.66rem;padding:1px 7px">${esc(r[19]||'Pending')}</span>`;
    html+=`<div class="xfer-item">
      <div class="xfer-dot ${dotCls}"></div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px">
        ${tBadge}${sBadge}
        <span style="font-size:.72rem;color:var(--text3);margin-left:auto">📅 ${fmtDate(r[18])||'—'}</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 28px 1fr;align-items:start">
        <div style="background:var(--bg3);border:1px solid var(--border);border-radius:6px 0 0 6px;padding:10px 12px">
          <div style="font-size:.62rem;color:var(--text3);font-weight:800;text-transform:uppercase;
                      letter-spacing:.07em;margin-bottom:5px">From</div>
          <div class="xfer-from">${esc(r[2])||'<span style="color:var(--text3);font-weight:400">Unassigned</span>'}</div>
          ${r[3]?`<div style="font-size:.7rem;color:var(--text3);font-family:'JetBrains Mono',monospace">ID: ${esc(r[3])}</div>`:''}
          ${r[4]?`<div style="font-size:.72rem;color:var(--text2);margin-top:2px">${esc(r[4])}</div>`:''}
          <div style="margin-top:6px">${fromLoc}</div>
          ${r[9]?`<div style="font-size:.72rem;color:var(--yellow);margin-top:5px;padding:4px 8px;
                              background:rgba(217,119,6,.08);border-radius:4px;font-style:italic">"${esc(r[9])}"</div>`:''}
        </div>
        <div style="display:flex;align-items:center;justify-content:center;height:100%;
                    background:var(--bg4);border-top:1px solid var(--border);border-bottom:1px solid var(--border)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--accent2)" stroke-width="2.5">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </div>
        <div style="background:rgba(59,130,246,.04);border:1px solid rgba(59,130,246,.2);
                    border-radius:0 6px 6px 0;padding:10px 12px">
          <div style="font-size:.62rem;color:#60a5fa;font-weight:800;text-transform:uppercase;
                      letter-spacing:.07em;margin-bottom:5px">To</div>
          <div class="xfer-to">${esc(r[10])||'<span style="color:var(--text3);font-weight:400">—</span>'}</div>
          ${r[11]?`<div style="font-size:.7rem;color:var(--text3);font-family:'JetBrains Mono',monospace">ID: ${esc(r[11])}</div>`:''}
          ${r[12]?`<div style="font-size:.72rem;color:var(--text2);margin-top:2px">${esc(r[12])}</div>`:''}
          <div style="margin-top:6px">${toLoc}</div>
          ${r[17]?`<div style="font-size:.72rem;color:var(--yellow);margin-top:5px;padding:4px 8px;
                               background:rgba(217,119,6,.08);border-radius:4px;font-style:italic">"${esc(r[17])}"</div>`:''}
        </div>
      </div>
      <div style="font-size:.7rem;color:var(--text3);margin-top:6px;text-align:right">
        Recorded: ${esc(r[20])||'—'}
      </div>
    </div>`;
  });
  html+=`</div></div>`;
  el.innerHTML=html;
}
// ═══════════════════════════════════════
//  STAFF ASSETS MODULE
// ═══════════════════════════════════════

// ── State ────────────────────────────────────────────────────────────────────
let _stTree       = {};          // built hierarchy
let _stExpanded   = {};          // { 'div::dist::area::empid': true/false }
let _stSearchQ    = '';
let _stBuilt      = false;       // true after first build

// ── Entry point: called by switchPage() ──────────────────────────────────────
function renderStaffAssets() {
  _stSearchQ = (document.getElementById('staffAssetsSearch')?.value || '').toLowerCase();
  _stTree = _buildStaffTree();
  _renderStaffTree();
  _updateStaffBadge();
}

// ── Search input handler ──────────────────────────────────────────────────────
function onStaffAssetsSearch() {
  _stSearchQ = (document.getElementById('staffAssetsSearch')?.value || '').toLowerCase();
  _stTree = _buildStaffTree();

  // Auto-expand nodes that contain matches when searching
  if (_stSearchQ) _stAutoExpand();
  _renderStaffTree();
}

// ── Build the grouped hierarchy from ASSETS ───────────────────────────────────
function _buildStaffTree() {
  // Only allocated / transfer assets, scoped to user
  const base = _filterByScope(
    ASSETS.filter(a => ['allocated', 'transfer'].includes(a.status))
  );

  // Apply search filter at asset/employee level
  const data = _stSearchQ
    ? base.filter(a => [
        a.Staff, a.EmpID, a.Designation, a.Barcode,
        a.Type, a.Brand, a.Serial, a.Division,
        a.District, a.Area, a.Branch
      ].some(v => (v || '').toLowerCase().includes(_stSearchQ)))
    : base;

  // Group: Division → District → Area → EmpID → { info, assets[] }
  const tree = {};

  data.forEach(a => {
    const div    = a.Division  || '(No Division)';
    const dist   = a.District  || '(No District)';
    const area   = a.Area      || '(No Area)';
    const empId  = a.EmpID     || 'UNKNOWN';
    const staff  = a.Staff     || 'Unassigned';
    const desig  = a.Designation || '';
    const branch = a.Branch    || '';

    if (!tree[div]) tree[div] = {};
    if (!tree[div][dist]) tree[div][dist] = {};
    if (!tree[div][dist][area]) tree[div][dist][area] = {};
    if (!tree[div][dist][area][empId]) {
      tree[div][dist][area][empId] = {
        name: staff, empId, designation: desig,
        division: div, district: dist, area, branch,
        assets: []
      };
    }
    tree[div][dist][area][empId].assets.push(a);
  });

  return tree;
}

// ── Auto-expand nodes that have search hits ───────────────────────────────────
function _stAutoExpand() {
  Object.keys(_stTree).forEach(div => {
    Object.keys(_stTree[div]).forEach(dist => {
      Object.keys(_stTree[div][dist]).forEach(area => {
        const aKey  = `${div}::${dist}`;
        const bKey  = `${div}::${dist}::${area}`;
        _stExpanded[div]  = true;
        _stExpanded[aKey] = true;
        _stExpanded[bKey] = true;
      });
    });
  });
}

// ── Expand / Collapse all ─────────────────────────────────────────────────────
function stExpandAll() {
  Object.keys(_stTree).forEach(div => {
    _stExpanded[div] = true;
    Object.keys(_stTree[div]).forEach(dist => {
      _stExpanded[`${div}::${dist}`] = true;
      Object.keys(_stTree[div][dist]).forEach(area => {
        _stExpanded[`${div}::${dist}::${area}`] = true;
      });
    });
  });
  _renderStaffTree();
}

function stCollapseAll() {
  _stExpanded = {};
  _renderStaffTree();
}

// ── Toggle a single node ──────────────────────────────────────────────────────
function stToggle(key) {
  _stExpanded[key] = !_stExpanded[key];
  _renderStaffTree();
}

// ── Summary badge ─────────────────────────────────────────────────────────────
function _updateStaffBadge() {
  const total = _filterByScope(
    ASSETS.filter(a => ['allocated', 'transfer'].includes(a.status))
  ).length;
  const el = document.getElementById('nbStaffAssets');
  if (el) el.textContent = total;
}

// ── Main render ───────────────────────────────────────────────────────────────
function _renderStaffTree() {
  const container = document.getElementById('staffAssetsTree');
  if (!container) return;

  const divKeys = Object.keys(_stTree).sort();

  // Summary bar
  let totalEmp = 0, totalAsset = 0;
  divKeys.forEach(div => {
    Object.keys(_stTree[div]).forEach(dist => {
      Object.keys(_stTree[div][dist]).forEach(area => {
        totalEmp   += Object.keys(_stTree[div][dist][area]).length;
        Object.keys(_stTree[div][dist][area]).forEach(empId => {
          totalAsset += _stTree[div][dist][area][empId].assets.length;
        });
      });
    });
  });

  const summEl = document.getElementById('staffAssetsSummary');
  if (summEl) {
    summEl.innerHTML = divKeys.length
      ? `<div class="pool-pill pool-pill-blue">${totalAsset} Assets</div>
         <div class="pool-pill">${totalEmp} Staff Members</div>
         <div class="pool-pill">${divKeys.length} Division(s)</div>`
      : '';
  }

  if (!divKeys.length) {
    container.innerHTML = `<div class="st-empty">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.4"
           style="margin:0 auto 12px;display:block;color:var(--text3)">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      No allocated assets found${_stSearchQ ? ' matching your search' : ' in your scope'}.
    </div>`;
    return;
  }

  // Build HTML
  let html = '<div class="st-tree">';
  divKeys.forEach(div => html += _renderDivNode(div));
  html += '</div>';
  container.innerHTML = html;
}

// ── Division node ─────────────────────────────────────────────────────────────
function _renderDivNode(div) {
  const distKeys  = Object.keys(_stTree[div]).sort();
  const isOpen    = !!_stExpanded[div];

  // Count assets in this division
  let assetCount = 0, empCount = 0;
  distKeys.forEach(dist => {
    Object.keys(_stTree[div][dist]).forEach(area => {
      const emps = Object.keys(_stTree[div][dist][area]);
      empCount += emps.length;
      emps.forEach(e => { assetCount += _stTree[div][dist][area][e].assets.length; });
    });
  });

  let html = `
    <div class="st-node st-div">
      <div class="st-row" onclick="stToggle(${JSON.stringify(div)})">
        <span class="st-chevron ${isOpen ? 'open' : ''}">›</span>
        <span class="st-icon">🏢</span>
        <span class="st-label">${esc(div)}</span>
        <span class="st-meta">${empCount} staff · ${assetCount} assets</span>
      </div>`;

  if (isOpen) {
    html += '<div class="st-children">';
    distKeys.forEach(dist => html += _renderDistNode(div, dist));
    html += '</div>';
  }
  html += '</div>';
  return html;
}

// ── District node ─────────────────────────────────────────────────────────────
function _renderDistNode(div, dist) {
  const areaKeys  = Object.keys(_stTree[div][dist]).sort();
  const key       = `${div}::${dist}`;
  const isOpen    = !!_stExpanded[key];

  let assetCount = 0, empCount = 0;
  areaKeys.forEach(area => {
    const emps = Object.keys(_stTree[div][dist][area]);
    empCount += emps.length;
    emps.forEach(e => { assetCount += _stTree[div][dist][area][e].assets.length; });
  });

  let html = `
    <div class="st-node st-dist">
      <div class="st-row" onclick="stToggle(${JSON.stringify(key)})">
        <span class="st-chevron ${isOpen ? 'open' : ''}">›</span>
        <span class="st-icon">📍</span>
        <span class="st-label">${esc(dist)}</span>
        <span class="st-meta">${empCount} staff · ${assetCount} assets</span>
      </div>`;

  if (isOpen) {
    html += '<div class="st-children">';
    areaKeys.forEach(area => html += _renderAreaNode(div, dist, area));
    html += '</div>';
  }
  html += '</div>';
  return html;
}

// ── Area node ─────────────────────────────────────────────────────────────────
function _renderAreaNode(div, dist, area) {
  const empIds  = Object.keys(_stTree[div][dist][area]).sort((a, b) => {
    const na = _stTree[div][dist][area][a].name;
    const nb = _stTree[div][dist][area][b].name;
    return na.localeCompare(nb);
  });
  const key     = `${div}::${dist}::${area}`;
  const isOpen  = !!_stExpanded[key];

  let assetCount = 0;
  empIds.forEach(e => { assetCount += _stTree[div][dist][area][e].assets.length; });

  const areaLabel = area === '(No Area)' ? '<em style="opacity:.6">No Area</em>' : esc(area);

  let html = `
    <div class="st-node st-area">
      <div class="st-row" onclick="stToggle(${JSON.stringify(key)})">
        <span class="st-chevron ${isOpen ? 'open' : ''}">›</span>
        <span class="st-icon">📁</span>
        <span class="st-label">${areaLabel}</span>
        <span class="st-meta">${empIds.length} staff · ${assetCount} assets</span>
      </div>`;

  if (isOpen) {
    html += '<div class="st-children">';
    empIds.forEach(empId => html += _renderEmpNode(div, dist, area, empId));
    html += '</div>';
  }
  html += '</div>';
  return html;
}

// ── Employee node ─────────────────────────────────────────────────────────────
function _renderEmpNode(div, dist, area, empId) {
  const emp    = _stTree[div][dist][area][empId];
  const key    = `${div}::${dist}::${area}::${empId}`;
  const isOpen = !!_stExpanded[key];
  const count  = emp.assets.length;

  const locPills = emp.branch
    ? `<span class="loc-pill lp-branch" style="font-size:.68rem">${esc(emp.branch)}</span>`
    : '';

  let html = `
    <div class="st-node st-emp">
      <div class="st-row" onclick="stToggle(${JSON.stringify(key)})">
        <span class="st-chevron ${isOpen ? 'open' : ''}">›</span>
        <span class="st-icon">👤</span>
        <div class="st-emp-info">
          <span class="st-label">${esc(emp.name)}</span>
          <span class="st-emp-sub">
            <span class="mono-sm" style="font-size:.7rem">${esc(empId)}</span>
            ${emp.designation ? `<span style="color:var(--text3)">·</span> <span style="font-size:.72rem;color:var(--text2)">${esc(emp.designation)}</span>` : ''}
            ${locPills}
          </span>
        </div>
        <span class="st-meta">${count} asset${count !== 1 ? 's' : ''}</span>
      </div>`;

  if (isOpen) {
    html += '<div class="st-children st-assets-wrap">';
    html += _renderEmpAssets(emp.assets);
    html += '</div>';
  }
  html += '</div>';
  return html;
}

// ── Asset cards for an employee ───────────────────────────────────────────────
function _renderEmpAssets(assets) {
  if (!assets.length) return '<div class="st-empty-small">No assets</div>';

  const lcBadge = {
    Allocated: 'allocated', Transfer: 'transfer',
    Borrow: 'borrowed', Active: 'spare', Dispose: 'disposal'
  };

  return assets.map(a => {
    const lc        = a.Lifecycle || 'Active';
    const badgeKey  = lcBadge[lc] || 'spare';
    const condCls   = 'cond-' + (a.Condition || 'good').toLowerCase();

    return `
      <div class="st-asset-card">
        <div class="st-asset-left">
          <span class="st-icon" style="font-size:.95rem">💻</span>
          <div>
            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
              <span class="type-tag">${esc(a.Type)}</span>
              <span style="font-weight:600;font-size:.85rem">${esc(a.Brand) || '—'}</span>
              <span class="badge badge-${badgeKey}" style="font-size:.66rem;padding:2px 7px">${esc(lc)}</span>
            </div>
            <div style="display:flex;gap:10px;margin-top:4px;flex-wrap:wrap;align-items:center">
              <span class="mono-bc" style="font-size:.74rem">${esc(a.Barcode)}</span>
              ${a.Serial ? `<span class="mono-sm">S/N: ${esc(a.Serial)}</span>` : ''}
              <span class="${condCls}" style="font-size:.72rem">${esc(a.Condition)}</span>
              ${a.EffDate ? `<span style="font-size:.7rem;color:var(--text3)">Since ${fmtDate(a.EffDate)}</span>` : ''}
            </div>
          </div>
        </div>
        <div class="st-asset-actions">
          <button class="btn btn-icon btn-secondary" data-tip="View"
                  onclick="viewAsset('${esc(a.Barcode)}')">${_ICO.view}</button>
          <button class="btn btn-icon btn-transfer" data-tip="Transfer"
                  onclick="openTransferModal('${esc(a.Barcode)}')">${_ICO.transfer}</button>
        </div>
      </div>`;
  }).join('');
}

// ── Hook into switchPage() ────────────────────────────────────────────────────
// Wrap the existing switchPage so Staff Assets renders when navigated to.
(function () {
  const _origSwitch = switchPage;
  switchPage = function (p) {
    _origSwitch(p);
    if (p === 'staff-assets') renderStaffAssets();
  };
})();
</script>
