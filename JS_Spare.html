<script>
// ═══════════════════════════════════════
//  JS_Spare.html — Spare Pool
// ═══════════════════════════════════════

// ── Icon set (shared reference used by other modules too) ─────────────────────
const _ICO = {
  allocate: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>`,
  borrow:   `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
  transfer: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3 4 7l4 4"/><path d="M4 7h16"/><path d="m16 21 4-4-4-4"/><path d="M20 17H4"/></svg>`,
  spare:    `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>`,
  dispose:  `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`,
  view:     `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`
};

// ── Floating tooltip ────────────────────────────────────────────────────────
(function () {
  function _initTip() {
    if (!document.body) return;
    const tip = document.createElement('div');
    tip.id = 'floating-tip';
    document.body.appendChild(tip);
    document.addEventListener('mouseover', e => {
      const el = e.target.closest('[data-tip]');
      if (!el) { tip.style.display = 'none'; return; }
      const r = el.getBoundingClientRect();
      tip.textContent = el.dataset.tip;
      tip.style.left      = (r.left + r.width / 2) + 'px';
      tip.style.top       = (r.top - 6) + 'px';
      tip.style.transform = 'translate(-50%,-100%)';
      tip.style.display   = 'block';
    });
    document.addEventListener('mouseout', e => {
      if (e.target.closest('[data-tip]')) tip.style.display = 'none';
    });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', _initTip);
  } else {
    _initTip();
  }
})();

// ─────────────────────────────────────────────────────────────────────────────
function renderSpare() {
  _resetTblSel('spare');
  let data = _filterByScope(ASSETS.filter(a => a.status === 'spare'));

  const q      = (document.getElementById('spareSearch')?.value  || '').toLowerCase();
  const fType  = document.getElementById('spareFilterType')?.value || '';
  if (q)     data = data.filter(a => [a.Barcode, a.Brand, a.Type, a.Serial, a.Supplier].some(v => (v || '').toLowerCase().includes(q)));
  if (fType) data = data.filter(a => (a.Type || '').toUpperCase() === fType.toUpperCase());

  // Summary pills
  const typeCounts = {};
  data.forEach(a => { if (a.Type) typeCounts[a.Type] = (typeCounts[a.Type] || 0) + 1; });
  const summEl = document.getElementById('spareSummary');
  if (summEl) summEl.innerHTML =
    `<div class="pool-pill pool-pill-accent">${data.length} Available</div>` +
    Object.entries(typeCounts).sort((a, b) => b[1] - a[1])
      .map(([t, c]) => `<div class="pool-pill">${esc(t)}: <strong>${c}</strong></div>`).join('');

  if (!pages.spare) pages.spare = 1;
  const totalPages = Math.ceil(data.length / PAGE_SIZE) || 1;
  if (pages.spare > totalPages) pages.spare = totalPages;
  const slice = data.slice((pages.spare - 1) * PAGE_SIZE, pages.spare * PAGE_SIZE);

  const tbody = document.getElementById('tblSpare');
  if (!tbody) return;
  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="10" class="tbl-empty">No spare assets</td></tr>';
    document.getElementById('pagerSpare').innerHTML = '';
    return;
  }

  const today = new Date();
  tbody.innerHTML = slice.map(a => {
    const wDate    = a.WarrantyVal ? new Date(a.WarrantyVal) : null;
    const wExpired = wDate && wDate < today;
    const wLabel   = a.WarrantyVal
      ? `<span style="color:${wExpired ? 'var(--red)' : 'var(--green)'};font-size:.76rem">${fmtDate(a.WarrantyVal)}${wExpired ? ' ⚠' : ''}</span>`
      : '<span style="color:var(--text3)">—</span>';

    return `<tr>
      <td><input type="checkbox" class="cb cb-spare" value="${esc(a.Barcode)}" onclick="checkSelTable('spare')"/></td>
      <td><span class="mono-bc">${esc(a.Barcode)}</span></td>
      <td><span class="type-tag">${esc(a.Type)}</span></td>
      <td>${esc(a.Brand) || '—'}</td>
      <td class="mono-sm">${esc(a.Serial) || '—'}</td>
      <td><span class="cond-${(a.Condition || 'good').toLowerCase()}">${esc(a.Condition)}</span></td>
      <td class="nowrap-sm">${fmtDate(a.PurchDate) || '—'}</td>
      <td>${wLabel}</td>
      <td style="font-size:.78rem;max-width:120px;overflow:hidden;text-overflow:ellipsis">${esc(a.Supplier) || '—'}</td>
      <td>
        <div style="display:flex;gap:4px">
          <button class="btn btn-icon btn-allocate" data-tip="Allocate" onclick="openAllocateModal('${esc(a.Barcode)}')">${_ICO.allocate}</button>
          <button class="btn btn-icon btn-borrow"   data-tip="Borrow"   onclick="openBorrowModal('${esc(a.Barcode)}')">${_ICO.borrow}</button>
          <button class="btn btn-icon btn-danger"   data-tip="Dispose"  onclick="openDisposalModal('${esc(a.Barcode)}')">${_ICO.dispose}</button>
          <button class="btn btn-icon btn-secondary"data-tip="View"     onclick="viewAsset('${esc(a.Barcode)}')">${_ICO.view}</button>
        </div>
      </td>
    </tr>`;
  }).join('');

  renderPager('pagerSpare', 'spare', totalPages, pages.spare);
}
</script>
